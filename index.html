<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIVALS - original von Gameflare (Deutsch/Englisch)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .language-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 30px;
            color: white;
            font-family: monospace;
            border: 1px solid gold;
            cursor: pointer;
            pointer-events: auto;
        }
        .language-switch select {
            background: #222;
            color: gold;
            border: none;
            padding: 5px;
            border-radius: 20px;
            font-weight: bold;
        }
        .info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 8px;
            font-family: monospace;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .language-switch { top: 10px; right: 10px; padding: 4px 10px; font-size: 12px; }
            .info { font-size: 9px; }
        }
    </style>
</head>
<body>
    <div class="language-switch">
        🌐 Sprache / Language:
        <select id="langSelect">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
        </select>
    </div>
    <div class="info">
        🎮 Original RIVALS von Gameflare.com | Lädt das echte Spiel – kein Nachbau!
    </div>

    <!-- Das originale Spiel von Gameflare als Iframe -->
    <iframe id="gameFrame" src="https://www.gameflare.com/online-game/rivals-roblox/"></iframe>

    <script>
        const iframe = document.getElementById('gameFrame');
        const langSelect = document.getElementById('langSelect');

        // Versuche, die Sprache im Spiel zu ändern (falls das Spiel eine JavaScript-API oder URL-Parameter unterstützt)
        // Da Gameflare das Spiel in einem Iframe lädt, können wir nicht direkt ins Spiel eingreifen.
        // Aber manche Unity-Spiele reagieren auf localStorage oder URL-Parameter.
        // Wir versuchen, die Iframe-URL mit einem Sprachparameter neu zu laden.
        
        function setGameLanguage(lang) {
            // Option 1: Parameter an die Iframe-URL anhängen (viele Spiele nutzen ?lang=de)
            let currentUrl = iframe.src.split('?')[0];
            let newUrl = currentUrl + '?lang=' + lang;
            iframe.src = newUrl;
            
            // Option 2: Alternativ könnte man die Seite komplett neuladen (für Cross-Origin)
            // Aber das funktioniert nur, wenn Gameflare das unterstützt.
            console.log(`Sprache auf ${lang} gestellt. Lade Spiel neu...`);
        }

        langSelect.addEventListener('change', (e) => {
            const selectedLang = e.target.value;
            setGameLanguage(selectedLang);
        });

        // Standardmäßig Deutsch versuchen
        setGameLanguage('de');
        
        // Hinweis: Da das Spiel von einer externen Domain kommt, kann die Sprachumschaltung
        // nur funktionieren, wenn Gameflare URL-Parameter oder eine PostMessage-API bereitstellt.
        // Sollte das nicht klappen, wird das Spiel einfach in der Standardsprache (meist Englisch) geladen.
        // Du kannst aber manuell im Spiel nach Einstellungen suchen.
    </script>
</body>
</html>
