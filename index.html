<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIVALS ULTIMATE - Originalgetreue Roblox Experience</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Fredoka One', cursive; }
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            text-shadow: 2px 2px 0 #00000080;
            background: rgba(0,0,0,0.65);
            padding: 12px 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            font-weight: bold;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 18px;
            pointer-events: none;
            border: 1px solid #ffaa44;
            font-family: monospace;
        }
        .ui-item {
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 30px;
            border-left: 4px solid #ffaa00;
        }
        #health-bar-container {
            width: 220px;
            height: 22px;
            background: #6a1a1a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid gold;
        }
        #health-fill { width: 100%; height: 100%; background: #4caf50; transition: width 0.2s; }
        #ammo-bar {
            background: #1a1a2a;
            padding: 4px 14px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
            color: #ffdd99;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            z-index: 200;
            pointer-events: none;
        }
        .touch-btn {
            pointer-events: auto;
            background: rgba(20,20,40,0.95);
            border: 2px solid orange;
            color: white;
            font-size: 26px;
            font-weight: bold;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            text-align: center;
            line-height: 70px;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 5px 15px black;
        }
        .touch-fire { background: rgba(200,50,50,0.9); border-color: red; }
        .weapon-btn { width: 65px; height: 65px; font-size: 20px; background: #222; }
        .reload-btn { background: #2c6e2c; border-color: #aaffaa; font-size: 18px; }
        @media (max-width: 800px) {
            .touch-controls { display: flex; }
            #controls-info { display: none; }
            .ui-item { font-size: 14px; }
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
        }
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #map-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 100;
            pointer-events: auto;
            color: #ffcc88;
            font-weight: bold;
            backdrop-filter: blur(8px);
            font-family: monospace;
            border: 1px solid #ffaa44;
        }
        select, button {
            background: #2a2a3a;
            color: #ffdd99;
            border: 1px solid #ffaa55;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
        }
        .damage-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.08s;
        }
        .lobby-message {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000aa;
            backdrop-filter: blur(16px);
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: bold;
            color: #ffdd88;
            text-shadow: 2px 2px 0 #000;
            border: 2px solid gold;
            white-space: nowrap;
            font-family: monospace;
            pointer-events: none;
            z-index: 300;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1);}
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); visibility: hidden; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-item">❤️ <span id="health-val">100</span></div>
        <div class="ui-item">🪙 <span id="coins-val">0</span></div>
        <div class="ui-item">🔑 <span id="keys-val">0</span></div>
        <div class="ui-item">🔫 <span id="weapon-name">Assault Rifle</span></div>
        <div id="ammo-bar"><span id="current-ammo">30</span> / <span id="reserve-ammo">90</span></div>
        <div id="health-bar-container"><div id="health-fill"></div></div>
    </div>
    <div id="map-selector">
        🗺️ MAP:
        <select id="map-select">
            <option value="lobby">🏠 LOBBY</option>
            <option value="arena">🏟️ ARENA</option>
            <option value="crossroads">⚔️ CROSSROADS</option>
            <option value="docks">🚢 DOCKS</option>
            <option value="battleground">⛰️ BATTLEGROUND</option>
            <option value="shootingrange">🎯 SHOOTING RANGE</option>
        </select>
        <button id="change-map-btn">TELEPORT</button>
    </div>
    <div id="controls-info">
        🖱️ WASD → MOVE | MOUSE → AIM | 🔫 LEFT CLICK → FIRE | 🔄 R → RELOAD | 1/2 → WEAPON | 🔺 SPACE → JUMP
    </div>
    <div class="touch-controls">
        <div class="touch-btn" data-action="forward">▲</div>
        <div class="touch-btn" data-action="back">▼</div>
        <div class="touch-btn" data-action="left">◀</div>
        <div class="touch-btn" data-action="right">▶</div>
        <div class="touch-btn touch-fire" data-action="fire">💥</div>
        <div class="touch-btn weapon-btn" data-action="weapon1">1</div>
        <div class="touch-btn weapon-btn" data-action="weapon2">2</div>
        <div class="touch-btn reload-btn" data-action="reload">🔄 R</div>
    </div>
    <div id="crosshair"><div class="crosshair-dot"></div></div>
    <div id="damage-overlay" class="damage-indicator"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // -------------------- ENGINE SETUP --------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.006);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1.65, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Lichtsystem (Roblox typisch)
        const ambient = new THREE.AmbientLight(0x606088, 0.65);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
        mainLight.position.set(12, 18, 6);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x6688aa, 0.5);
        fillLight.position.set(0, 6, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(-3, 4, -5);
        scene.add(backLight);
        
        // -------------------- WAFFEN & SPIELER --------------------
        let currentWeapon = 0; // 0 = AR, 1 = Shotgun
        let ammo = [30, 8];
        let reserveAmmo = [90, 24];
        let reloading = false;
        let canShoot = true;
        let shootCooldown = [120, 750];
        
        const weaponStats = [
            { name: "Assault Rifle", damage: 22, spread: 0.018, range: 55, pellets: 1, color: 0x557755 },
            { name: "Shotgun", damage: 14, spread: 0.12, range: 22, pellets: 6, color: 0xaa6644 }
        ];
        
        // Weapon Models (First Person)
        const weaponGroup = new THREE.Group();
        camera.add(weaponGroup);
        weaponGroup.position.set(0.32, -0.28, -0.55);
        
        // AR Model
        const arGroup = new THREE.Group();
        const arBody = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.22, 0.7), new THREE.MeshStandardMaterial({ color: 0x3a6a3a, metalness: 0.6, roughness: 0.4 }));
        arBody.position.set(0, 0, 0.2);
        arGroup.add(arBody);
        const arHandle = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.28, 0.12), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
        arHandle.position.set(0, -0.18, 0.05);
        arGroup.add(arHandle);
        const arBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.45, 8), new THREE.MeshStandardMaterial({ color: 0xccccaa, metalness: 0.9 }));
        arBarrel.rotation.x = Math.PI/2;
        arBarrel.position.set(0, 0.04, 0.55);
        arGroup.add(arBarrel);
        const arSight = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.2), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        arSight.position.set(0, 0.12, 0.35);
        arGroup.add(arSight);
        arGroup.visible = true;
        weaponGroup.add(arGroup);
        
        // Shotgun Model
        const sgGroup = new THREE.Group();
        const sgBody = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.24, 0.72), new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 0.5 }));
        sgBody.position.set(0, 0, 0.22);
        sgGroup.add(sgBody);
        const sgBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.55, 8), new THREE.MeshStandardMaterial({ color: 0xaaaacc, metalness: 0.8 }));
        sgBarrel.rotation.x = Math.PI/2;
        sgBarrel.position.set(0, 0.05, 0.6);
        sgGroup.add(sgBarrel);
        const sgStock = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.16, 0.25), new THREE.MeshStandardMaterial({ color: 0x5a3a1a }));
        sgStock.position.set(0, -0.05, -0.15);
        sgGroup.add(sgStock);
        sgGroup.visible = false;
        weaponGroup.add(sgGroup);
        
        // Muzzle Flash
        const muzzleFlash = new THREE.PointLight(0xff8800, 0, 0.6);
        muzzleFlash.position.set(0, 0.06, 0.68);
        arGroup.add(muzzleFlash);
        const muzzleFlashSg = new THREE.PointLight(0xffaa44, 0, 0.6);
        muzzleFlashSg.position.set(0, 0.08, 0.85);
        sgGroup.add(muzzleFlashSg);
        
        function updateAmmoUI() {
            document.getElementById('current-ammo').innerText = ammo[currentWeapon];
            document.getElementById('reserve-ammo').innerText = reserveAmmo[currentWeapon];
        }
        
        function switchWeapon(idx) {
            if (reloading) return;
            currentWeapon = idx;
            arGroup.visible = idx === 0;
            sgGroup.visible = idx === 1;
            document.getElementById('weapon-name').innerText = weaponStats[idx].name;
            updateAmmoUI();
        }
        
        function reload() {
            if (reloading) return;
            const maxAmmo = currentWeapon === 0 ? 30 : 8;
            if (ammo[currentWeapon] === maxAmmo) return;
            if (reserveAmmo[currentWeapon] === 0) return;
            reloading = true;
            weaponGroup.position.y -= 0.22;
            setTimeout(() => {
                const needed = maxAmmo - ammo[currentWeapon];
                const taken = Math.min(needed, reserveAmmo[currentWeapon]);
                ammo[currentWeapon] += taken;
                reserveAmmo[currentWeapon] -= taken;
                updateAmmoUI();
                weaponGroup.position.y += 0.22;
                reloading = false;
            }, 1100);
        }
        
        function shoot() {
            if (reloading || !canShoot) return;
            if (ammo[currentWeapon] <= 0) return;
            ammo[currentWeapon]--;
            updateAmmoUI();
            canShoot = false;
            setTimeout(() => { canShoot = true; }, shootCooldown[currentWeapon]);
            
            // Recoil animation
            weaponGroup.position.z -= 0.09;
            setTimeout(() => weaponGroup.position.z += 0.09, 70);
            
            const flash = currentWeapon === 0 ? muzzleFlash : muzzleFlashSg;
            flash.intensity = 1.4;
            setTimeout(() => flash.intensity = 0, 90);
            
            // Gunshot sound
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = currentWeapon === 0 ? 520 : 380;
            gain.gain.value = 0.12;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
            osc.stop(audioCtx.currentTime + 0.2);
            
            const weapon = weaponStats[currentWeapon];
            for (let p = 0; p < weapon.pellets; p++) {
                const raycaster = new THREE.Raycaster();
                const spreadX = (Math.random() - 0.5) * weapon.spread;
                const spreadY = (Math.random() - 0.5) * weapon.spread;
                const dir = camera.getWorldDirection(new THREE.Vector3());
                dir.x += spreadX;
                dir.y += spreadY;
                dir.normalize();
                raycaster.set(camera.position, dir);
                const hits = raycaster.intersectObjects(enemies);
                if (hits.length > 0) {
                    const enemy = hits[0].object;
                    enemy.userData.health -= weapon.damage;
                    createHitEffect(enemy.position);
                    if (enemy.userData.health <= 0) {
                        const idx = enemies.indexOf(enemy);
                        if (idx !== -1) enemies.splice(idx,1);
                        scene.remove(enemy);
                        if (Math.random() < 0.65) spawnCoin(enemy.position);
                        else spawnKey(enemy.position);
                        setTimeout(() => spawnRandomEnemy(), 2000);
                    }
                }
            }
        }
        
        function createHitEffect(pos) {
            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6,6), new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0x552200 }));
            particle.position.copy(pos);
            scene.add(particle);
            setTimeout(() => scene.remove(particle), 130);
            const overlay = document.getElementById('damage-overlay');
            overlay.style.opacity = '0.35';
            setTimeout(() => overlay.style.opacity = '0', 90);
        }
        
        // -------------------- COLLECTIBLES --------------------
        let coinsList = [];
        let keysList = [];
        let coins = 0, keys = 0;
        
        function spawnCoin(pos) {
            const coinGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.09, 24);
            const coinMat = new THREE.MeshStandardMaterial({ color: 0xffcc44, metalness: 0.95, emissive: 0x442200 });
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.rotation.x = Math.PI/2;
            coin.position.copy(pos);
            coin.position.y += 0.55;
            scene.add(coin);
            coinsList.push(coin);
        }
        
        function spawnKey(pos) {
            const keyGeo = new THREE.BoxGeometry(0.4, 0.12, 0.75);
            const keyMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, metalness: 0.9 });
            const key = new THREE.Mesh(keyGeo, keyMat);
            key.position.copy(pos);
            key.position.y += 0.45;
            scene.add(key);
            keysList.push(key);
        }
        
        function clearCollectibles() {
            coinsList.forEach(c => scene.remove(c));
            keysList.forEach(k => scene.remove(k));
            coinsList = [];
            keysList = [];
        }
        
        // -------------------- GEGNER SYSTEM --------------------
        let enemies = [];
        function createEnemy(x, z, color=0xdd5555) {
            const geometry = new THREE.BoxGeometry(0.95, 1.35, 0.95);
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: 0x331100 });
            const enemy = new THREE.Mesh(geometry, material);
            enemy.position.set(x, 0.68, z);
            enemy.castShadow = true;
            enemy.userData = { health: 55, speed: 2.0 };
            scene.add(enemy);
            enemies.push(enemy);
            return enemy;
        }
        
        function spawnRandomEnemy() {
            let bound = getMapBound();
            let x = (Math.random() - 0.5) * bound * 1.6;
            let z = (Math.random() - 0.5) * bound * 1.6;
            x = Math.max(-bound+3, Math.min(bound-3, x));
            z = Math.max(-bound+3, Math.min(bound-3, z));
            createEnemy(x, z);
        }
        
        function respawnAllEnemies() {
            enemies.forEach(e => scene.remove(e));
            enemies = [];
            for(let i=0;i<6;i++) spawnRandomEnemy();
        }
        
        // -------------------- KARTENBAU (ROBLOX RIVALS ORIGINAL) --------------------
        let currentMap = 'lobby';
        let mapObjects = [];
        
        function getMapBound() {
            if(currentMap === 'arena') return 15;
            if(currentMap === 'crossroads') return 18;
            if(currentMap === 'docks') return 20;
            if(currentMap === 'battleground') return 22;
            if(currentMap === 'shootingrange') return 25;
            return 14;
        }
        
        function clearMap() {
            mapObjects.forEach(obj => scene.remove(obj));
            mapObjects = [];
        }
        
        // ---------- LOBBY (mit Shop, Leaderboard, Shooting Range, Matchmaking Pads) ----------
        function buildLobby() {
            // Bodenplatte
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(45, 45), new THREE.MeshStandardMaterial({ color: 0x3c8c5a, roughness: 0.85 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.15;
            ground.receiveShadow = true;
            scene.add(ground);
            mapObjects.push(ground);
            
            // Zentraler Schießstand (Shooting Range)
            const rangeBase = new THREE.Mesh(new THREE.BoxGeometry(12, 0.3, 12), new THREE.MeshStandardMaterial({ color: 0xcdba87 }));
            rangeBase.position.set(0, 0, 8);
            rangeBase.castShadow = true;
            scene.add(rangeBase);
            mapObjects.push(rangeBase);
            // Ziele
            for(let i=-4; i<=4; i+=2) {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.3), new THREE.MeshStandardMaterial({ color: 0xdd4444 }));
                target.position.set(i, 0.9, 12.5);
                scene.add(target);
                mapObjects.push(target);
            }
            
            // Pads: 1v1 , 2v2, FFA
            const padMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, emissive: 0x226622 });
            const pad1v1 = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2.5), padMat);
            pad1v1.position.set(-6, 0, -5);
            scene.add(pad1v1);
            mapObjects.push(pad1v1);
            const pad2v2 = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2.5), new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x224466 }));
            pad2v2.position.set(0, 0, -5);
            scene.add(pad2v2);
            mapObjects.push(pad2v2);
            const padFFA = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2.5), new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0x662222 }));
            padFFA.position.set(6, 0, -5);
            scene.add(padFFA);
            mapObjects.push(padFFA);
            
            // Shop (links)
            const shopBase = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 5), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
            shopBase.position.set(-10, 1.5, 2);
            scene.add(shopBase);
            mapObjects.push(shopBase);
            const shopSign = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 0.2), new THREE.MeshStandardMaterial({ color: 0xffaa55 }));
            shopSign.position.set(-10, 3, 2.2);
            scene.add(shopSign);
            mapObjects.push(shopSign);
            
            // Leaderboard Tafel
            const board = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.3), new THREE.MeshStandardMaterial({ color: 0x335577 }));
            board.position.set(12, 2, -2);
            scene.add(board);
            mapObjects.push(board);
            
            // Spawnplattform
            const spawnPlat = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 4), new THREE.MeshStandardMaterial({ color: 0xcdba77 }));
            spawnPlat.position.set(0, 0, -2);
            scene.add(spawnPlat);
            mapObjects.push(spawnPlat);
            
            // Bacon Skin Statue
            const bacon = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.6, 0.8), new THREE.MeshStandardMaterial({ color: 0xE89F6E }));
            bacon.position.set(2, 0.8, -2);
            scene.add(bacon);
            mapObjects.push(bacon);
        }
        
        // ---------- ARENA (gespiegelt mit Rampen) ----------
        function buildArena() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(32, 32), new THREE.MeshStandardMaterial({ color: 0x6a9e6a, roughness: 0.7 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            mapObjects.push(ground);
            // Rampen (beide Seiten)
            const rampMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
            const rampL = new THREE.Mesh(new THREE.BoxGeometry(4, 0.4, 5), rampMat);
            rampL.position.set(-8, 0, 0);
            rampL.rotation.z = 0.3;
            scene.add(rampL); mapObjects.push(rampL);
            const rampR = new THREE.Mesh(new THREE.BoxGeometry(4, 0.4, 5), rampMat);
            rampR.position.set(8, 0, 0);
            rampR.rotation.z = -0.3;
            scene.add(rampR); mapObjects.push(rampR);
            // Mittelplattform
            const center = new THREE.Mesh(new THREE.BoxGeometry(5, 1, 5), new THREE.MeshStandardMaterial({ color: 0xccaa77 }));
            center.position.set(0, 0.5, 0);
            scene.add(center); mapObjects.push(center);
        }
        
        // ---------- CROSSROADS (Classic 2006) ----------
        function buildCrossroads() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({ color: 0x5a7a4a, roughness: 0.9 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground); mapObjects.push(ground);
            // 4 Türme
            const towerMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            for(let i=-1; i<=1; i+=2) {
                for(let j=-1; j<=1; j+=2) {
                    const tower = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 3), towerMat);
                    tower.position.set(i*12, 2, j*12);
                    scene.add(tower); mapObjects.push(tower);
                }
            }
            // Brücken
            const bridgeMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const bridgeX = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 2), bridgeMat);
            bridgeX.position.set(0, 2.2, 12);
            scene.add(bridgeX); mapObjects.push(bridgeX);
            const bridgeZ = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 10), bridgeMat);
            bridgeZ.position.set(12, 2.2, 0);
            scene.add(bridgeZ); mapObjects.push(bridgeZ);
        }
        
        // ---------- DOCKS (mit Containern) ----------
        function buildDocks() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(44, 44), new THREE.MeshStandardMaterial({ color: 0x7a7a7a, roughness: 0.8 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground); mapObjects.push(ground);
            const containerMat = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
            for(let i=-3; i<=3; i++) {
                const cont = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 4), containerMat);
                cont.position.set(i*4, 1.1, -8);
                scene.add(cont); mapObjects.push(cont);
                const cont2 = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 4), containerMat);
                cont2.position.set(i*4, 1.1, 8);
                scene.add(cont2); mapObjects.push(cont2);
            }
            // Kräne
            const craneBase = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 2), new THREE.MeshStandardMaterial({ color: 0x886644 }));
            craneBase.position.set(-14, 2.5, -10);
            scene.add(craneBase); mapObjects.push(craneBase);
        }
        
        // ---------- BATTLEGROUND (Hügel und Deckung) ----------
        function buildBattleground() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(48, 48), new THREE.MeshStandardMaterial({ color: 0x6a8c4a, roughness: 0.9 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.2;
            scene.add(ground); mapObjects.push(ground);
            // Hügel
            const hillMat = new THREE.MeshStandardMaterial({ color: 0x7cae5a });
            const hill = new THREE.Mesh(new THREE.CylinderGeometry(6, 8, 1.5, 16), hillMat);
            hill.position.set(0, 0.5, 0);
            scene.add(hill); mapObjects.push(hill);
            // Deckungen
            const coverMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
            for(let i=-2; i<=2; i++) {
                const cover = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 3), coverMat);
                cover.position.set(i*5, 0.6, -10);
                scene.add(cover); mapObjects.push(cover);
            }
        }
        
        // ---------- SHOOTING RANGE (groß) ----------
        function buildShootingRange() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(54, 54), new THREE.MeshStandardMaterial({ color: 0x5a7a5a }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground); mapObjects.push(ground);
            for(let i=-12; i<=12; i+=3) {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.3), new THREE.MeshStandardMaterial({ color: 0xdd6644 }));
                target.position.set(i, 0.8, 18);
                scene.add(target); mapObjects.push(target);
            }
            const platform = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 10), new THREE.MeshStandardMaterial({ color: 0xccaa77 }));
            platform.position.set(0, 0.2, 0);
            scene.add(platform); mapObjects.push(platform);
        }
        
        function switchMap(mapType) {
            clearMap();
            currentMap = mapType;
            if(mapType === 'lobby') buildLobby();
            else if(mapType === 'arena') buildArena();
            else if(mapType === 'crossroads') buildCrossroads();
            else if(mapType === 'docks') buildDocks();
            else if(mapType === 'battleground') buildBattleground();
            else if(mapType === 'shootingrange') buildShootingRange();
            camera.position.set(0, 1.65, 0);
            respawnAllEnemies();
            clearCollectibles();
            for(let i=0;i<12;i++) spawnCoin(new THREE.Vector3((Math.random()-0.5)*20, 0, (Math.random()-0.5)*18));
            for(let i=0;i<5;i++) spawnKey(new THREE.Vector3((Math.random()-0.5)*20, 0, (Math.random()-0.5)*18));
            const msg = document.createElement('div');
            msg.className = 'lobby-message';
            msg.innerText = `⬆️ TELETRANSPORTIERT ZU ${mapType.toUpperCase()} ⬆️`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }
        
        // -------------------- SPIELER BEWEGUNG --------------------
        let health = 100;
        let moveForward=false, moveBack=false, moveLeft=false, moveRight=false;
        let velocityY = 0;
        let isGrounded = true;
        const WALK_SPEED = 5.6;
        const JUMP_FORCE = 5.2;
        const GRAVITY = 16;
        
        let mouseX=0, mouseY=0, pitch=0, yaw=-Math.PI/2;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement) {
                mouseX += e.movementX * 0.0022;
                mouseY += e.movementY * 0.0022;
                mouseY = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, mouseY));
                yaw = mouseX;
                pitch = mouseY;
                camera.rotation.order = 'YXZ';
                camera.rotation.set(pitch, yaw, 0);
            }
        });
        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
        
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward=true; break;
                case 'KeyS': moveBack=true; break;
                case 'KeyA': moveLeft=true; break;
                case 'KeyD': moveRight=true; break;
                case 'Space': if(isGrounded) { velocityY = JUMP_FORCE; isGrounded=false; } break;
                case 'Digit1': switchWeapon(0); break;
                case 'Digit2': switchWeapon(1); break;
                case 'KeyR': reload(); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward=false; break;
                case 'KeyS': moveBack=false; break;
                case 'KeyA': moveLeft=false; break;
                case 'KeyD': moveRight=false; break;
            }
        });
        
        function updateMovement(delta) {
            const speed = WALK_SPEED * delta;
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3(0,0,0);
            if(moveForward) move.z -= 1;
            if(moveBack) move.z += 1;
            if(moveLeft) move.x -= 1;
            if(moveRight) move.x += 1;
            move.normalize();
            let dx = 0, dz = 0;
            dx += move.x * right.x * speed;
            dz += move.x * right.z * speed;
            dx += move.z * forward.x * speed;
            dz += move.z * forward.z * speed;
            let bound = getMapBound();
            let newX = camera.position.x + dx;
            let newZ = camera.position.z + dz;
            if(Math.abs(newX) < bound && Math.abs(newZ) < bound) {
                camera.position.x = newX;
                camera.position.z = newZ;
            }
            velocityY -= GRAVITY * delta;
            camera.position.y += velocityY * delta;
            if(camera.position.y <= 1.65) {
                camera.position.y = 1.65;
                velocityY = 0;
                isGrounded = true;
            } else isGrounded = false;
        }
        
        function collectItems() {
            for(let i=0;i<coinsList.length;i++) {
                if(camera.position.distanceTo(coinsList[i].position) < 1.3) {
                    scene.remove(coinsList[i]);
                    coinsList.splice(i,1);
                    coins += 10;
                    document.getElementById('coins-val').innerText = coins;
                    i--;
                }
            }
            for(let i=0;i<keysList.length;i++) {
                if(camera.position.distanceTo(keysList[i].position) < 1.3) {
                    scene.remove(keysList[i]);
                    keysList.splice(i,1);
                    keys++;
                    document.getElementById('keys-val').innerText = keys;
                    i--;
                }
            }
        }
        
        function enemyDamage() {
            for(let i=0;i<enemies.length;i++) {
                if(camera.position.distanceTo(enemies[i].position) < 1.35) {
                    health -= 14;
                    document.getElementById('health-val').innerText = Math.max(0,health);
                    document.getElementById('health-fill').style.width = Math.max(0,health) + '%';
                    if(health <= 0) {
                        alert("💀 DU WURDest BESIEGT! ZURÜCK IN DIE LOBBY 💀");
                        health = 100;
                        coins = 0;
                        keys = 0;
                        document.getElementById('health-val').innerText = 100;
                        document.getElementById('health-fill').style.width = '100%';
                        document.getElementById('coins-val').innerText = '0';
                        document.getElementById('keys-val').innerText = '0';
                        switchMap('lobby');
                    }
                    const dir = new THREE.Vector3().subVectors(camera.position, enemies[i].position).normalize();
                    camera.position.x += dir.x * 1.8;
                    camera.position.z += dir.z * 1.8;
                    break;
                }
            }
        }
        
        function enemyAI(delta) {
            for(let enemy of enemies) {
                const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                enemy.position.x += dir.x * enemy.userData.speed * delta;
                enemy.position.z += dir.z * enemy.userData.speed * delta;
                let bound = getMapBound()-1.5;
                enemy.position.x = Math.max(-bound, Math.min(bound, enemy.position.x));
                enemy.position.z = Math.max(-bound, Math.min(bound, enemy.position.z));
                enemy.lookAt(camera.position);
            }
        }
        
        // -------------------- MOBILE --------------------
        const touchBtns = document.querySelectorAll('.touch-btn');
        touchBtns.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const action = btn.dataset.action;
                if(action === 'forward') moveForward=true;
                if(action === 'back') moveBack=true;
                if(action === 'left') moveLeft=true;
                if(action === 'right') moveRight=true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') switchWeapon(0);
                if(action === 'weapon2') switchWeapon(1);
                if(action === 'reload') reload();
            });
            btn.addEventListener('touchend', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward=false;
                    if(action === 'back') moveBack=false;
                    if(action === 'left') moveLeft=false;
                    if(action === 'right') moveRight=false;
                }
            });
            btn.addEventListener('mousedown', (e) => {
                const action = btn.dataset.action;
                if(action === 'forward') moveForward=true;
                if(action === 'back') moveBack=true;
                if(action === 'left') moveLeft=true;
                if(action === 'right') moveRight=true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') switchWeapon(0);
                if(action === 'weapon2') switchWeapon(1);
                if(action === 'reload') reload();
            });
            btn.addEventListener('mouseup', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward=false;
                    if(action === 'back') moveBack=false;
                    if(action === 'left') moveLeft=false;
                    if(action === 'right') moveRight=false;
                }
            });
        });
        
        window.addEventListener('click', (e) => {
            if(document.pointerLockElement === renderer.domElement) shoot();
        });
        
        document.getElementById('change-map-btn').addEventListener('click', () => {
            const selected = document.getElementById('map-select').value;
            switchMap(selected);
        });
        
        // -------------------- ANIMATION --------------------
        let lastTime = performance.now();
        switchMap('lobby');
        updateAmmoUI();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            updateMovement(delta);
            collectItems();
            enemyDamage();
            enemyAI(delta);
            coinsList.forEach(c => c.rotation.z += 0.04);
            keysList.forEach(k => k.rotation.y += 0.03);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("🔥 RIVALS ORIGINALGETREU GELADEN 🔥");
    </script>
</body>
</html>
