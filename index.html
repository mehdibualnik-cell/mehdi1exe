<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Unendliche Bergfahrt</title>
    <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

// Szene, Kamera, Renderer
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xff7f50); // Sonnenuntergangs-Orange
scene.fog = new THREE.Fog(0xff7f50, 20, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffcc88, 1.2);
sunLight.position.set(-20, 10, 20);
scene.add(sunLight);

// --- Das Auto ---
const carGroup = new THREE.Group();
const carBody = new THREE.Mesh(
    new THREE.BoxGeometry(1, 0.4, 2),
    new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.4 })
);
carBody.position.y = 0.2;
carGroup.add(carBody);

// Räder
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const wheelGeom = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 8);
wheelGeom.rotateX(Math.PI / 2);
const wheelPos = [[-0.6,0.1,0.8], [0.6,0.1,0.8], [-0.6,0.1,-0.8], [0.6,0.1,-0.8]];
wheelPos.forEach(pos => {
    const wheel = new THREE.Mesh(wheelGeom, wheelMat);
    wheel.position.set(pos[0], pos[1], pos[2]);
    carGroup.add(wheel);
});
carGroup.position.y = 0.3;
scene.add(carGroup);

// --- Straße und Welt ---
const roadLength = 30;
const roadMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
const roadStrip = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
const mountainMat = new THREE.MeshLambertMaterial({ color: 0x6a8e6a });

let spawnZ = 0; // KORRIGIERT: Straße beginnt bei 0 (direkt unter dem Auto)

function addRoadSegment() {
    // Boden (Gras/Hügel)
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, roadLength), new THREE.MeshLambertMaterial({ color: 0x3a5f3a }));
    ground.rotation.x = -Math.PI / 2;
    ground.position.z = spawnZ;
    scene.add(ground);

    // Straße (asphaltiert)
    const road = new THREE.Mesh(new THREE.PlaneGeometry(4, roadLength), roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.y = 0.02;
    road.position.z = spawnZ;
    scene.add(road);

    // Berge
    for(let side = -1; side <= 1; side+=2) {
        for(let i = 0; i < 3; i++) {
            const mount = new THREE.Mesh(new THREE.ConeGeometry(3 + Math.random()*8, 2 + Math.random()*10, 6), mountainMat);
            mount.position.x = side * (8 + Math.random()*20);
            mount.position.z = spawnZ + (Math.random()*20 - 10);
            mount.position.y = 2;
            scene.add(mount);
        }
    }
    
    spawnZ -= roadLength;
}

// Erste Segmente generieren
for(let i=0; i<20; i++) addRoadSegment();

// --- Steuerung ---
let speed = 0;
let maxSpeed = 0.5;
let acceleration = 0.02;
let friction = 0.008;

window.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowUp') speed += acceleration;
    if(e.key === 'ArrowDown') speed -= acceleration;
    if(e.key === 'ArrowLeft') carGroup.rotation.y += 0.05;
    if(e.key === 'ArrowRight') carGroup.rotation.y -= 0.05;
});

// --- Game Loop ---
function animate() {
    requestAnimationFrame(animate);

    speed *= (1 - friction);
    if (speed > maxSpeed) speed = maxSpeed;
    if (speed < -maxSpeed/2) speed = -maxSpeed/2;
    
    const direction = new THREE.Vector3(0, 0, -1);
    direction.applyQuaternion(carGroup.quaternion);
    carGroup.position.add(direction.multiplyScalar(speed));

    // Kamera immer hinter dem Auto
    camera.position.copy(carGroup.position);
    camera.position.y += 4;
    camera.position.z += 8;
    camera.lookAt(carGroup.position.x, carGroup.position.y, carGroup.position.z - 10);

    renderer.render(scene, camera);
}
animate();

// Fenster-Größe anpassen
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
