<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Game Portal – Rivals & mehr</title>
    <!-- Tailwind CSS + Font Awesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Übergänge für Modale */
        .modal-transition {
            transition: opacity 0.2s ease, visibility 0.2s;
        }
        .game-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <div id="root"></div>

    <script>
        // ----------------------------- SPIELE-DATEN (wie lib/games.ts) -----------------------------
        const gamesData = [
            {
                slug: "rivals-roblox",
                title: "Rivals (Roblox)",
                category: "Roblox",
                thumbnail: "https://placehold.co/800x500/1e293b/white?text=Rivals",
                embedUrl: "https://www.gameflare.com/embed/rivals-roblox/",  // originaler Rivals-Embed
                likes: 1240,
                description: "Spiele Rivals, das actiongeladene Roblox-Spiel, direkt im Browser – originalgetreue Unity-Version."
            },
            {
                slug: "another-game",
                title: "Another Game",
                category: "Adventure",
                thumbnail: "https://placehold.co/800x500/334155/white?text=Another+Game",
                embedUrl: "https://www.gameflare.com/embed/slope/",   // Beispiel: Slope (funktioniert)
                likes: 680,
                description: "Ein spannendes Adventure-Spiel mit vielen Leveln."
            },
            {
                slug: "puzzle-time",
                title: "Puzzle Time",
                category: "Puzzle",
                thumbnail: "https://placehold.co/800x500/475569/white?text=Puzzle+Time",
                embedUrl: "https://www.gameflare.com/embed/2048/",
                likes: 420,
                description: "Klassisches Puzzlespiel für zwischendurch."
            }
        ];

        // ----------------------------- HELFER -----------------------------
        // Einfache client-seitige "Navigation": Wir verstecken die Startseite und zeigen die Detailseite an
        let currentGame = null;   // null = Startseite, sonst Game-Objekt

        // Funktion zum Rendern der gesamten App (abhängig von currentGame)
        function render() {
            const root = document.getElementById('root');
            if (!root) return;
            if (currentGame === null) {
                root.innerHTML = renderHomePage();
                attachHomeEventListeners();
            } else {
                root.innerHTML = renderGameDetailPage(currentGame);
                attachDetailEventListeners();
            }
        }

        // Startseite (wie page.tsx)
        function renderHomePage() {
            const categories = [...new Set(gamesData.map(g => g.category))];
            // Beliebte Spiele (sortiert nach Likes)
            const popular = [...gamesData].sort((a,b) => (b.likes||0) - (a.likes||0)).slice(0,6);
            // Filterstate: wir speichern Suchbegriff in einer Variablen außerhalb, wird beim Tippen aktualisiert
            // Da der Filter clientseitig ist, bauen wir die Logik direkt in die Event-Listener ein.
            // Wir rendern die Startseite mit einer leeren Suchabfrage und aktualisieren über eine separate Funktion.
            // Damit der Filter funktioniert, müssen wir die Spieleliste dynamisch neu rendern.
            // Deshalb verwenden wir hier einen Container für die Spiele-Grid, der später neu befüllt wird.
            return `
                <main class="max-w-6xl mx-auto px-4 py-8">
                    <header class="mb-8">
                        <h1 class="text-2xl md:text-3xl font-bold">Game Portal</h1>
                        <p class="text-gray-600 mt-2 text-sm md:text-base">Ähnlich wie Gameflare – eigene Demo-Struktur. 🎮</p>
                        <div class="mt-5 max-w-2xl">
                            <input type="text" id="searchInput" placeholder="Suche nach Spielen…" class="w-full rounded-xl border px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white" autocomplete="off">
                        </div>
                        <div class="mt-6 flex flex-wrap gap-2" id="categoryContainer">
                            ${categories.map(c => `<span class="rounded-full border bg-white px-3 py-1 text-xs text-gray-700 category-chip" data-cat="${c}">${c}</span>`).join('')}
                        </div>
                    </header>

                    <section class="mb-10">
                        <h2 class="text-lg font-semibold mb-4">🔥 Beliebt</h2>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="popularGrid">
                            ${popular.map(game => renderGameCard(game)).join('')}
                        </div>
                    </section>

                    <section>
                        <h2 class="text-lg font-semibold mb-4">Alle Spiele</h2>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="allGamesGrid">
                            ${gamesData.map(game => renderGameCard(game)).join('')}
                        </div>
                    </section>
                </main>
            `;
        }

        // Einzelne Spielkarte (HTML)
        function renderGameCard(game) {
            return `
                <div class="game-card group block rounded-xl border bg-white shadow-sm hover:shadow-md transition-all cursor-pointer" data-slug="${game.slug}">
                    <div class="aspect-video overflow-hidden rounded-t-xl">
                        <img src="${game.thumbnail}" alt="${game.title}" class="h-full w-full object-cover group-hover:scale-[1.03] transition-transform">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm md:text-base">${escapeHtml(game.title)}</h3>
                        <p class="text-xs text-gray-500 mt-1">${escapeHtml(game.category)}</p>
                        ${typeof game.likes === 'number' ? `<p class="text-xs text-gray-500 mt-2">🔥 ${game.likes} likes</p>` : ''}
                    </div>
                </div>
            `;
        }

        // Detailseite (wie game/[slug]/page.tsx)
        function renderGameDetailPage(game) {
            return `
                <main class="max-w-6xl mx-auto px-4 py-8">
                    <button id="backButton" class="mb-4 inline-flex items-center gap-2 text-sm bg-gray-200 hover:bg-gray-300 rounded-full px-4 py-2 transition">
                        <i class="fas fa-arrow-left"></i> Zurück
                    </button>
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="md:w-2/3">
                            <h1 class="text-2xl font-bold">${escapeHtml(game.title)}</h1>
                            <p class="text-gray-600 mt-2 text-sm">${escapeHtml(game.category)}</p>
                            <div class="mt-5 rounded-2xl border bg-white overflow-hidden">
                                <div class="aspect-video">
                                    <iframe src="${game.embedUrl}" title="${escapeHtml(game.title)}" class="h-full w-full" allowFullScreen></iframe>
                                </div>
                            </div>
                        </div>
                        <aside class="md:w-1/3">
                            <div class="rounded-2xl border bg-white p-4">
                                <h2 class="font-semibold">Spielinfo</h2>
                                <ul class="text-sm text-gray-700 mt-3 space-y-2">
                                    <li>⭐ Kategorie: ${escapeHtml(game.category)}</li>
                                    <li>🔥 Likes: ${game.likes ?? 0}</li>
                                    <li class="text-xs text-gray-500">Hinweis: Embed-URL muss erlaubt sein. Rivals original von Gameflare.</li>
                                </ul>
                                <div class="mt-4">
                                    <img src="${game.thumbnail}" alt="${game.title}" class="w-full rounded-xl border">
                                </div>
                            </div>
                        </aside>
                    </div>
                </main>
            `;
        }

        // Helper: HTML-escapes (Sicherheit)
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Event-Listener für Startseite: Suche, Kategorie-Chips, Kartenklicks
        function attachHomeEventListeners() {
            const searchInput = document.getElementById('searchInput');
            const categoryChips = document.querySelectorAll('.category-chip');
            const allGamesGrid = document.getElementById('allGamesGrid');
            // Die Popular-Grid wird nicht gefiltert, nur die "Alle Spiele"-Liste

            function filterGames() {
                const searchTerm = searchInput ? searchInput.value.trim().toLowerCase() : '';
                let activeCategory = null;
                // aktive Kategorie aus den Chips (die mit active-Klasse)
                for (let chip of categoryChips) {
                    if (chip.classList.contains('bg-blue-100')) {
                        activeCategory = chip.getAttribute('data-cat');
                        break;
                    }
                }
                const filtered = gamesData.filter(game => {
                    const matchesSearch = searchTerm === '' || game.title.toLowerCase().includes(searchTerm) || game.category.toLowerCase().includes(searchTerm);
                    const matchesCategory = !activeCategory || game.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
                if (allGamesGrid) {
                    allGamesGrid.innerHTML = filtered.map(game => renderGameCard(game)).join('');
                    // Neue Karten mit Event-Listenern versehen
                    document.querySelectorAll('.game-card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            const slug = card.getAttribute('data-slug');
                            const game = gamesData.find(g => g.slug === slug);
                            if (game) {
                                currentGame = game;
                                render();
                            }
                        });
                    });
                }
            }

            // Suche-Event
            if (searchInput) {
                searchInput.addEventListener('input', filterGames);
            }
            // Kategorie-Chip-Klick
            categoryChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    // Entferne active-Klasse von allen
                    categoryChips.forEach(c => c.classList.remove('bg-blue-100', 'text-blue-800', 'border-blue-300'));
                    chip.classList.add('bg-blue-100', 'text-blue-800', 'border-blue-300');
                    filterGames();
                });
            });
            // Alle Spielkarten mit Klick-Events versehen
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const slug = card.getAttribute('data-slug');
                    const game = gamesData.find(g => g.slug === slug);
                    if (game) {
                        currentGame = game;
                        render();
                    }
                });
            });
            // Initialen Filter anwenden (um Kategorie-Highlight zu setzen, aber keine active)
            filterGames();
        }

        function attachDetailEventListeners() {
            const backBtn = document.getElementById('backButton');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    currentGame = null;
                    render();
                });
            }
        }

        // Erster Render
        render();
    </script>
</body>
</html>
