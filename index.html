<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fußball - HTML Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; user-select: none; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); z-index: 10;
            backdrop-filter: blur(5px);
        }
        #menu-box {
            background: #2b2b2b; border: 2px solid #555; border-radius: 12px;
            padding: 30px; text-align: center; color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 400px;
        }
        #menu-box h2 { margin: 0 0 20px 0; color: #ffcc00; font-size: 24px; }
        .team-btn {
            padding: 15px 30px; margin: 10px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer; width: 120px;
            transition: transform 0.1s, box-shadow 0.1s; color: white;
        }
        .team-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        #btn-croatia { background: #ff0000; border-bottom: 4px solid #ffffff; }
        #btn-sweden { background: #006eb6; border-bottom: 4px solid #fecb00; }
        
        #hud {
            position: absolute; top: 20px; left: 0; width: 100%; pointer-events: none;
            text-align: center; color: white; text-shadow: 1px 1px 4px black;
            font-size: 24px; z-index: 5;
        }
        #hud span { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; margin: 0 10px; }
        #instructions {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.6); padding: 10px 15px;
            border-radius: 8px; font-size: 14px; pointer-events: none; z-index: 5;
            text-align: left; line-height: 1.5;
        }
        .green-bar-container {
            width: 200px; height: 20px; background: #333; border-radius: 10px;
            margin: 10px auto; overflow: hidden; border: 2px solid #555;
        }
        .green-bar { height: 100%; width: 100%; background: #00ff00; transition: width 0.2s; }
    </style>
</head>
<body>

    <!-- Team Selection Menu (UI) -->
    <div id="ui-overlay">
        <div id="menu-box">
            <h2>⚽ TEAM WÄHLEN</h2>
            <div>
                <button id="btn-croatia" class="team-btn">Kroatien</button>
                <button id="btn-sweden" class="team-btn">Schweden</button>
            </div>
            <p style="margin-top: 20px; font-size: 12px; color: #888;">(KI-Torwart springt nach links/rechts/oben)</p>
            <div class="green-bar-container"><div class="green-bar" id="stamina-bar"></div></div>
            <div style="margin-top: 10px; font-size: 16px; background: #444; padding: 5px; border-radius: 5px;">
                Tore: <span id="score-display">0</span>
            </div>
        </div>
    </div>

    <!-- In-Game HUD -->
    <div id="hud">
        <span id="timer">4:25</span>
    </div>
    <div id="instructions">
        <b>Steuerung:</b><br>
        WASD: Laufen<br>
        LEERTASTE: Schießen
    </div>

    <script>
        // --- 1. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Himmelblau
        scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Licht
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- 2. 3D SZENE (PLATZ & TOR) ---
        // Boden
        const floorGeo = new THREE.PlaneGeometry(40, 30);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Linien
        function createLine(points) {
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0xffffff });
            return new THREE.Line(geo, mat);
        }
        scene.add(createLine([new THREE.Vector3(-15, 0.1, -12), new THREE.Vector3(15, 0.1, -12)])); // Strafraum

        // Tor
        const pillarMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        function createPillar(x, y, z) {
            const p = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2.5, 8), pillarMat);
            p.position.set(x, y, z);
            return p;
        }
        const goalGroup = new THREE.Group();
        goalGroup.add(createPillar(-2.5, 1.25, -15));
        goalGroup.add(createPillar(2.5, 1.25, -15));
        const crossbar = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 5, 8), pillarMat);
        crossbar.rotation.z = Math.PI / 2;
        crossbar.position.set(0, 2.5, -15);
        goalGroup.add(crossbar);
        scene.add(goalGroup);

        // Netz (Einfache Platte)
        const netMat = new THREE.MeshBasicMaterial({ color: 0xcccccc, wireframe: true, transparent: true, opacity: 0.3 });
        const net = new THREE.Mesh(new THREE.PlaneGeometry(5, 2.5), netMat);
        net.position.set(0, 1.25, -15.1);
        scene.add(net);

        // --- 3. SPIELER, BALL & TORWART ---
        let playerTeam = { shirt: 0xff0000, pants: 0xffffff }; // Standard Kroatien
        let score = 0;

        // Spieler-Charakter
        const playerGroup = new THREE.Group();
        // Torso
        const torsoMat = new THREE.MeshLambertMaterial({ color: playerTeam.shirt });
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 0.4), torsoMat);
        torso.position.y = 0.85;
        // Beine
        const legMat = new THREE.MeshLambertMaterial({ color: playerTeam.pants });
        const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.2), legMat);
        legL.position.set(-0.2, 0.35, 0);
        const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.2), legMat);
        legR.position.set(0.2, 0.35, 0);
        // Kopf
        const headMat = new THREE.MeshLambertMaterial({ color: 0xffaa88 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), headMat);
        head.position.y = 1.45;
        
        playerGroup.add(torso, legL, legR, head);
        playerGroup.position.set(0, 0, 5);
        playerGroup.castShadow = true;
        scene.add(playerGroup);

        // Ball
        const ballMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.3, metalness: 0.2 });
        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), ballMat);
        ball.position.set(0, 0.25, 4.5);
        ball.castShadow = true;
        scene.add(ball);
        
        // Ball Physik Variablen
        let velocity = new THREE.Vector3(0, 0, 0);

        // Torwart (KI)
        const keeperGroup = new THREE.Group();
        const keeperMat = new THREE.MeshLambertMaterial({ color: 0xffff00 });
        const keeperBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.8, 8), keeperMat);
        keeperBody.position.y = 0.4;
        const keeperHead = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshLambertMaterial({ color: 0xffaa88 }));
        keeperHead.position.y = 1.0;
        keeperGroup.add(keeperBody, keeperHead);
        keeperGroup.position.set(0, 0, -14.5);
        scene.add(keeperGroup);

        let keeperTargetPos = new THREE.Vector3(0, 0, -14.5);
        let isSaving = false;
        let saveTimer = 0;

        // --- 4. STEUERUNG & EINGABEN ---
        const keys = { w: false, a: false, s: false, d: false, space: false };
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === ' ') { keys.space = true; e.preventDefault(); }
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
            if (e.key === ' ') { keys.space = false; e.preventDefault(); }
        });

        // --- 5. TEAM-AUSWAHL UI ---
        const uiOverlay = document.getElementById('ui-overlay');
        document.getElementById('btn-croatia').onclick = () => {
            playerTeam.shirt = 0xff0000; playerTeam.pants = 0xffffff;
            updatePlayerColors();
            uiOverlay.style.display = 'none';
        };
        document.getElementById('btn-sweden').onclick = () => {
            playerTeam.shirt = 0xfecb00; playerTeam.pants = 0x006eb6;
            updatePlayerColors();
            uiOverlay.style.display = 'none';
        };

        function updatePlayerColors() {
            torso.material.color.setHex(playerTeam.shirt);
            legL.material.color.setHex(playerTeam.pants);
            legR.material.color.setHex(playerTeam.pants);
            // Torwart Farben an Team anpassen
            if(playerTeam.shirt === 0xff0000) keeperMat.color.setHex(0x0000ff); // Rot -> Blauer TW
            else keeperMat.color.setHex(0xffaa00); // Gelb -> Oranger TW
        }

        // --- 6. SPIEL-LOGIK (PHYSIK & KI) ---
        function handleShoot() {
            if (velocity.length() > 0.1) return; // Ball bereits unterwegs

            // Richtung ermitteln
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(playerGroup.quaternion);
            
            // Ball schießen
            velocity.copy(dir.multiplyScalar(0.8));
            velocity.y = 0.4; // Flaches "Hoch" (Lupfer)
            
            ball.position.copy(playerGroup.position);
            ball.position.y = 0.25;
            ball.position.z -= 1.5; // Vor den Spieler legen
            velocity.z -= 0.2; // Etwas Schwung nach vorne geben
        }

        function updateKeeper() {
            if (velocity.length() > 0.1) { // Wenn Ball fliegt
                isSaving = true;
                // KI Logik: Zufälliges Ziel (Links, Rechts, Oben)
                if (saveTimer <= 0) {
                    const rand = Math.random();
                    let targetX = 0, targetY = 0;
                    if (rand < 0.33) { targetX = -2.5; targetY = 1.5; } // Links
                    else if (rand < 0.66) { targetX = 2.5; targetY = 1.5; } // Rechts
                    else { targetX = 0; targetY = 3.0; } // Oben springen
                    
                    keeperTargetPos.set(targetX, targetY, -14.5);
                    saveTimer = 15; // Erhöhte Reaktionszeit für Bewegung
                }
            } else {
                isSaving = false;
                if (saveTimer <= 0) {
                    keeperTargetPos.set(0, 1, -14.5); // Rückkehr zur Mitte
                }
            }
            saveTimer--;

            // Bewegung (Lerp / Smooth)
            keeperGroup.position.x += (keeperTargetPos.x - keeperGroup.position.x) * 0.15;
            keeperGroup.position.y += (keeperTargetPos.y - keeperGroup.position.y) * 0.15;
            if (keeperGroup.position.y < 1) keeperGroup.position.y = 1; // Boden-Höhe
        }

        // --- 7. ANIMATIONS-SCHLEIFE ---
        const staminaBar = document.getElementById('stamina-bar');
        const scoreDisplay = document.getElementById('score-display');

        function animate() {
            requestAnimationFrame(animate);

            // 1. Spieler-Bewegung
            const speed = 0.15;
            const moveDir = new THREE.Vector3(0, 0, 0);
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) { moveDir.x -= 1; playerGroup.rotation.y += 0.05; }
            if (keys.d) { moveDir.x += 1; playerGroup.rotation.y -= 0.05; }
            
            if (moveDir.length() > 0) {
                moveDir.normalize();
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(playerGroup.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(playerGroup.quaternion);
                const movement = forward.multiplyScalar(moveDir.z).add(right.multiplyScalar(moveDir.x));
                playerGroup.position.add(movement.multiplyScalar(speed));
                
                // Begrenzung Spielfeld
                playerGroup.position.x = Math.max(-13, Math.min(13, playerGroup.position.x));
                playerGroup.position.z = Math.max(-13, Math.min(15, playerGroup.position.z));
            }

            // 2. Ball Physik
            if (velocity.length() > 0.01) {
                velocity.y -= 0.015; // Schwerkraft
                ball.position.add(velocity);
                
                // Boden-Abprall
                if (ball.position.y < 0.25) {
                    ball.position.y = 0.25;
                    velocity.y *= -0.5; // Dämpfung
                    if (Math.abs(velocity.y) < 0.05) velocity.y = 0;
                }
                
                // Wände (Seitlich)
                if (Math.abs(ball.position.x) > 14) { velocity.x *= -0.5; ball.position.x = 14 * Math.sign(ball.position.x); }
                if (ball.position.z < -17) { // Tor erzielt!
                    if (ball.position.x > -2.5 && ball.position.x < 2.5) {
                        score++;
                        scoreDisplay.innerText = score;
                        // Reset Ball
                        velocity.set(0, 0, 0);
                        ball.position.set(0, 0.25, 4);
                    } else {
                        velocity.x *= -0.5;
                        velocity.z *= -0.5;
                        ball.position.z = -16.5;
                    }
                }
                if (ball.position.z > 17) { velocity.z *= -0.5; ball.position.z = 16.5; }

                // Dämpfung (Reibung)
                velocity.x *= 0.99;
                velocity.z *= 0.99;
            } else {
                velocity.set(0, 0, 0);
                // Ball am Boden kleben lassen
                if(ball.position.y > 0.25) ball.position.y -= 0.1;
            }

            // 3. Torwart Interaktion
            if (ball.position.distanceTo(keeperGroup.position) < 0.6) {
                // Abgefangen!
                velocity.set(0, 0, 0);
                ball.position.set(0, 0.25, 4); // Zurücksetzen
            }

            // 4. Schießen
            if (keys.space && velocity.length() < 0.05) {
                handleShoot();
                keys.space = false; // Einzelschuss
                staminaBar.style.width = '10%'; // "Ausdauer" Effekt
                setTimeout(() => { staminaBar.style.width = '100%'; }, 1000);
            }

            // 5. KI Keeper Logik
            updateKeeper();

            // 6. Kamera (Third-Person)
            const camOffset = new THREE.Vector3(0, 2, 6);
            const targetPos = playerGroup.position.clone().add(camOffset);
            camera.position.lerp(targetPos, 0.1);
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1, playerGroup.position.z - 2);

            renderer.render(scene, camera);
        }

        // Fenster Größe anpassen
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
