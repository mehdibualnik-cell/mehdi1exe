<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meccha Chameleon - Reloaded</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; background: #0a0a0a; }
        
        /* --- STARTSEITE --- */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #1e272e; color: white; z-index: 100; text-align: center; }
        #start-screen h1 { font-size: 44px; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.4); margin-bottom: 5px; letter-spacing: 2px; }
        #start-screen p { font-size: 14px; color: #7f8c8d; margin-bottom: 30px; }
        
        .menu-container { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 300px; }
        .menu-btn { padding: 18px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; color: white; cursor: pointer; transition: transform 0.2s; width: 100%; }
        .menu-btn:active { transform: scale(0.95); }
        .btn-local { background: linear-gradient(135deg, #00b894, #00cec9); box-shadow: 0 5px 15px rgba(0, 206, 201, 0.3); }
        .btn-mp { background: linear-gradient(135deg, #6c5ce7, #a29bfe); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3); }
        .btn-mp:disabled { opacity: 0.5; transform: none; }

        /* --- GAME UI --- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; flex-direction: column; z-index: 10; }
        
        #top-bar { display: flex; justify-content: space-between; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        #status { font-size: 14px; padding: 6px 14px; background: rgba(0,0,0,0.6); border-radius: 20px; color: #4cd137; border: 1px solid rgba(255,255,255,0.1); }
        #timer { font-size: 26px; font-weight: bold; color: #4cd137; }
        #timer.danger { color: #e74c3c; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Unten Steuerung */
        #bottom-area { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; }
        
        #joystick-area { width: 130px; height: 130px; background: radial-gradient(circle, rgba(255,255,255,0.1), transparent); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-inner { width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; transition: all 0.05s; }

        #action-tools { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .color-row { display: flex; gap: 8px; justify-content: flex-end; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .color-btn:active { transform: scale(0.85); }
        .color-btn.selected { border-color: #f1c40f; transform: scale(1.1); }
        
        #paint-mode-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #34495e; color: white; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: 0.1s; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #paint-mode-btn.active { background: #e67e22; box-shadow: 0 0 20px rgba(230, 126, 34, 0.5); }

        /* Posen Knopf oben rechts */
        #pose-menu-btn { position: absolute; top: 90px; right: 20px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.7); color: white; font-size: 22px; pointer-events: auto; cursor: pointer; z-index: 20; display: flex; justify-content: center; align-items: center; }
        #pose-menu { position: absolute; top: 150px; right: 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; pointer-events: auto; display: none; flex-direction: column; gap: 8px; z-index: 20; min-width: 100px; }
        #pose-menu.open { display: flex; }
        .pose-opt { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: 0.1s; }
        .pose-opt:active { background: rgba(255,255,255,0.2); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- STARTSEITE -->
    <div id="start-screen">
        <h1>MECCHA</h1>
        <h1 style="color:#e74c3c; margin-top:-15px;">CHAMELEON</h1>
        <p>Wähle dein Spielmodus</p>
        <div class="menu-container">
            <button class="menu-btn btn-local" id="btn-local">🎮 Lokal (vs KI)</button>
            <button class="menu-btn btn-mp" disabled>🌐 Multiplayer (Bald)</button>
        </div>
    </div>

    <!-- SPIEL UI -->
    <div id="ui-layer">
        <div id="top-bar">
            <div id="status">🟢 Tarnung</div>
            <div id="timer">30s</div>
        </div>
        
        <button id="pose-menu-btn">🎭</button>
        <div id="pose-menu">
            <button class="pose-opt" data-pose="stand">🧍 Stehen</button>
            <button class="pose-opt" data-pose="hands_up">🙌 Arme hoch</button>
            <button class="pose-opt" data-pose="lie">🛌 Liegen</button>
            <button class="pose-opt" data-pose="squat">🧎 Hocken</button>
        </div>

        <div id="bottom-area">
            <div id="joystick-area"><div id="joystick-inner"></div></div>
            <div id="action-tools">
                <div class="color-row">
                    <div class="color-btn selected" style="background:#e74c3c;" data-color="#e74c3c"></div>
                    <div class="color-btn" style="background:#3498db;" data-color="#3498db"></div>
                    <div class="color-btn" style="background:#f1c40f;" data-color="#f1c40f"></div>
                </div>
                <div class="color-row">
                    <div class="color-btn" style="background:#2ecc71;" data-color="#2ecc71"></div>
                    <div class="color-btn" style="background:#9b59b6;" data-color="#9b59b6"></div>
                    <div class="color-btn" style="background:#e67e22;" data-color="#e67e22"></div>
                </div>
                <div class="color-row" style="justify-content: flex-end;">
                    <button id="paint-mode-btn">🎨 Malen</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- START LOGIK ---
        const startScreen = document.getElementById('start-screen');
        const uiLayer = document.getElementById('ui-layer');
        let scene, camera, renderer, player, aiGroup, bodyParts = [];
        let moveX = 0, moveY = 0;
        let isPrepPhase = true;
        let isGameActive = false;
        let timeLeft = 30;
        let isPainting = false;
        let currentColor = '#e74c3c';

        document.getElementById('btn-local').addEventListener('click', () => {
            startScreen.style.display = 'none';
            uiLayer.style.display = 'flex';
            initGame();
        });

        // --- SPIEL ENGINE ---
        function initGame() {
            scene = new THREE.Scene();
            // Helle Raumfarbe
            scene.background = new THREE.Color(0xecf0f1);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lichter
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // --- ECHTE 3D MAP (Stilvoll) ---
            // Holzboden
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.9 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.5;
            floor.receiveShadow = true;
            scene.add(floor);

            // Backstein-Rückwand (Meccha Chameleon Style)
            const brickMat = new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.7 });
            const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 8, 0.5), brickMat);
            wall.position.set(0, 3, -5);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            
            // Steinmuster (Optische Täuschung für Textur) - Würfel als Steine
            for(let i=0; i<30; i++) {
                const stone = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.3), new THREE.MeshStandardMaterial({color: 0xe74c3c, roughness: 0.6}));
                stone.position.set((Math.random()-0.5)*18, Math.random()*6 + 0.5, -4.7);
                scene.add(stone);
            }

            // Bücherregal auf der linken Seite
            const shelfMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.9 });
            const shelf = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 0.5), shelfMat);
            shelf.position.set(-7, 2, -4);
            scene.add(shelf);

            // --- 3D CHARAKTER (Rund & weich) ---
            player = new THREE.Group();
            player.position.set(0, 0, 3);
            scene.add(player);

            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
            
            // Rumpf
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.8, 16), whiteMat);
            body.position.y = 0.8;
            body.name = "body";
            body.castShadow = true;
            player.add(body);
            bodyParts.push(body);

            // Kopf
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 24, 24), whiteMat);
            head.position.y = 1.5;
            head.name = "head";
            head.castShadow = true;
            player.add(head);
            bodyParts.push(head);

            // Smiley
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
            eye1.position.set(-0.12, 0.1, 0.38);
            head.add(eye1);
            const eye2 = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
            eye2.position.set(0.12, 0.1, 0.38);
            head.add(eye2);
            
            // Arme
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6, 8), whiteMat);
            armL.position.set(-0.5, 1.0, 0);
            armL.rotation.z = 0.2;
            armL.name = "armL";
            armL.castShadow = true;
            player.add(armL);
            bodyParts.push(armL);

            const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6, 8), whiteMat);
            armR.position.set(0.5, 1.0, 0);
            armR.rotation.z = -0.2;
            armR.name = "armR";
            armR.castShadow = true;
            player.add(armR);
            bodyParts.push(armR);

            // --- KI GEGNER (Der Sucher) ---
            aiGroup = new THREE.Group();
            aiGroup.position.set(-4, 0, 0);
            scene.add(aiGroup);
            
            const aiMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.4 });
            const aiBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.8, 16), aiMat);
            aiBody.position.y = 0.8;
            aiGroup.add(aiBody);
            const aiHead = new THREE.Mesh(new THREE.SphereGeometry(0.4, 24, 24), aiMat);
            aiHead.position.y = 1.5;
            aiGroup.add(aiHead);

            // --- TIMER & LOGIK ---
            isGameActive = true;
            isPrepPhase = true;
            timeLeft = 30;
            const timerDisplay = document.getElementById('timer');
            const statusDisplay = document.getElementById('status');
            
            // Gegner verstecken während der Tarnung
            aiGroup.visible = false;

            const gameLoop = setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    timerDisplay.innerText = timeLeft + "s";
                    if(timeLeft <= 5) timerDisplay.classList.add('danger');
                } else {
                    if(isPrepPhase) {
                        // Übergang zur Suche
                        isPrepPhase = false;
                        statusDisplay.innerText = "🔴 SUCHT!";
                        aiGroup.visible = true; // KI erscheint
                        timerDisplay.classList.remove('danger');
                        timeLeft = 60; // 60 Sekunden suchen
                        timerDisplay.innerText = timeLeft + "s";
                    } else {
                        // Zeit abgelaufen, Spieler gewinnt
                        isGameActive = false;
                        statusDisplay.innerText = "🏆 GEWONNEN!";
                        timerDisplay.innerText = "GEWONNEN";
                        clearInterval(gameLoop);
                    }
                }
            }, 1000);

            // --- STEUERUNG ---
            setupControls(aiGroup, statusDisplay, timerDisplay);
            animate(aiGroup, statusDisplay, timerDisplay);
        }

        // --- STEUERUNG & INTERAKTION ---
        function setupControls(aiGroup, statusDisplay, timerDisplay) {
            // 1. JOYSTICK
            const jArea = document.getElementById('joystick-area');
            const jInner = document.getElementById('joystick-inner');
            jArea.addEventListener('touchstart', (e) => handleJoy(e, jArea, jInner), {passive: false});
            jArea.addEventListener('touchmove', (e) => handleJoy(e, jArea, jInner), {passive: false});
            jArea.addEventListener('touchend', () => { if(isGameActive) { moveX = 0; moveY = 0; jInner.style.transform = 'translate(0,0)'; } });

            // 2. POSEN MENÜ
            const menuBtn = document.getElementById('pose-menu-btn');
            const menu = document.getElementById('pose-menu');
            menuBtn.addEventListener('click', () => menu.classList.toggle('open'));

            document.querySelectorAll('.pose-opt').forEach(btn => {
                btn.addEventListener('click', () => {
                    if(!isGameActive) return;
                    menu.classList.remove('open');
                    const aL = player.children.find(c => c.name === "armL");
                    const aR = player.children.find(c => c.name === "armR");
                    const b = player.children.find(c => c.name === "body");
                    
                    if(btn.dataset.pose === 'hands_up') { aL.rotation.x = -1.4; aR.rotation.x = 1.4; }
                    else if(btn.dataset.pose === 'lie') { player.rotation.x = Math.PI/2; }
                    else if(btn.dataset.pose === 'squat') { b.position.y = 0.3; aL.rotation.x = 0.5; aR.rotation.x = -0.5; }
                    else { player.rotation.x = 0; b.position.y = 0.8; aL.rotation.x = 0; aR.rotation.x = 0; }
                });
            });

            // 3. MALEN (Mit dem Finger über die Figur wischen)
            const paintBtn = document.getElementById('paint-mode-btn');
            const colorBtns = document.querySelectorAll('.color-btn');
            
            colorBtns.forEach(b => b.addEventListener('click', () => {
                colorBtns.forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                currentColor = b.dataset.color;
            }));
            
            paintBtn.addEventListener('click', () => {
                if(!isGameActive || !isPrepPhase) return;
                isPainting = !isPainting;
                paintBtn.classList.toggle('active');
            });

            // Raycaster fürs Malen
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            document.addEventListener('touchmove', (e) => {
                if(!isPainting || !isGameActive) return;
                const touch = e.touches[0];
                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(bodyParts);
                if(hits.length > 0) hits[0].object.material.color.set(currentColor);
            }, {passive: false});
        }

        function handleJoy(e, area, inner) {
            e.preventDefault();
            if(!isGameActive) return;
            const touch = e.touches[0];
            const rect = area.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + rect.width/2);
            let dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = rect.width / 2;
            if (dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
            moveX = dx / max;
            moveY = dy / max;
            inner.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        // --- GAME LOOP ---
        function animate(aiGroup, statusDisplay, timerDisplay) {
            let aiTargetX = 0, aiTargetZ = 0;

            function loop() {
                requestAnimationFrame(loop);
                
                if(isGameActive) {
                    // Spieler Bewegung (nur in Vorbereitung & Suche)
                    if(moveX !== 0 || moveY !== 0) {
                        player.position.x += moveX * 0.08;
                        player.position.z += moveY * 0.08;
                        player.position.x = Math.max(-8, Math.min(8, player.position.x));
                        player.position.z = Math.max(-5, Math.min(10, player.position.z));
                    }

                    // KI Logik (Nur in der Suchphase)
                    if(!isPrepPhase && aiGroup.visible) {
                        if(Math.random() < 0.02) {
                            aiTargetX = (Math.random()-0.5)*15;
                            aiTargetZ = (Math.random()-0.5)*10;
                        }
                        const dx = aiTargetX - aiGroup.position.x;
                        const dz = aiTargetZ - aiGroup.position.z;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if(dist > 0.5) {
                            aiGroup.position.x += (dx/dist) * 0.05;
                            aiGroup.position.z += (dz/dist) * 0.05;
                        }

                        // KI hat Spieler erwischt?
                        if(player.position.distanceTo(aiGroup.position) < 1.0) {
                            isGameActive = false;
                            statusDisplay.innerText = "💀 ERWISCHT!";
                            timerDisplay.innerText = "VERLOREN";
                            document.getElementById('pose-menu-btn').style.display = 'none';
                            clearInterval(timerInterval);
                        }
                    }

                    // Kamera folgt
                    camera.position.x = player.position.x;
                    camera.position.z = player.position.z + 6;
                    camera.position.y = 3.5;
                    camera.lookAt(player.position.x, player.position.y + 0.5, player.position.z);
                }
                renderer.render(scene, camera);
            }
            loop();
        }
        
        // Fenster resize
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
