<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meccha Chameleon - Ultimate</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; background: #111; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; z-index: 10; }
        
        #top-bar { display: flex; justify-content: space-between; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); pointer-events: none; }
        #status { font-size: 14px; padding: 6px 14px; background: rgba(0,0,0,0.7); border-radius: 20px; color: #4cd137; border: 1px solid rgba(255,255,255,0.1); }
        #timer { font-size: 24px; font-weight: bold; color: #4cd137; text-shadow: 0 0 10px rgba(76, 209, 55, 0.3); }
        #timer.danger { color: #e74c3c; }

        /* Pose Menu Button */
        #pose-menu-btn { position: absolute; top: 80px; right: 20px; width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; background: rgba(0,0,0,0.8); color: white; font-size: 24px; pointer-events: auto; cursor: pointer; z-index: 20; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        #pose-menu-btn:active { transform: scale(0.85); }

        /* Pose Dropdown Menu */
        #pose-menu { position: absolute; top: 150px; right: 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.2); pointer-events: auto; display: none; flex-direction: column; gap: 10px; z-index: 20; min-width: 120px; }
        #pose-menu.open { display: flex; }
        .pose-opt { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.1s; }
        .pose-opt:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }

        /* Steuerung */
        #bottom-area { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; }
        #joystick-area { width: 130px; height: 130px; background: radial-gradient(circle, rgba(255,255,255,0.15), transparent); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-inner { width: 45px; height: 45px; background: rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; transition: all 0.05s; }

        #paint-tools { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .color-row { display: flex; gap: 10px; }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: 0.1s; }
        .color-btn:active { transform: scale(0.85); }
        .color-btn.selected { border-color: #f1c40f; transform: scale(1.1); }
        
        #paint-mode { width: 45px; height: 45px; border-radius: 50%; border: none; background: #e74c3c; color: white; font-weight: bold; font-size: 12px; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; transition: 0.1s; pointer-events: auto; }
        #paint-mode.active { background: #4cd137; }

        /* Multiplayer & Info */
        #mp-info { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; color: #f1c40f; font-size: 12px; pointer-events: none; text-align: center; display: none; border: 1px solid rgba(255,255,255,0.1); }
    </style>
    <!-- Three.js & PeerJS (für Multiplayer) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <div id="status">🟢 Tarnen</div>
            <div id="timer">90s</div>
        </div>

        <button id="pose-menu-btn">🎭</button>
        <div id="pose-menu">
            <button class="pose-opt" data-pose="stand">🧍 Stehen</button>
            <button class="pose-opt" data-pose="hands_up">🙌 Hände hoch</button>
            <button class="pose-opt" data-pose="lie">🛌 Liegen</button>
            <button class="pose-opt" data-pose="squat">🧎 Hocken</button>
        </div>

        <div id="bottom-area">
            <div id="joystick-area"><div id="joystick-inner"></div></div>
            <div id="paint-tools">
                <div class="color-row">
                    <div class="color-btn selected" style="background:#e74c3c;" data-color="#e74c3c"></div>
                    <div class="color-btn" style="background:#3498db;" data-color="#3498db"></div>
                </div>
                <div class="color-row">
                    <div class="color-btn" style="background:#2ecc71;" data-color="#2ecc71"></div>
                    <div class="color-btn" style="background:#f1c40f;" data-color="#f1c40f"></div>
                </div>
                <div class="color-row">
                    <button id="paint-mode">🎨</button>
                </div>
            </div>
        </div>
        
        <div id="mp-info">📡 Host gestartet. Teilen Sie diesen Code mit Freunden: <span id="mp-code" style="font-weight:bold; color:#fff;"></span></div>
    </div>

    <script>
        // --- 1. SZENE (3D) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x34495e); // Dunklerer Hintergrund

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Licht
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 2. RIESIGE MAP (20x20 Einheiten) ---
        // Boden mit Raster
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#7f8c8d'; ctx.fillRect(0,0,512,512);
        ctx.strokeStyle = '#95a5a6'; ctx.lineWidth = 4;
        for(let i=0; i<512; i+=64) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,512); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(512,i); ctx.stroke(); }
        const tex = new THREE.CanvasTexture(canvas);
        
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({ map: tex })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        scene.add(floor);

        // Ein paar Häuser/Blöcke zum Verstecken
        const blockMat = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
        const blockMat2 = new THREE.MeshStandardMaterial({ color: 0x2980b9 });
        for(let i=0; i<8; i++) {
            const block = new THREE.Mesh(
                new THREE.BoxGeometry(2, 3 + Math.random()*2, 2),
                i%2===0 ? blockMat : blockMat2
            );
            block.position.set((Math.random()-0.5)*30, 1, (Math.random()-0.5)*30);
            scene.add(block);
        }

        // --- 3. SPIELER FIGUR (HIDER) ---
        const player = new THREE.Group();
        player.position.set(0, 0, 5);
        scene.add(player);

        const pMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 8), pMat);
        body.position.y = 0.6;
        player.add(body);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 10), pMat);
        head.position.y = 1.4;
        player.add(head);
        const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6, 6), pMat);
        armL.position.set(-0.6, 0.9, 0);
        player.add(armL);
        const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6, 6), pMat);
        armR.position.set(0.6, 0.9, 0);
        player.add(armR);
        const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.6, 6), pMat);
        legL.position.set(-0.2, 0.3, 0);
        player.add(legL);
        const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.6, 6), pMat);
        legR.position.set(0.2, 0.3, 0);
        player.add(legR);

        // --- 4. KI SEEKER (Der Gegner) ---
        const aiGroup = new THREE.Group();
        aiGroup.position.set(-5, 0, -5);
        scene.add(aiGroup);
        
        const aiMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c }); // Roter Gegner
        const aiBody = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.2, 8), aiMat);
        aiBody.position.y = 0.6;
        aiGroup.add(aiBody);
        const aiHead = new THREE.Mesh(new THREE.SphereGeometry(0.5, 10, 10), aiMat);
        aiHead.position.y = 1.4;
        aiGroup.add(aiHead);

        // KI Logik (Läuft zufällig umher)
        let aiTargetX = (Math.random()-0.5)*30;
        let aiTargetZ = (Math.random()-0.5)*30;
        let aiSpeed = 0.05;

        // --- 5. SPIELLOGIK & STEURUNG ---
        let timeLeft = 90;
        let isGameActive = true;
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');

        setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                timerDisplay.innerText = timeLeft + "s";
                if(timeLeft <= 10) timerDisplay.classList.add('danger');
            } else {
                isGameActive = false;
                statusDisplay.innerText = "🔴 Zeit abgelaufen! Du hast gewonnen!";
                document.getElementById('pose-menu-btn').style.display = 'none';
            }
        }, 1000);

        // --- 6. JOYSTICK & LAUFEN ---
        let moveX = 0, moveY = 0;
        const jArea = document.getElementById('joystick-area');
        const jInner = document.getElementById('joystick-inner');
        
        jArea.addEventListener('touchstart', (e) => handleJoy(e), {passive: false});
        jArea.addEventListener('touchmove', (e) => handleJoy(e), {passive: false});
        jArea.addEventListener('touchend', () => { moveX = 0; moveY = 0; jInner.style.transform = 'translate(0,0)'; });

        function handleJoy(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = jArea.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + rect.width/2);
            let dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = rect.width / 2;
            if (dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
            moveX = dx / max;
            moveY = dy / max;
            jInner.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        // --- 7. POSEN MENÜ ---
        const menuBtn = document.getElementById('pose-menu-btn');
        const menu = document.getElementById('pose-menu');
        menuBtn.addEventListener('click', () => menu.classList.toggle('open'));

        document.querySelectorAll('.pose-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                if(!isGameActive) return;
                menu.classList.remove('open');
                const pose = btn.dataset.pose;
                if(pose === 'hands_up') { armL.rotation.x = -1.5; armR.rotation.x = 1.5; }
                else if(pose === 'lie') { player.rotation.x = Math.PI/2; }
                else if(pose === 'squat') { body.position.y = 0.2; head.position.y = 0.9; armL.rotation.x = 0.5; armR.rotation.x = -0.5; }
                else { player.rotation.x = 0; body.position.y = 0.6; head.position.y = 1.4; armL.rotation.x = 0; armR.rotation.x = 0; }
            });
        });

        // --- 8. KAMERA STEUERUNG (Zwei Finger Wischen) ---
        let camRotX = 0.5; // Vertikaler Winkel
        let camRotY = 0;   // Horizontaler Winkel
        let lastTouchX = 0, lastTouchY = 0;

        document.addEventListener('touchstart', (e) => {
            if(e.touches.length === 2) { // Zwei Finger auf dem Bildschirm
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        }, {passive: true});

        document.addEventListener('touchmove', (e) => {
            if(e.touches.length === 2 && isGameActive) {
                const dx = e.touches[0].clientX - lastTouchX;
                const dy = e.touches[0].clientY - lastTouchY;
                camRotY -= dx * 0.01;
                camRotX -= dy * 0.01;
                camRotX = Math.max(0.1, Math.min(1.2, camRotX)); // Nicht zu weit runter oder hoch
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        }, {passive: true});

        // --- 9. MULTIPLAYER SETUP (Lokaler Host) ---
        // Starte PeerJS als Host
        const peer = new Peer(null, { debug: 2 });
        const mpInfo = document.getElementById('mp-info');
        const mpCode = document.getElementById('mp-code');

        peer.on('open', (id) => {
            mpInfo.style.display = 'block';
            mpCode.innerText = id;
        });

        // Wenn jemand beitritt
        let conn = null;
        peer.on('connection', (c) => {
            conn = c;
            mpCode.innerText = "Verbunden!";
            c.on('data', (data) => {
                // Position des Freundes empfangen und anzeigen (Hier nur Platzhalter)
                console.log("Freund bewegt sich:", data);
            });
        });

        // --- 10. MAL-FUNKTION (Tippen auf Körperteile) ---
        let isPainting = false;
        let currentColor = '#e74c3c';
        const paintBtn = document.getElementById('paint-mode');
        const colorBtns = document.querySelectorAll('.color-btn');

        colorBtns.forEach(b => b.addEventListener('click', () => {
            colorBtns.forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
            currentColor = b.dataset.color;
        }));

        paintBtn.addEventListener('click', () => {
            if(!isGameActive) return;
            isPainting = !isPainting;
            paintBtn.classList.toggle('active');
        });

        // Raycaster zum Tippen auf die Figur
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        document.addEventListener('touchstart', (e) => {
            if(!isPainting || !isGameActive) return;
            const touch = e.changedTouches[0];
            mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects([body, head, armL, armR, legL, legR]);
            if(hits.length > 0) hits[0].object.material.color.set(currentColor);
        }, {passive: false});

        // --- 11. GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if(isGameActive) {
                // Spieler bewegen
                const speed = 0.08;
                player.position.x += moveX * speed;
                player.position.z += moveY * speed;
                player.position.x = Math.max(-18, Math.min(18, player.position.x));
                player.position.z = Math.max(-18, Math.min(18, player.position.z));

                // KI bewegen (einfache Wegpunkt-Navigation)
                const dx = aiTargetX - aiGroup.position.x;
                const dz = aiTargetZ - aiGroup.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if(dist < 0.5) {
                    aiTargetX = (Math.random()-0.5)*30;
                    aiTargetZ = (Math.random()-0.5)*30;
                } else {
                    aiGroup.position.x += (dx/dist) * aiSpeed;
                    aiGroup.position.z += (dz/dist) * aiSpeed;
                }

                // KI Kollision mit Spieler (Du wurdest gefunden)
                const distToPlayer = player.position.distanceTo(aiGroup.position);
                if(distToPlayer < 1.0) {
                    isGameActive = false;
                    statusDisplay.innerText = "💀 KI hat dich gefunden! Verloren!";
                    timerDisplay.innerText = "GAME OVER";
                    timerDisplay.style.color = "#e74c3c";
                    document.getElementById('pose-menu-btn').style.display = 'none';
                    moveX = 0; moveY = 0;
                }

                // Multiplayer: Sende Position an Freund
                if(conn && conn.open) {
                    conn.send({x: player.position.x, z: player.position.z});
                }
            }

            // --- KAMERA UPDATE ---
            // Berechne die Position der Kamera basierend auf Winkeln
            const camDist = 8;
            const xOffset = Math.sin(camRotY) * Math.cos(camRotX) * camDist;
            const yOffset = Math.sin(camRotX) * camDist;
            const zOffset = Math.cos(camRotY) * Math.cos(camRotX) * camDist;

            camera.position.x = player.position.x + xOffset;
            camera.position.y = player.position.y + yOffset + 1.5;
            camera.position.z = player.position.z + zOffset;
            
            camera.lookAt(player.position.x, player.position.y + 0.5, player.position.z);

            renderer.render(scene, camera);
        }
        animate();

        // Fenster resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
