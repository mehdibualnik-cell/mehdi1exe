<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meccha Chameleon - Real Life</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; background: #000; }
        
        /* --- STARTSEITE (LOADING SCREEN) --- */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #1a1a1a; color: white; z-index: 100; padding: 20px; text-align: center; }
        #start-screen h1 { font-size: 36px; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.4); margin-bottom: 20px; }
        #start-screen p { font-size: 16px; opacity: 0.8; max-width: 300px; margin-bottom: 30px; }
        
        .load-btn { padding: 18px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 30px; background: linear-gradient(135deg, #00b894, #00cec9); color: white; box-shadow: 0 10px 30px rgba(0, 206, 201, 0.4); cursor: pointer; transition: transform 0.2s; margin-top: 10px; }
        .load-btn:active { transform: scale(0.95); }
        
        #file-input { display: none; }
        #loading-text { display: none; margin-top: 20px; color: #f1c40f; font-weight: bold; }

        /* --- GAME UI --- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; flex-direction: column; z-index: 10; }
        
        #top-bar { display: flex; justify-content: space-between; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); pointer-events: none; }
        #status { font-size: 14px; padding: 6px 14px; background: rgba(0,0,0,0.7); border-radius: 20px; color: #4cd137; border: 1px solid rgba(255,255,255,0.1); }
        #timer { font-size: 24px; font-weight: bold; color: #4cd137; text-shadow: 0 0 10px rgba(76, 209, 55, 0.3); }
        #timer.danger { color: #e74c3c; }

        /* Pose Button */
        #pose-menu-btn { position: absolute; top: 80px; right: 20px; width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; background: rgba(0,0,0,0.8); color: white; font-size: 24px; pointer-events: auto; cursor: pointer; z-index: 20; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        #pose-menu-btn:active { transform: scale(0.85); }

        #pose-menu { position: absolute; top: 150px; right: 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.2); pointer-events: auto; display: none; flex-direction: column; gap: 10px; z-index: 20; min-width: 120px; }
        #pose-menu.open { display: flex; }
        .pose-opt { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.1s; }
        .pose-opt:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }

        /* Joystick & Paint */
        #bottom-area { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; }
        #joystick-area { width: 130px; height: 130px; background: radial-gradient(circle, rgba(255,255,255,0.15), transparent); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-inner { width: 45px; height: 45px; background: rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; transition: all 0.05s; }

        #paint-tools { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .color-row { display: flex; gap: 10px; }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: 0.1s; }
        .color-btn:active { transform: scale(0.85); }
        .color-btn.selected { border-color: #f1c40f; transform: scale(1.1); }
        
        #paint-mode { width: 45px; height: 45px; border-radius: 50%; border: none; background: #e74c3c; color: white; font-weight: bold; font-size: 12px; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; transition: 0.1s; pointer-events: auto; }
        #paint-mode.active { background: #4cd137; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- STARTSEITE -->
    <div id="start-screen">
        <h1>🏠 MECCHA<br>CHAMELEON</h1>
        <p>Lade ein Foto von deinem Zimmer (Regal, TV, Sofa), um die Map zu erstellen!</p>
        <button class="load-btn" id="load-room-btn">📸 Foto auswählen</button>
        <input type="file" id="file-input" accept="image/*">
        <div id="loading-text">🔄 Bild wird geladen...</div>
    </div>

    <!-- GAME UI -->
    <div id="ui-layer">
        <div id="top-bar">
            <div id="status">🟢 Tarnen</div>
            <div id="timer">90s</div>
        </div>

        <button id="pose-menu-btn">🎭</button>
        <div id="pose-menu">
            <button class="pose-opt" data-pose="stand">🧍 Stehen</button>
            <button class="pose-opt" data-pose="hands_up">🙌 Hände hoch</button>
            <button class="pose-opt" data-pose="lie">🛌 Liegen</button>
            <button class="pose-opt" data-pose="squat">🧎 Hocken</button>
        </div>

        <div id="bottom-area">
            <div id="joystick-area"><div id="joystick-inner"></div></div>
            <div id="paint-tools">
                <div class="color-row">
                    <div class="color-btn selected" style="background:#e74c3c;" data-color="#e74c3c"></div>
                    <div class="color-btn" style="background:#3498db;" data-color="#3498db"></div>
                </div>
                <div class="color-row">
                    <div class="color-btn" style="background:#2ecc71;" data-color="#2ecc71"></div>
                    <div class="color-btn" style="background:#f1c40f;" data-color="#f1c40f"></div>
                </div>
                <div class="color-row">
                    <button id="paint-mode">🎨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- START LOGIK ---
        const startScreen = document.getElementById('start-screen');
        const uiLayer = document.getElementById('ui-layer');
        const fileInput = document.getElementById('file-input');
        const loadBtn = document.getElementById('load-room-btn');
        const loadingText = document.getElementById('loading-text');

        let scene, camera, renderer, player, aiGroup;
        let moveX = 0, moveY = 0;
        let isGameActive = true;
        let timeLeft = 90;
        let isPainting = false;
        let currentColor = '#e74c3c';

        loadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                loadingText.style.display = 'block';
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = () => {
                        startScreen.style.display = 'none';
                        uiLayer.style.display = 'flex';
                        loadingText.style.display = 'none';
                        initGame(img);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // --- SPIEL INITIALISIEREN MIT FOTO ---
        function initGame(roomImage) {
            // 1. Szene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. Das echte Foto als riesige Wand (Realistischer Look)
            const texture = new THREE.Texture(roomImage);
            texture.minFilter = THREE.LinearFilter;
            
            // Riesige Box, die das Zimmer umschließt
            const roomMat = new THREE.MeshStandardMaterial({ map: texture, side: THREE.BackSide });
            const room = new THREE.Mesh(new THREE.BoxGeometry(40, 20, 40), roomMat);
            room.position.y = 5;
            scene.add(room);

            // 3. Licht (Damit die Figur sichtbar ist)
            const light = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(light);

            // 4. Der Spieler
            player = new THREE.Group();
            player.position.set(0, 1.5, 5);
            scene.add(player);
            createPlayer();

            // 5. KI (Der Sucher)
            aiGroup = new THREE.Group();
            aiGroup.position.set(0, 1.5, -5);
            scene.add(aiGroup);
            createAI();

            // 6. Timer starten
            startTimer();

            // 7. Event Listeners für Steuerung
            setupControls();
            
            // 8. Loop starten
            animate();
        }

        function createPlayer() {
            const pMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 8), pMat);
            body.position.y = 0.6; body.name = "body";
            player.add(body);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 10), pMat);
            head.position.y = 1.4; head.name = "head";
            player.add(head);
            
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6, 6), pMat);
            armL.position.set(-0.6, 0.9, 0); armL.name = "armL";
            player.add(armL);
            
            const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6, 6), pMat);
            armR.position.set(0.6, 0.9, 0); armR.name = "armR";
            player.add(armR);
            
            const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.6, 6), pMat);
            legL.position.set(-0.2, 0.3, 0); legL.name = "legL";
            player.add(legL);
            
            const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.6, 6), pMat);
            legR.position.set(0.2, 0.3, 0); legR.name = "legR";
            player.add(legR);
        }

        function createAI() {
            const aiMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
            const aiBody = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 8), aiMat);
            aiBody.position.y = 0.6;
            aiGroup.add(aiBody);
            const aiHead = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 10), aiMat);
            aiHead.position.y = 1.4;
            aiGroup.add(aiHead);
        }

        // --- TIMER ---
        function startTimer() {
            const timerDisplay = document.getElementById('timer');
            const statusDisplay = document.getElementById('status');
            setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    timerDisplay.innerText = timeLeft + "s";
                    if(timeLeft <= 10) timerDisplay.classList.add('danger');
                } else {
                    isGameActive = false;
                    statusDisplay.innerText = "🔴 Gewonnen!";
                }
            }, 1000);
        }

        // --- STEURUNG ---
        function setupControls() {
            // Joystick
            const jArea = document.getElementById('joystick-area');
            const jInner = document.getElementById('joystick-inner');
            jArea.addEventListener('touchstart', (e) => handleJoy(e, jArea, jInner), {passive: false});
            jArea.addEventListener('touchmove', (e) => handleJoy(e, jArea, jInner), {passive: false});
            jArea.addEventListener('touchend', () => { moveX = 0; moveY = 0; jInner.style.transform = 'translate(0,0)'; });

            // Posen
            const menuBtn = document.getElementById('pose-menu-btn');
            const menu = document.getElementById('pose-menu');
            menuBtn.addEventListener('click', () => menu.classList.toggle('open'));

            document.querySelectorAll('.pose-opt').forEach(btn => {
                btn.addEventListener('click', () => {
                    menu.classList.remove('open');
                    const pose = btn.dataset.pose;
                    const armL = player.children.find(c => c.name === "armL");
                    const armR = player.children.find(c => c.name === "armR");
                    const body = player.children.find(c => c.name === "body");
                    const head = player.children.find(c => c.name === "head");
                    player.rotation.x = 0;

                    if(pose === 'hands_up') { armL.rotation.x = -1.5; armR.rotation.x = 1.5; }
                    else if(pose === 'lie') { player.rotation.x = Math.PI/2; }
                    else if(pose === 'squat') { body.position.y = 0.2; head.position.y = 0.9; armL.rotation.x = 0.5; armR.rotation.x = -0.5; }
                    else { body.position.y = 0.6; head.position.y = 1.4; armL.rotation.x = 0; armR.rotation.x = 0; }
                });
            });

            // Malen
            const paintBtn = document.getElementById('paint-mode');
            const colorBtns = document.querySelectorAll('.color-btn');
            colorBtns.forEach(b => b.addEventListener('click', () => {
                colorBtns.forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                currentColor = b.dataset.color;
            }));
            paintBtn.addEventListener('click', () => {
                isPainting = !isPainting;
                paintBtn.classList.toggle('active');
            });

            // Tippen zum Anmalen
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            document.addEventListener('touchstart', (e) => {
                if(!isPainting || !isGameActive) return;
                const touch = e.changedTouches[0];
                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(player.children);
                if(hits.length > 0) hits[0].object.material.color.set(currentColor);
            }, {passive: false});
        }

        function handleJoy(e, area, inner) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = area.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + rect.width/2);
            let dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = rect.width / 2;
            if (dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
            moveX = dx / max;
            moveY = dy / max;
            inner.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        // --- GAME LOOP ---
        let aiTargetX = 0, aiTargetZ = 0;
        function animate() {
            requestAnimationFrame(animate);

            if(isGameActive) {
                // Player bewegen
                player.position.x += moveX * 0.08;
                player.position.z += moveY * 0.08;

                // KI bewegt sich auf zufällige Ziele
                if(Math.random() < 0.01) {
                    aiTargetX = (Math.random()-0.5)*30;
                    aiTargetZ = (Math.random()-0.5)*30;
                }
                const dx = aiTargetX - aiGroup.position.x;
                const dz = aiTargetZ - aiGroup.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if(dist > 0.5) {
                    aiGroup.position.x += (dx/dist) * 0.04;
                    aiGroup.position.z += (dz/dist) * 0.04;
                }

                // KI erwischt dich?
                if(player.position.distanceTo(aiGroup.position) < 1.0) {
                    isGameActive = false;
                    document.getElementById('status').innerText = "💀 Verloren!";
                    document.getElementById('timer').innerText = "GAME OVER";
                }

                // Kamera (folgt dem Spieler nah)
                camera.position.x = player.position.x;
                camera.position.z = player.position.z + 5;
                camera.position.y = 3.5;
                camera.lookAt(player.position.x, player.position.y + 0.5, player.position.z);
            }

            renderer.render(scene, camera);
        }

        // Resize
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
