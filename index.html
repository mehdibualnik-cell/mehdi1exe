<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meccha Clone Mobile</title>
    
    <style>
        /* --- CSS STYLES (Zusammengefasst) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: Arial, Helvetica, sans-serif;
        }

        canvas { display: block; }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            z-index: 10;
            background: #111;
        }

        #ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #joystick {
            position: absolute;
            left: 25px;
            bottom: 25px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.35);
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Innerer Punkt für Joystick-Rückmeldung */
        #joystick-inner {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.05s;
        }

        #buttons {
            position: absolute;
            right: 20px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }

        button {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 50%;
            font-size: 32px;
            color: white;
            background: #2d8cff;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        #freezeButton { background: #ff4444; }
        #paintButton { background: #30c65d; }
        #poseButton { background: #ffb300; }
    </style>
    
    <!-- Three.js als Modul laden (über CDN) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading">Lädt...</div>

    <!-- UI LAYER -->
    <div id="ui">
        <div id="joystick">
            <div id="joystick-inner"></div>
        </div>
        <div id="buttons">
            <button id="paintButton">🎨</button>
            <button id="poseButton">🧍</button>
            <button id="freezeButton">❄️</button>
        </div>
    </div>

    <!-- --- JAVASCRIPT (Alles in einem Script-Tag) --- -->
    <script type="module">
        import * as THREE from "three";

        // --- 1. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0d8ff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. LICHT ---
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 10, 5);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // --- 3. BODEN ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 30),
            new THREE.MeshStandardMaterial({ color: 0xdedede })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 4. SPIELFIGUR (Bauen) ---
        const material = new THREE.MeshStandardMaterial({ color: "white" });
        const player = new THREE.Group();

        // Körper
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 0.8, 8, 16), material);
        body.position.y = 1.1;
        player.add(body);

        // Kopf
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), material);
        head.position.y = 2;
        player.add(head);

        // Arme
        function arm(x) {
            const mesh = new THREE.Mesh(new THREE.CapsuleGeometry(.12, .55, 8, 12), material);
            mesh.position.set(x, 1.45, 0);
            return mesh;
        }
        player.add(arm(-0.48));
        player.add(arm(0.48));

        // Beine
        function leg(x) {
            const mesh = new THREE.Mesh(new THREE.CapsuleGeometry(.13, .7, 8, 12), material);
            mesh.position.set(x, 0.45, 0);
            return mesh;
        }
        player.add(leg(-0.18));
        player.add(leg(0.18));

        // Figur in die Szene setzen
        player.position.set(0, 0, 0);
        scene.add(player);

        // --- 5. HANDY JOYSTICK STEUERUNG ---
        let moveX = 0;
        let moveY = 0;
        const joystickArea = document.getElementById('joystick');
        const joystickInner = document.getElementById('joystick-inner');

        // Touch Events für den Joystick
        joystickArea.addEventListener('touchstart', (e) => handleJoystick(e), { passive: false });
        joystickArea.addEventListener('touchmove', (e) => handleJoystick(e), { passive: false });
        joystickArea.addEventListener('touchend', () => {
            moveX = 0;
            moveY = 0;
            joystickInner.style.transform = `translate(0px, 0px)`;
        });

        function handleJoystick(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joystickArea.getBoundingClientRect();
            
            // Mittelpunkt des Kreises
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Distanz vom Mittelpunkt
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = rect.width / 2;

            // Normalisieren (Werte zwischen -1 und 1)
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }
            moveX = dx / maxRadius;
            moveY = dy / maxRadius;

            // Visuelles Feedback (innerer Kreis bewegt sich)
            joystickInner.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        // --- 6. GAME LOOP & BEWEGUNG ---
        const speed = 0.08;

        function animate() {
            requestAnimationFrame(animate);

            // Bewegung basierend auf Joystick
            if (moveX !== 0 || moveY !== 0) {
                player.position.x += moveX * speed;
                player.position.z += moveY * speed;
            }

            // Kamera folgt der Figur
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 5;
            camera.lookAt(player.position.x, 1.5, player.position.z);

            renderer.render(scene, camera);
        }
        animate();

        // --- 7. FENSTER ANPASSEN ---
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Loading ausblenden
        document.getElementById("loading").style.display = "none";

        // --- 8. BUTTON LOGIK (Platzhalter) ---
        document.getElementById('paintButton').addEventListener('click', () => {
            // Hier kommt später deine Malfunktion hin
            console.log("Malen gedrückt!");
        });
        
        document.getElementById('poseButton').addEventListener('click', () => {
            // Hier kommt später deine Posenfunktion hin
            console.log("Pose gedrückt!");
        });
        
        document.getElementById('freezeButton').addEventListener('click', () => {
            // Hier kommt später das Einfrieren hin
            console.log("Einfrieren gedrückt!");
        });

    </script>
</body>
</html>
