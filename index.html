<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Fußball Mobil</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; font-family: sans-serif; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        
        /* Menü Overlay */
        #menuOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; color: white;
        }
        .menu-box {
            background: #222; padding: 20px; border-radius: 15px; text-align: center;
            border: 2px solid #444;
        }
        .team-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;
        }
        .team-btn {
            background: #2ecc71; color: white; border: none; padding: 15px 20px;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #27ae60;
        }
        .team-btn:active { transform: translateY(4px); box-shadow: none; }
        .team-btn.swe { background: #f1c40f; box-shadow: 0 4px 0 #f39c12; }
        .team-btn.cro { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        
        /* Mobile Touch Steuerung */
        #joystickZone {
            position: absolute; bottom: 30px; left: 30px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); z-index: 5;
        }
        #actionButtons {
            position: absolute; bottom: 40px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 5;
        }
        .action-btn {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid white;
            background: rgba(0,0,0,0.4); color: white; font-weight: bold; font-size: 14px;
            display: flex; justify-content: center; align-items: center; text-shadow: 1px 1px 2px black;
            user-select: none; -webkit-user-select: none;
        }
        .action-btn:active { transform: scale(0.9); }
        #shootBtn { background: rgba(255, 0, 0, 0.6); border-color: #ff4444; }
        #passBtn { background: rgba(0, 180, 255, 0.6); border-color: #00aaff; }
        
        #scoreBoard {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 8px 20px; border-radius: 20px;
            font-weight: bold; z-index: 5; text-align: center;
        }
        @media (max-width: 600px) {
            .action-btn { width: 60px; height: 60px; font-size: 12px; }
            #joystickZone { width: 100px; height: 100px; left: 20px; bottom: 30px; }
        }
    </style>
    <!-- Three.js 3D Engine & Nipple.js Joystick -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>
    <!-- Start-Menü -->
    <div id="menuOverlay">
        <div class="menu-box">
            <h2>🏆 Wähle dein Team</h2>
            <div class="team-grid">
                <button class="team-btn" onclick="startGame('GER')">🇩🇪 Deutschland</button>
                <button class="team-btn swe" onclick="startGame('SWE')">🇸🇪 Schweden</button>
                <button class="team-btn cro" onclick="startGame('CRO')">🇭🇷 Kroatien</button>
                <button class="team-btn" onclick="startGame('TUR')">🇹🇷 Türkei</button>
            </div>
            <p style="margin-top: 15px; font-size: 12px; color: #aaa;">Handy-Steuerung: Links Laufen, Rechts Aktionen</p>
        </div>
    </div>

    <!-- UI -->
    <div id="scoreBoard">0 : 0</div>
    <div id="joystickZone"></div>
    <div id="actionButtons">
        <div class="action-btn" id="passBtn">PASS</div>
        <div class="action-btn" id="shootBtn">SCHUSS</div>
    </div>
    <div id="gameCanvas"></div>

    <script>
        let scene, camera, renderer, clock;
        let player, ball, opponent, goalKeeper;
        let ballSpeed = new THREE.Vector3(0,0,0);
        let moveVelocity = new THREE.Vector3(0,0,0);
        let gameActive = false;
        let score = { us: 0, them: 0 };

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Himmel blau
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 25, 15);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('gameCanvas').appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // Licht
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // Feld
            const pitchGeo = new THREE.PlaneGeometry(40, 60);
            const pitchMat = new THREE.MeshLambertMaterial({ color: 0x2ecc71 });
            const pitch = new THREE.Mesh(pitchGeo, pitchMat);
            pitch.rotation.x = -Math.PI / 2;
            scene.add(pitch);
            
            // Spielfeld Linien (Vereinfacht)
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            // Mittelkreis
            const circleGeo = new THREE.RingGeometry(3.5, 3.8, 32);
            const circle = new THREE.Mesh(circleGeo, lineMat);
            circle.rotation.x = -Math.PI / 2;
            circle.position.z = 0;
            scene.add(circle);

            // Spieler & Gegner
            const playerGeo = new THREE.CylinderGeometry(0.6, 0.8, 1.2, 8);
            const playerMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 0.6, 15);
            scene.add(player);

            const oppMat = new THREE.MeshLambertMaterial({ color: 0x0000ff });
            opponent = new THREE.Mesh(playerGeo, oppMat);
            opponent.position.set(0, 0.6, -15);
            scene.add(opponent);

            // Ball
            const ballGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const ballMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(0, 0.5, 10);
            scene.add(ball);

            // Tore & Torwart
            createGoalsAndKeeper();

            window.addEventListener('resize', onWindowResize, false);
        }

        function createGoalsAndKeeper() {
            const goalMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            // Tor Pfosten Vorderseite (visuell)
            const postGeo = new THREE.BoxGeometry(0.2, 2, 0.2);
            for(let z of [-25, 25]) {
                for(let x of [-3.5, 3.5]) {
                    let post = new THREE.Mesh(postGeo, goalMat);
                    post.position.set(x, 1, z);
                    scene.add(post);
                }
            }

            // Torwart (Ein Würfel)
            const gkGeo = new THREE.BoxGeometry(2.5, 1.5, 1);
            const gkMat = new THREE.MeshLambertMaterial({ color: 0xffff00 });
            goalKeeper = new THREE.Mesh(gkGeo, gkMat);
            goalKeeper.position.set(0, 0.75, -25);
            scene.add(goalKeeper);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Steuerung & Interaktion
        function setupControls() {
            // Joystick
            let joystick = nipplejs.create({
                zone: document.getElementById('joystickZone'),
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'white'
            });
            joystick.on('move', (evt, data) => {
                if(!gameActive) return;
                const force = data.force;
                const angle = data.angle.radian;
                // Map joystick to movement
                let speed = force * 8;
                moveVelocity.x = Math.cos(angle) * speed;
                moveVelocity.z = Math.sin(angle) * speed;
            });
            joystick.on('end', () => {
                moveVelocity.x = 0; moveVelocity.z = 0;
            });

            // Buttons
            document.getElementById('shootBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(!gameActive) return;
                // Richtung Spieler zu Ball
                const dir = new THREE.Vector3().copy(ball.position).sub(player.position);
                dir.y = 0.5;
                dir.normalize();
                ballSpeed.copy(dir.multiplyScalar(20));
            });

            document.getElementById('passBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(!gameActive) return;
                const dir = new THREE.Vector3().copy(ball.position).sub(player.position);
                dir.y = 0;
                dir.normalize();
                ballSpeed.copy(dir.multiplyScalar(8));
            });
        }

        // KI des Torwarts (Springt Links, Rechts, Oben)
        function updateAI(delta) {
            if(!ball) return;
            // Ball auf Tor zulaufen? KI verfolgt X-Position des Balles
            let targetX = ball.position.x;
            // Begrenzung Torwart Bereich (-3.5 bis 3.5)
            if(targetX > 3) targetX = 3;
            if(targetX < -3) targetX = -3;
            
            // Bewegung (Lerp)
            goalKeeper.position.x += (targetX - goalKeeper.position.x) * 0.05;

            // Wenn Ball nahe am Tor ist (Distanz < 5) -> Springen
            const distToGoal = Math.abs(ball.position.z - goalKeeper.position.z);
            if(distToGoal < 6) {
                // Einfacher Sprung (Simuliert Y-Achse nach oben)
                goalKeeper.position.y = 0.75 + Math.abs(Math.sin(Date.now() * 0.01)) * 2;
            } else {
                goalKeeper.position.y = 0.75; // Runter gehen
            }

            // Kollision Torwart & Ball
            if(ball.position.distanceTo(goalKeeper.position) < 1.5) {
                // Ball abprallen lassen
                ballSpeed.x *= -0.5;
                ballSpeed.z = -Math.abs(ballSpeed.z);
                ballSpeed.z -= 5; // Kick back
                goalKeeper.position.y = 0.75; // Reset spring
            }
        }

        function gameLoop() {
            if(!gameActive) return;
            requestAnimationFrame(gameLoop);

            const delta = clock.getDelta();
            
            // Ball Physik
            ball.position.x += ballSpeed.x * delta;
            ball.position.z += ballSpeed.z * delta;
            ballSpeed.x *= 0.985; // Reibung
            ballSpeed.z *= 0.985;
            
            // Begrenzung Ball auf Feld
            if(Math.abs(ball.position.x) > 18) ballSpeed.x *= -1;
            if(Math.abs(ball.position.z) > 28) {
                if(ball.position.z < -25) {
                    // TOR für uns!
                    if(ball.position.x > -3 && ball.position.x < 3) {
                        score.us++; updateScore();
                    }
                } else if(ball.position.z > 25) {
                    // TOR für Gegner
                    score.them++; updateScore();
                }
                ballSpeed.z *= -1;
                ball.position.z = ball.position.z > 0 ? 24 : -24;
            }

            // Spieler Bewegung
            player.position.x += moveVelocity.x * delta;
            player.position.z += moveVelocity.z * delta;
            if(Math.abs(player.position.x) > 18) player.position.x *= 0.9;
            if(Math.abs(player.position.z) > 28) player.position.z *= 0.9;

            // Einfache Gegner KI
            const dirToBall = new THREE.Vector3().copy(ball.position).sub(opponent.position);
            dirToBall.y = 0;
            dirToBall.normalize();
            opponent.position.x += dirToBall.x * 3 * delta;
            opponent.position.z += dirToBall.z * 3 * delta;
            
            // Kollision Gegner mit Ball
            if(ball.position.distanceTo(opponent.position) < 1.5) {
                const kickDir = new THREE.Vector3().copy(opponent.position).sub(ball.position).normalize();
                ballSpeed.copy(kickDir.multiplyScalar(15));
            }

            // Kamera leicht hinter dem Spieler halten
            camera.position.x = player.position.x * 0.5;
            camera.lookAt(0, 0, 0);

            updateAI(delta);
            renderer.render(scene, camera);
        }

        function updateScore() {
            document.getElementById('scoreBoard').innerHTML = `${score.us} : ${score.them}`;
        }

        // Spiel starten
        function startGame(team) {
            document.getElementById('menuOverlay').style.display = 'none';
            init3D();
            setupControls();
            gameActive = true;
            gameLoop();
        }
    </script>
</body>
</html>
