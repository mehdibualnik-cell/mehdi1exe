<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIVALS - Roblox Style First Person Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            text-shadow: 2px 2px 0 black;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 12px;
            pointer-events: none;
            backdrop-filter: blur(5px);
            font-weight: bold;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .ui-item {
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            border-left: 3px solid #ffaa00;
        }
        #health-bar {
            width: 200px;
            height: 18px;
            background: #a00;
            border-radius: 10px;
            overflow: hidden;
        }
        #health-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.2s; }
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 8px;
            color: #ccc;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        /* Touch Buttons */
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 200;
            pointer-events: none;
        }
        .touch-btn {
            pointer-events: auto;
            background: rgba(30,30,40,0.9);
            border: 2px solid orange;
            color: white;
            font-size: 24px;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            text-align: center;
            line-height: 66px;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 4px 10px black;
        }
        .touch-fire { background: rgba(200,50,50,0.9); border-color: red; }
        .weapon-btn { width: 60px; height: 60px; font-size: 18px; background: #222; }
        @media (max-width: 800px) {
            .touch-controls { display: flex; }
            #controls-info { display: none; }
            .ui-item { font-size: 12px; }
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            background: radial-gradient(circle, rgba(255,0,0,0.3) 2px, transparent 3px);
        }
        .ammo { background: #222; font-size: 18px; font-family: monospace; }
        #map-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: auto;
            color: white;
            font-family: monospace;
        }
        #map-selector select, #map-selector button {
            background: #333;
            color: white;
            border: 1px solid #ffaa00;
            padding: 5px;
            margin-left: 5px;
            cursor: pointer;
        }
        .lobby-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 300;
            color: #ffaa00;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #ffaa00;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-item">❤️ <span id="health-val">100</span>%</div>
        <div class="ui-item">🪙 <span id="coins-val">0</span></div>
        <div class="ui-item">🔑 <span id="keys-val">0</span></div>
        <div class="ui-item">🔫 <span id="weapon-name">Pistole</span> <span id="ammo-count">∞</span></div>
        <div class="ui-item">🥓 Bacon Skin</div>
        <div id="health-bar"><div id="health-fill"></div></div>
    </div>
    <div id="map-selector">
        🗺️ Karte:
        <select id="map-select">
            <option value="lobby">🏠 Lobby (Startplatz)</option>
            <option value="square">⬛ Quadrat-Arena</option>
            <option value="circle">🟡 Runde Arena</option>
        </select>
        <button id="change-map-btn">Wechseln</button>
    </div>
    <div id="controls-info">
        🖱️ WASD → Laufen | Maus → Blick | 🔫 Linksklick / Touch-Feuer | 1/2 Waffe wechseln | 🔄 Kartenwechsel
    </div>
    <div class="touch-controls">
        <div class="touch-btn" data-action="forward">▲ W</div>
        <div class="touch-btn" data-action="back">▼ S</div>
        <div class="touch-btn" data-action="left">◀ A</div>
        <div class="touch-btn" data-action="right">▶ D</div>
        <div class="touch-btn touch-fire" data-action="fire">💥 FEUER</div>
        <div class="touch-btn weapon-btn" data-action="weapon1">1 🔫</div>
        <div class="touch-btn weapon-btn" data-action="weapon2">2 🔫🔫</div>
    </div>
    <div id="crosshair"></div>
    <div id="lobby-message" class="lobby-message" style="display: none;">🏠 LOBBY - Drücke Kartenwechsel um zu kämpfen! 🏠</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- GAME SETUP ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Licht
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x5533aa, 0.3);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        // ----- Karten-Definitionen -----
        let currentMap = 'lobby';
        let mapMeshes = [];
        
        function clearMap() {
            mapMeshes.forEach(m => scene.remove(m));
            mapMeshes = [];
        }
        
        function buildLobby() {
            // Boden
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3c9e3c, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            mapMeshes.push(ground);
            
            // Begrenzungswände
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const walls = [
                { pos: [0, 1, -15], size: [30, 2, 1] }, { pos: [0, 1, 15], size: [30, 2, 1] },
                { pos: [-15, 1, 0], size: [1, 2, 30] }, { pos: [15, 1, 0], size: [1, 2, 30] }
            ];
            walls.forEach(w => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w.size[0], w.size[1], w.size[2]), wallMat);
                wall.position.set(w.pos[0], w.pos[1], w.pos[2]);
                wall.castShadow = true;
                scene.add(wall);
                mapMeshes.push(wall);
            });
            
            // Startplatz mit Holzboden und Bacon-Statue
            const startBase = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 4), new THREE.MeshStandardMaterial({ color: 0xCDA87C, roughness: 0.7 }));
            startBase.position.set(0, -0.1, 0);
            startBase.castShadow = true;
            scene.add(startBase);
            mapMeshes.push(startBase);
            
            // Bacon Skin Statue auf Startplatz
            const baconBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.6), new THREE.MeshStandardMaterial({ color: 0xE89F6E }));
            baconBody.position.set(0, 0.6, 0);
            baconBody.castShadow = true;
            scene.add(baconBody);
            mapMeshes.push(baconBody);
            
            const baconHead = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xE89F6E }));
            baconHead.position.set(0, 1.2, 0);
            baconHead.castShadow = true;
            scene.add(baconHead);
            mapMeshes.push(baconHead);
        }
        
        function buildSquareArena() {
            // Quadratische Arena
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a7a4a, roughness: 0.6 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            mapMeshes.push(ground);
            
            // Wände mit dekorativen Elementen
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            for (let i = -20; i <= 20; i+=2) {
                const wallPiece = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), wallMat);
                wallPiece.position.set(i, 1, -20);
                wallPiece.castShadow = true;
                scene.add(wallPiece);
                mapMeshes.push(wallPiece);
                
                const wallPiece2 = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), wallMat);
                wallPiece2.position.set(i, 1, 20);
                wallPiece2.castShadow = true;
                scene.add(wallPiece2);
                mapMeshes.push(wallPiece2);
                
                const wallPiece3 = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), wallMat);
                wallPiece3.position.set(-20, 1, i);
                wallPiece3.castShadow = true;
                scene.add(wallPiece3);
                mapMeshes.push(wallPiece3);
                
                const wallPiece4 = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), wallMat);
                wallPiece4.position.set(20, 1, i);
                wallPiece4.castShadow = true;
                scene.add(wallPiece4);
                mapMeshes.push(wallPiece4);
            }
            
            // Mittlere Plattform
            const centerPlat = new THREE.Mesh(new THREE.BoxGeometry(5, 0.5, 5), new THREE.MeshStandardMaterial({ color: 0xccaa77 }));
            centerPlat.position.set(0, 0, 0);
            centerPlat.castShadow = true;
            scene.add(centerPlat);
            mapMeshes.push(centerPlat);
        }
        
        function buildCircleArena() {
            // Runde Arena
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.7 });
            const ground = new THREE.Mesh(new THREE.CylinderGeometry(18, 18, 0.2, 64), groundMat);
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            mapMeshes.push(ground);
            
            // Rundumwand
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            for (let i = 0; i < 36; i++) {
                const angle = (i / 36) * Math.PI * 2;
                const x = Math.cos(angle) * 18;
                const z = Math.sin(angle) * 18;
                const wallPiece = new THREE.Mesh(new THREE.BoxGeometry(1, 2.5, 1), wallMat);
                wallPiece.position.set(x, 1.2, z);
                wallPiece.castShadow = true;
                scene.add(wallPiece);
                mapMeshes.push(wallPiece);
            }
            
            // Zentrale Plattform
            const centerPlat = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 0.5, 32), new THREE.MeshStandardMaterial({ color: 0xccaa77 }));
            centerPlat.position.set(0, 0, 0);
            centerPlat.castShadow = true;
            scene.add(centerPlat);
            mapMeshes.push(centerPlat);
        }
        
        function switchMap(mapType) {
            clearMap();
            currentMap = mapType;
            if (mapType === 'lobby') {
                buildLobby();
                document.getElementById('lobby-message').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('lobby-message').style.opacity = '0';
                    setTimeout(() => document.getElementById('lobby-message').style.display = 'none', 1000);
                }, 2000);
                // Respawn in Lobby
                camera.position.set(0, 1.6, 0);
            } else if (mapType === 'square') {
                buildSquareArena();
                camera.position.set(0, 1.6, 0);
            } else if (mapType === 'circle') {
                buildCircleArena();
                camera.position.set(0, 1.6, 0);
            }
            // Gegner respawnen auf neuer Karte
            respawnEnemies();
            // Münzen und Keys verteilen
            spawnCollectibles();
        }
        
        // ----- Spielerstatistiken -----
        let health = 100;
        let coins = 0;
        let keys = 0;
        let currentWeapon = 0;
        const weapons = [
            { name: "Pistole", damage: 25, cooldown: 350, spread: 0.02, ammo: -1 },
            { name: "Schrotflinte", damage: 45, cooldown: 800, spread: 0.08, ammo: -1 }
        ];
        let canShoot = true;
        
        // Bewegung
        let moveForward = false, moveBack = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3(0, 0, 0);
        let isGrounded = true;
        const WALK_SPEED = 5.2;
        const JUMP_POWER = 5.0;
        const GRAVITY = 15;
        
        // Maus
        let mouseX = 0, mouseY = 0;
        let pitch = 0, yaw = -Math.PI/2;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                mouseX += e.movementX * 0.002;
                mouseY += e.movementY * 0.002;
                mouseY = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, mouseY));
                yaw = mouseX;
                pitch = mouseY;
                camera.rotation.order = 'YXZ';
                camera.rotation.set(pitch, yaw, 0);
            }
        });
        
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        // Tastatur
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBack = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if(isGrounded) { velocity.y = JUMP_POWER; isGrounded = false; } break;
                case 'Digit1': currentWeapon = 0; updateWeaponUI(); break;
                case 'Digit2': currentWeapon = 1; updateWeaponUI(); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBack = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });
        
        // Schießen
        function shoot() {
            if (!canShoot) return;
            const weapon = weapons[currentWeapon];
            canShoot = false;
            setTimeout(() => { canShoot = true; }, weapon.cooldown);
            
            // Mündungsflash
            const flash = new THREE.PointLight(0xffaa66, 1, 8);
            flash.position.set(camera.position.x, camera.position.y - 0.2, camera.position.z);
            camera.add(flash);
            setTimeout(() => camera.remove(flash), 70);
            
            const raycaster = new THREE.Raycaster();
            const spreadX = (Math.random() - 0.5) * weapon.spread;
            const spreadY = (Math.random() - 0.5) * weapon.spread;
            const direction = camera.getWorldDirection(new THREE.Vector3());
            direction.x += spreadX;
            direction.y += spreadY;
            direction.normalize();
            raycaster.set(camera.position, direction);
            
            const intersects = raycaster.intersectObjects(enemies);
            if (intersects.length > 0) {
                const enemy = intersects[0].object;
                enemy.userData.health -= weapon.damage;
                createHitEffect(enemy.position);
                if (enemy.userData.health <= 0) {
                    const idx = enemies.indexOf(enemy);
                    if (idx !== -1) enemies.splice(idx,1);
                    scene.remove(enemy);
                    // Chance auf Key oder Coins
                    if (Math.random() < 0.3) {
                        spawnKey(enemy.position);
                    } else {
                        spawnCoin(enemy.position);
                    }
                    setTimeout(() => spawnRandomEnemy(), 2000);
                }
            }
        }
        
        function createHitEffect(pos) {
            const geom = new THREE.SphereGeometry(0.15, 4, 4);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x442200 });
            const spark = new THREE.Mesh(geom, mat);
            spark.position.copy(pos);
            scene.add(spark);
            setTimeout(() => scene.remove(spark), 150);
        }
        
        // Sammelobjekte
        const coinsList = [];
        const keysList = [];
        
        function spawnCoin(position) {
            const coinGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.08, 16);
            const coinMat = new THREE.MeshStandardMaterial({ color: 0xffcc44, metalness: 0.8, emissive: 0x442200 });
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.rotation.x = Math.PI/2;
            coin.position.copy(position);
            coin.position.y += 0.5;
            scene.add(coin);
            coinsList.push(coin);
        }
        
        function spawnKey(position) {
            const keyGeo = new THREE.BoxGeometry(0.3, 0.1, 0.6);
            const keyMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, metalness: 0.9 });
            const key = new THREE.Mesh(keyGeo, keyMat);
            key.position.copy(position);
            key.position.y += 0.3;
            scene.add(key);
            keysList.push(key);
        }
        
        function updateCoinsUI() {
            document.getElementById('coins-val').innerText = coins;
        }
        
        function updateKeysUI() {
            document.getElementById('keys-val').innerText = keys;
        }
        
        function spawnCollectibles() {
            // Bestehende löschen
            coinsList.forEach(c => scene.remove(c));
            keysList.forEach(k => scene.remove(k));
            coinsList.length = 0;
            keysList.length = 0;
            
            // Neue spawnen
            for (let i = 0; i < 8; i++) {
                const x = (Math.random() - 0.5) * 24;
                const z = (Math.random() - 0.5) * 24;
                spawnCoin(new THREE.Vector3(x, 0, z));
            }
            for (let i = 0; i < 3; i++) {
                const x = (Math.random() - 0.5) * 24;
                const z = (Math.random() - 0.5) * 24;
                spawnKey(new THREE.Vector3(x, 0, z));
            }
        }
        
        // Gegner
        const enemies = [];
        function createEnemy(x, z) {
            const geo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const mat = new THREE.MeshStandardMaterial({ color: 0xcc5555, emissive: 0x331100 });
            const enemy = new THREE.Mesh(geo, mat);
            enemy.position.set(x, 0.6, z);
            enemy.castShadow = true;
            enemy.userData = { health: 50 };
            scene.add(enemy);
            enemies.push(enemy);
            return enemy;
        }
        
        function spawnRandomEnemy() {
            let x = (Math.random() - 0.5) * 28;
            let z = (Math.random() - 0.5) * 28;
            x = Math.max(-14, Math.min(14, x));
            z = Math.max(-14, Math.min(14, z));
            createEnemy(x, z);
        }
        
        function respawnEnemies() {
            enemies.forEach(e => scene.remove(e));
            enemies.length = 0;
            for(let i=0; i<5; i++) spawnRandomEnemy();
        }
        
        // Initiale Gegner
        for(let i=0; i<5; i++) spawnRandomEnemy();
        spawnCollectibles();
        
        // UI Updates
        function updateWeaponUI() {
            document.getElementById('weapon-name').innerText = weapons[currentWeapon].name;
        }
        
        function updateHealthUI() {
            document.getElementById('health-val').innerText = health;
            const percent = Math.max(0, health);
            document.getElementById('health-fill').style.width = percent + '%';
        }
        
        // Bewegung & Kollision
        function updateMovement(deltaTime) {
            const actualSpeed = WALK_SPEED * deltaTime;
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3(0,0,0);
            if(moveForward) move.z -= 1;
            if(moveBack) move.z += 1;
            if(moveLeft) move.x -= 1;
            if(moveRight) move.x += 1;
            move.normalize();
            let deltaPos = new THREE.Vector3(0,0,0);
            deltaPos.addScaledVector(forward, move.z * actualSpeed);
            deltaPos.addScaledVector(right, move.x * actualSpeed);
            
            let newX = camera.position.x + deltaPos.x;
            let newZ = camera.position.z + deltaPos.z;
            let boundary = (currentMap === 'square') ? 18 : (currentMap === 'circle') ? 16 : 14;
            if(Math.abs(newX) < boundary && Math.abs(newZ) < boundary) {
                camera.position.x = newX;
                camera.position.z = newZ;
            }
            
            velocity.y -= GRAVITY * deltaTime;
            camera.position.y += velocity.y * deltaTime;
            if(camera.position.y <= 1.6) {
                camera.position.y = 1.6;
                velocity.y = 0;
                isGrounded = true;
            } else isGrounded = false;
        }
        
        // Sammeln
        function collectItems() {
            for(let i=0; i<coinsList.length; i++) {
                const coin = coinsList[i];
                if(camera.position.distanceTo(coin.position) < 1.2) {
                    scene.remove(coin);
                    coinsList.splice(i,1);
                    coins += 10;
                    updateCoinsUI();
                    i--;
                }
            }
            for(let i=0; i<keysList.length; i++) {
                const key = keysList[i];
                if(camera.position.distanceTo(key.position) < 1.2) {
                    scene.remove(key);
                    keysList.splice(i,1);
                    keys += 1;
                    updateKeysUI();
                    i--;
                }
            }
        }
        
        // Gegner Schaden
        function enemyDamage() {
            for(let i=0; i<enemies.length; i++) {
                const enemy = enemies[i];
                if(camera.position.distanceTo(enemy.position) < 1.4 && health > 0) {
                    health -= 15;
                    updateHealthUI();
                    if(health <= 0) {
                        alert("Du wurdest besiegt! Zurück zur Lobby.");
                        resetGame();
                    }
                    const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    camera.position.x += dir.x * 1.2;
                    camera.position.z += dir.z * 1.2;
                    break;
                }
            }
        }
        
        function resetGame() {
            health = 100;
            coins = 0;
            keys = 0;
            updateHealthUI();
            updateCoinsUI();
            updateKeysUI();
            switchMap('lobby');
            respawnEnemies();
            spawnCollectibles();
        }
        
        // Mobile Touch
        const touchBtns = document.querySelectorAll('.touch-btn');
        touchBtns.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const action = btn.dataset.action;
                if(action === 'forward') moveForward = true;
                if(action === 'back') moveBack = true;
                if(action === 'left') moveLeft = true;
                if(action === 'right') moveRight = true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') { currentWeapon = 0; updateWeaponUI(); }
                if(action === 'weapon2') { currentWeapon = 1; updateWeaponUI(); }
            });
            btn.addEventListener('touchend', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward = false;
                    if(action === 'back') moveBack = false;
                    if(action === 'left') moveLeft = false;
                    if(action === 'right') moveRight = false;
                }
            });
            btn.addEventListener('mousedown', (e) => {
                const action = btn.dataset.action;
                if(action === 'forward') moveForward = true;
                if(action === 'back') moveBack = true;
                if(action === 'left') moveLeft = true;
                if(action === 'right') moveRight = true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') { currentWeapon = 0; updateWeaponUI(); }
                if(action === 'weapon2') { currentWeapon = 1; updateWeaponUI(); }
            });
            btn.addEventListener('mouseup', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward = false;
                    if(action === 'back') moveBack = false;
                    if(action === 'left') moveLeft = false;
                    if(action === 'right') moveRight = false;
                }
            });
        });
        
        window.addEventListener('click', (e) => {
            if(document.pointerLockElement === renderer.domElement) shoot();
        });
        
        // Kartenwechsel Event
        document.getElementById('change-map-btn').addEventListener('click', () => {
            const selected = document.getElementById('map-select').value;
            switchMap(selected);
        });
        
        // Animation Loop
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            collectItems();
            enemyDamage();
            
            // Rotationen für Münzen und Keys
            coinsList.forEach(coin => coin.rotation.z += 0.03);
            keysList.forEach(key => key.rotation.y += 0.02);
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // Starte mit Lobby
        buildLobby();
        updateWeaponUI();
        updateHealthUI();
        updateCoinsUI();
        updateKeysUI();
        camera.position.set(0, 1.6, 0);
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
