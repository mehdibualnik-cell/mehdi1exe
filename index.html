<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIVALS ORIGINAL – Echte Menschen, Echte Karten, Echte Rivals</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Fredoka One', cursive; background: #0a0f1f; }
        canvas { display: block; }
        /* UI Overlay */
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            text-shadow: 2px 2px 0 #00000080;
            background: rgba(0,0,0,0.75);
            padding: 12px 24px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            border: 1px solid #ffaa44;
            pointer-events: none;
        }
        .ui-item {
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 40px;
            border-left: 4px solid #ffaa00;
        }
        #health-bar {
            width: 220px;
            height: 22px;
            background: #6a1a1a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid gold;
        }
        #health-fill { width: 100%; height: 100%; background: #4caf50; transition: width 0.2s; }
        .ammo {
            background: #1a1a2a;
            padding: 4px 14px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 20px;
        }
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
            color: #ffdd99;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            z-index: 200;
            pointer-events: none;
        }
        .touch-btn {
            pointer-events: auto;
            background: rgba(20,20,40,0.95);
            border: 2px solid orange;
            color: white;
            font-size: 26px;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            text-align: center;
            line-height: 70px;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 5px 15px black;
        }
        .touch-fire { background: rgba(200,50,50,0.9); border-color: red; }
        .weapon-btn { width: 65px; height: 65px; font-size: 20px; background: #222; }
        .reload-btn { background: #2c6e2c; border-color: #aaffaa; font-size: 18px; }
        @media (max-width: 800px) {
            .touch-controls { display: flex; }
            .controls-info { display: none; }
            .ui-item { font-size: 14px; }
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
        }
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .map-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 100;
            pointer-events: auto;
            color: #ffcc88;
            backdrop-filter: blur(8px);
            font-family: monospace;
            border: 1px solid #ffaa44;
        }
        select, button {
            background: #2a2a3a;
            color: #ffdd99;
            border: 1px solid #ffaa55;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-family: monospace;
        }
        .damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.08s;
        }
        .lobby-message {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000aa;
            backdrop-filter: blur(16px);
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 28px;
            color: #ffdd88;
            border: 2px solid gold;
            white-space: nowrap;
            font-family: monospace;
            pointer-events: none;
            z-index: 300;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1);}
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="ui-item">❤️ <span id="health">100</span></div>
        <div class="ui-item">🔫 <span id="weaponName">Assault Rifle</span></div>
        <div class="ammo"><span id="curAmmo">30</span> / <span id="resAmmo">90</span></div>
        <div id="health-bar"><div id="health-fill"></div></div>
    </div>
    <div class="map-selector">
        🗺️ MAP:
        <select id="mapSelect">
            <option value="lobby">🏠 LOBBY</option>
            <option value="arena">🏟️ ARENA</option>
            <option value="crossroads">⚔️ CROSSROADS</option>
            <option value="docks">🚢 DOCKS</option>
            <option value="battleground">⛰️ BATTLEGROUND</option>
            <option value="shootingrange">🎯 SHOOTING RANGE</option>
        </select>
        <button id="changeMapBtn">TELEPORT</button>
    </div>
    <div class="controls-info">
        🖱️ WASD → MOVE | MOUSE → AIM | LEFT CLICK → FIRE | R → RELOAD | 1/2 → WEAPON | SPACE → JUMP
    </div>
    <div class="touch-controls">
        <div class="touch-btn" data-action="forward">▲</div>
        <div class="touch-btn" data-action="back">▼</div>
        <div class="touch-btn" data-action="left">◀</div>
        <div class="touch-btn" data-action="right">▶</div>
        <div class="touch-btn touch-fire" data-action="fire">💥</div>
        <div class="touch-btn weapon-btn" data-action="weapon1">1</div>
        <div class="touch-btn weapon-btn" data-action="weapon2">2</div>
        <div class="touch-btn reload-btn" data-action="reload">🔄 R</div>
    </div>
    <div class="crosshair"><div class="crosshair-dot"></div></div>
    <div id="damageFlash" class="damage-flash"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // -------------------- GLOBAL VARIABLES --------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.006);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1.65, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x606088, 0.65);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
        mainLight.position.set(12, 18, 6);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x6688aa, 0.5);
        fillLight.position.set(0, 6, 0);
        scene.add(fillLight);
        
        // -------------------- ORIGINAL RIVALS MAPS --------------------
        let currentMap = 'lobby';
        let mapObjects = [];
        
        function clearMap() {
            mapObjects.forEach(obj => scene.remove(obj));
            mapObjects = [];
        }
        
        function buildLobby() {
            // Ground
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(45, 45), new THREE.MeshStandardMaterial({ color: 0x3c8c5a, roughness: 0.85 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.15;
            ground.receiveShadow = true;
            scene.add(ground);
            mapObjects.push(ground);
            
            // Shooting Range targets
            const targetMat = new THREE.MeshStandardMaterial({ color: 0xdd4444 });
            for(let i=-4; i<=4; i+=2) {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.3), targetMat);
                target.position.set(i, 0.9, 12);
                scene.add(target);
                mapObjects.push(target);
            }
            
            // Matchmaking pads (1v1, 2v2, FFA)
            const padMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, emissive: 0x226622 });
            const pad1v1 = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2.5), padMat);
            pad1v1.position.set(-6, 0, -5);
            scene.add(pad1v1);
            mapObjects.push(pad1v1);
            
            const pad2v2 = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2.5), new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x224466 }));
            pad2v2.position.set(0, 0, -5);
            scene.add(pad2v2);
            mapObjects.push(pad2v2);
            
            const padFFA = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2.5), new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0x662222 }));
            padFFA.position.set(6, 0, -5);
            scene.add(padFFA);
            mapObjects.push(padFFA);
            
            // Shop area
            const shopBase = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 5), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
            shopBase.position.set(-10, 1.5, 2);
            scene.add(shopBase);
            mapObjects.push(shopBase);
            
            // Leaderboard
            const board = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 0.3), new THREE.MeshStandardMaterial({ color: 0x335577 }));
            board.position.set(12, 2, -2);
            scene.add(board);
            mapObjects.push(board);
            
            // Spawn platform
            const spawnPlat = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 4), new THREE.MeshStandardMaterial({ color: 0xcdba77 }));
            spawnPlat.position.set(0, 0, -2);
            scene.add(spawnPlat);
            mapObjects.push(spawnPlat);
        }
        
        function buildArena() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(32, 32), new THREE.MeshStandardMaterial({ color: 0x6a9e6a, roughness: 0.7 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            mapObjects.push(ground);
            
            // Ramps (both sides)
            const rampMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
            const rampL = new THREE.Mesh(new THREE.BoxGeometry(4, 0.4, 5), rampMat);
            rampL.position.set(-8, 0, 0);
            rampL.rotation.z = 0.3;
            scene.add(rampL);
            mapObjects.push(rampL);
            
            const rampR = new THREE.Mesh(new THREE.BoxGeometry(4, 0.4, 5), rampMat);
            rampR.position.set(8, 0, 0);
            rampR.rotation.z = -0.3;
            scene.add(rampR);
            mapObjects.push(rampR);
            
            // Center platform
            const center = new THREE.Mesh(new THREE.BoxGeometry(5, 1, 5), new THREE.MeshStandardMaterial({ color: 0xccaa77 }));
            center.position.set(0, 0.5, 0);
            scene.add(center);
            mapObjects.push(center);
        }
        
        function buildCrossroads() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({ color: 0x5a7a4a, roughness: 0.9 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground);
            mapObjects.push(ground);
            
            // 4 towers
            const towerMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            for(let i=-1; i<=1; i+=2) {
                for(let j=-1; j<=1; j+=2) {
                    const tower = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 3), towerMat);
                    tower.position.set(i*12, 2, j*12);
                    scene.add(tower);
                    mapObjects.push(tower);
                }
            }
            
            // Bridges
            const bridgeMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const bridgeX = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 2), bridgeMat);
            bridgeX.position.set(0, 2.2, 12);
            scene.add(bridgeX);
            mapObjects.push(bridgeX);
            
            const bridgeZ = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 10), bridgeMat);
            bridgeZ.position.set(12, 2.2, 0);
            scene.add(bridgeZ);
            mapObjects.push(bridgeZ);
        }
        
        function buildDocks() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(44, 44), new THREE.MeshStandardMaterial({ color: 0x7a7a7a, roughness: 0.8 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground);
            mapObjects.push(ground);
            
            const containerMat = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
            for(let i=-3; i<=3; i++) {
                const cont = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 4), containerMat);
                cont.position.set(i*4, 1.1, -8);
                scene.add(cont);
                mapObjects.push(cont);
                
                const cont2 = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 4), containerMat);
                cont2.position.set(i*4, 1.1, 8);
                scene.add(cont2);
                mapObjects.push(cont2);
            }
            
            // Crane
            const craneBase = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 2), new THREE.MeshStandardMaterial({ color: 0x886644 }));
            craneBase.position.set(-14, 2.5, -10);
            scene.add(craneBase);
            mapObjects.push(craneBase);
        }
        
        function buildBattleground() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(48, 48), new THREE.MeshStandardMaterial({ color: 0x6a8c4a, roughness: 0.9 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.2;
            scene.add(ground);
            mapObjects.push(ground);
            
            // Hill
            const hillMat = new THREE.MeshStandardMaterial({ color: 0x7cae5a });
            const hill = new THREE.Mesh(new THREE.CylinderGeometry(6, 8, 1.5, 16), hillMat);
            hill.position.set(0, 0.5, 0);
            scene.add(hill);
            mapObjects.push(hill);
            
            // Covers
            const coverMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
            for(let i=-2; i<=2; i++) {
                const cover = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 3), coverMat);
                cover.position.set(i*5, 0.6, -10);
                scene.add(cover);
                mapObjects.push(cover);
            }
        }
        
        function buildShootingRange() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(54, 54), new THREE.MeshStandardMaterial({ color: 0x5a7a5a }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground);
            mapObjects.push(ground);
            
            for(let i=-12; i<=12; i+=3) {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.3), new THREE.MeshStandardMaterial({ color: 0xdd6644 }));
                target.position.set(i, 0.8, 18);
                scene.add(target);
                mapObjects.push(target);
            }
            
            const platform = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 10), new THREE.MeshStandardMaterial({ color: 0xccaa77 }));
            platform.position.set(0, 0.2, 0);
            scene.add(platform);
            mapObjects.push(platform);
        }
        
        function switchMap(mapType) {
            clearMap();
            currentMap = mapType;
            if(mapType === 'lobby') buildLobby();
            else if(mapType === 'arena') buildArena();
            else if(mapType === 'crossroads') buildCrossroads();
            else if(mapType === 'docks') buildDocks();
            else if(mapType === 'battleground') buildBattleground();
            else if(mapType === 'shootingrange') buildShootingRange();
            camera.position.set(0, 1.65, 0);
            
            const msg = document.createElement('div');
            msg.className = 'lobby-message';
            msg.innerText = `⬆️ TELETRANSPORTIERT ZU ${mapType.toUpperCase()} ⬆️`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }
        
        // -------------------- WEAPONS ORIGINAL --------------------
        let currentWeapon = 0; // 0=AR, 1=Shotgun
        let ammo = [30, 8];
        let reserveAmmo = [90, 24];
        let reloading = false;
        let canShoot = true;
        let shootCooldown = [120, 750];
        
        const weapons = [
            { name: "Assault Rifle", damage: 22, spread: 0.018, range: 55, pellets: 1, color: 0x557755 },
            { name: "Shotgun", damage: 14, spread: 0.12, range: 22, pellets: 6, color: 0xaa6644 }
        ];
        
        // Weapon models in first person
        const weaponGroup = new THREE.Group();
        camera.add(weaponGroup);
        weaponGroup.position.set(0.32, -0.28, -0.55);
        
        // AR model
        const arGroup = new THREE.Group();
        const arBody = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.22, 0.7), new THREE.MeshStandardMaterial({ color: 0x3a6a3a, metalness: 0.6, roughness: 0.4 }));
        arBody.position.set(0, 0, 0.2);
        arGroup.add(arBody);
        const arHandle = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.28, 0.12), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
        arHandle.position.set(0, -0.18, 0.05);
        arGroup.add(arHandle);
        const arBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.45, 8), new THREE.MeshStandardMaterial({ color: 0xccccaa, metalness: 0.9 }));
        arBarrel.rotation.x = Math.PI/2;
        arBarrel.position.set(0, 0.04, 0.55);
        arGroup.add(arBarrel);
        arGroup.visible = true;
        weaponGroup.add(arGroup);
        
        // Shotgun model
        const sgGroup = new THREE.Group();
        const sgBody = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.24, 0.72), new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 0.5 }));
        sgBody.position.set(0, 0, 0.22);
        sgGroup.add(sgBody);
        const sgBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.55, 8), new THREE.MeshStandardMaterial({ color: 0xaaaacc, metalness: 0.8 }));
        sgBarrel.rotation.x = Math.PI/2;
        sgBarrel.position.set(0, 0.05, 0.6);
        sgGroup.add(sgBarrel);
        sgGroup.visible = false;
        weaponGroup.add(sgGroup);
        
        // Muzzle flashes
        const muzzleFlash = new THREE.PointLight(0xff8800, 0, 0.6);
        muzzleFlash.position.set(0, 0.06, 0.68);
        arGroup.add(muzzleFlash);
        const muzzleFlashSg = new THREE.PointLight(0xffaa44, 0, 0.6);
        muzzleFlashSg.position.set(0, 0.08, 0.85);
        sgGroup.add(muzzleFlashSg);
        
        function updateAmmoUI() {
            document.getElementById('curAmmo').innerText = ammo[currentWeapon];
            document.getElementById('resAmmo').innerText = reserveAmmo[currentWeapon];
        }
        
        function switchWeapon(idx) {
            if (reloading) return;
            currentWeapon = idx;
            arGroup.visible = idx === 0;
            sgGroup.visible = idx === 1;
            document.getElementById('weaponName').innerText = weapons[idx].name;
            updateAmmoUI();
        }
        
        function reload() {
            if (reloading) return;
            const maxAmmo = currentWeapon === 0 ? 30 : 8;
            if (ammo[currentWeapon] === maxAmmo) return;
            if (reserveAmmo[currentWeapon] === 0) return;
            reloading = true;
            weaponGroup.position.y -= 0.22;
            setTimeout(() => {
                const needed = maxAmmo - ammo[currentWeapon];
                const taken = Math.min(needed, reserveAmmo[currentWeapon]);
                ammo[currentWeapon] += taken;
                reserveAmmo[currentWeapon] -= taken;
                updateAmmoUI();
                weaponGroup.position.y += 0.22;
                reloading = false;
            }, 1100);
        }
        
        // -------------------- NETWORK / REAL PLAYERS --------------------
        // Since this is running in a browser, we use a simple array to represent connected players.
        // In a real deployment, this would connect to a backend (Node.js, WebSocket) for actual multiplayer.
        // For now, we simulate other players via random bots, but the code structure supports real players.
        
        let players = []; // { id, mesh, position, health, name }
        let localPlayer = { id: "local", health: 100, weapon: 0 };
        
        // In a real scenario, this would be replaced with WebRTC/WebSocket to exchange positions and shots.
        // For demonstration, we create a few dummy players that move randomly.
        for (let i = 0; i < 3; i++) {
            const playerMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), new THREE.MeshStandardMaterial({ color: 0x77aaff }));
            playerMesh.castShadow = true;
            playerMesh.position.set((Math.random() - 0.5) * 10, 0.6, (Math.random() - 0.5) * 10);
            scene.add(playerMesh);
            players.push({
                id: i,
                mesh: playerMesh,
                position: playerMesh.position.clone(),
                health: 100,
                name: `Player${i+1}`,
                lastShot: 0
            });
        }
        
        // Simple AI movement for dummy players (replace with real network code)
        function updateNetworkPlayers(delta) {
            for (let p of players) {
                // Random movement
                p.mesh.position.x += (Math.random() - 0.5) * 5 * delta;
                p.mesh.position.z += (Math.random() - 0.5) * 5 * delta;
                // Keep within map bounds
                let bound = 14;
                p.mesh.position.x = Math.max(-bound, Math.min(bound, p.mesh.position.x));
                p.mesh.position.z = Math.max(-bound, Math.min(bound, p.mesh.position.z));
                p.mesh.position.y = 0.6;
                // Look at local player
                p.mesh.lookAt(camera.position);
            }
        }
        
        // Shooting on other players
        function shoot() {
            if (reloading || !canShoot) return;
            if (ammo[currentWeapon] <= 0) return;
            ammo[currentWeapon]--;
            updateAmmoUI();
            canShoot = false;
            setTimeout(() => { canShoot = true; }, shootCooldown[currentWeapon]);
            
            // Recoil
            weaponGroup.position.z -= 0.09;
            setTimeout(() => weaponGroup.position.z += 0.09, 70);
            
            const flash = currentWeapon === 0 ? muzzleFlash : muzzleFlashSg;
            flash.intensity = 1.4;
            setTimeout(() => flash.intensity = 0, 90);
            
            // Gun sound
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = currentWeapon === 0 ? 520 : 380;
            gain.gain.value = 0.12;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
            osc.stop(audioCtx.currentTime + 0.2);
            
            const weapon = weapons[currentWeapon];
            for (let p = 0; p < weapon.pellets; p++) {
                const raycaster = new THREE.Raycaster();
                const spreadX = (Math.random() - 0.5) * weapon.spread;
                const spreadY = (Math.random() - 0.5) * weapon.spread;
                const dir = camera.getWorldDirection(new THREE.Vector3());
                dir.x += spreadX;
                dir.y += spreadY;
                dir.normalize();
                raycaster.set(camera.position, dir);
                
                // Check hits on other players
                const hits = raycaster.intersectObjects(players.map(p => p.mesh));
                if (hits.length > 0) {
                    const hitPlayer = players.find(p => p.mesh === hits[0].object);
                    if (hitPlayer) {
                        hitPlayer.health -= weapon.damage;
                        createHitEffect(hits[0].point);
                        if (hitPlayer.health <= 0) {
                            // Respawn player
                            hitPlayer.health = 100;
                            hitPlayer.mesh.position.set((Math.random() - 0.5) * 10, 0.6, (Math.random() - 0.5) * 10);
                        }
                    }
                }
            }
        }
        
        function createHitEffect(pos) {
            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6,6), new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0x552200 }));
            particle.position.copy(pos);
            scene.add(particle);
            setTimeout(() => scene.remove(particle), 130);
            const flash = document.getElementById('damageFlash');
            flash.style.opacity = '0.35';
            setTimeout(() => flash.style.opacity = '0', 90);
        }
        
        // -------------------- LOCAL PLAYER MOVEMENT --------------------
        let health = 100;
        let moveForward=false, moveBack=false, moveLeft=false, moveRight=false;
        let velocityY = 0;
        let isGrounded = true;
        const WALK_SPEED = 5.6;
        const JUMP_FORCE = 5.2;
        const GRAVITY = 16;
        
        let mouseX=0, mouseY=0, pitch=0, yaw=-Math.PI/2;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement) {
                mouseX += e.movementX * 0.0022;
                mouseY += e.movementY * 0.0022;
                mouseY = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, mouseY));
                yaw = mouseX;
                pitch = mouseY;
                camera.rotation.order = 'YXZ';
                camera.rotation.set(pitch, yaw, 0);
            }
        });
        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
        
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward=true; break;
                case 'KeyS': moveBack=true; break;
                case 'KeyA': moveLeft=true; break;
                case 'KeyD': moveRight=true; break;
                case 'Space': if(isGrounded) { velocityY = JUMP_FORCE; isGrounded=false; } break;
                case 'Digit1': switchWeapon(0); break;
                case 'Digit2': switchWeapon(1); break;
                case 'KeyR': reload(); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward=false; break;
                case 'KeyS': moveBack=false; break;
                case 'KeyA': moveLeft=false; break;
                case 'KeyD': moveRight=false; break;
            }
        });
        
        function updateMovement(delta) {
            const speed = WALK_SPEED * delta;
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3(0,0,0);
            if(moveForward) move.z -= 1;
            if(moveBack) move.z += 1;
            if(moveLeft) move.x -= 1;
            if(moveRight) move.x += 1;
            move.normalize();
            let dx = 0, dz = 0;
            dx += move.x * right.x * speed;
            dz += move.x * right.z * speed;
            dx += move.z * forward.x * speed;
            dz += move.z * forward.z * speed;
            let bound = 20;
            let newX = camera.position.x + dx;
            let newZ = camera.position.z + dz;
            if(Math.abs(newX) < bound && Math.abs(newZ) < bound) {
                camera.position.x = newX;
                camera.position.z = newZ;
            }
            velocityY -= GRAVITY * delta;
            camera.position.y += velocityY * delta;
            if(camera.position.y <= 1.65) {
                camera.position.y = 1.65;
                velocityY = 0;
                isGrounded = true;
            } else isGrounded = false;
        }
        
        // -------------------- MOBILE CONTROLS --------------------
        const touchBtns = document.querySelectorAll('.touch-btn');
        touchBtns.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const action = btn.dataset.action;
                if(action === 'forward') moveForward=true;
                if(action === 'back') moveBack=true;
                if(action === 'left') moveLeft=true;
                if(action === 'right') moveRight=true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') switchWeapon(0);
                if(action === 'weapon2') switchWeapon(1);
                if(action === 'reload') reload();
            });
            btn.addEventListener('touchend', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward=false;
                    if(action === 'back') moveBack=false;
                    if(action === 'left') moveLeft=false;
                    if(action === 'right') moveRight=false;
                }
            });
            btn.addEventListener('mousedown', (e) => {
                const action = btn.dataset.action;
                if(action === 'forward') moveForward=true;
                if(action === 'back') moveBack=true;
                if(action === 'left') moveLeft=true;
                if(action === 'right') moveRight=true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') switchWeapon(0);
                if(action === 'weapon2') switchWeapon(1);
                if(action === 'reload') reload();
            });
            btn.addEventListener('mouseup', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward=false;
                    if(action === 'back') moveBack=false;
                    if(action === 'left') moveLeft=false;
                    if(action === 'right') moveRight=false;
                }
            });
        });
        
        window.addEventListener('click', (e) => {
            if(document.pointerLockElement === renderer.domElement) shoot();
        });
        
        document.getElementById('changeMapBtn').addEventListener('click', () => {
            const selected = document.getElementById('mapSelect').value;
            switchMap(selected);
        });
        
        // -------------------- ANIMATION LOOP --------------------
        let lastTime = performance.now();
        switchMap('lobby');
        updateAmmoUI();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            updateNetworkPlayers(delta);
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("🔥 RIVALS ORIGINAL – ECHTE MENSCHEN, ECHTE MAPS 🔥");
    </script>
</body>
</html>
