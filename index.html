<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rivals - First Person Action</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            text-shadow: 2px 2px 0 black;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 12px;
            pointer-events: none;
            backdrop-filter: blur(5px);
            font-weight: bold;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .ui-item {
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            border-left: 3px solid gold;
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background: rgba(0,0,0,0.7);
            border: 3px solid #ffaa00;
            border-radius: 12px;
            z-index: 100;
            pointer-events: none;
        }
        canvas.minimap-canvas {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
        #health-bar {
            width: 200px;
            height: 18px;
            background: #a00;
            border-radius: 10px;
            overflow: hidden;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: #0f0;
            transition: width 0.2s;
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 8px;
            color: #ccc;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        /* Mobile Touch Buttons (nur auf Touch-Geräten sichtbar) */
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 200;
            pointer-events: none;
        }
        .touch-btn {
            pointer-events: auto;
            background: rgba(30,30,40,0.9);
            border: 2px solid orange;
            color: white;
            font-size: 24px;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            text-align: center;
            line-height: 66px;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 4px 10px black;
        }
        .touch-fire {
            background: rgba(200,50,50,0.9);
            border-color: red;
        }
        .weapon-btn {
            width: 60px;
            height: 60px;
            font-size: 18px;
            background: #222;
        }
        @media (max-width: 800px) {
            .touch-controls { display: flex; }
            #controls-info { display: none; }
            .ui-item { font-size: 12px; }
            #minimap { width: 130px; height: 130px; }
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            background: radial-gradient(circle, rgba(255,0,0,0.3) 2px, transparent 3px);
        }
        .ammo {
            background: #222;
            font-size: 18px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-item">❤️ <span id="health-val">100</span>%</div>
        <div class="ui-item">🪙 <span id="coins-val">0</span></div>
        <div class="ui-item">🔫 <span id="weapon-name">Pistole</span> <span id="ammo-count">∞</span></div>
        <div class="ui-item">🥓 Bacon Skin</div>
        <div id="health-bar"><div id="health-fill"></div></div>
    </div>
    <div id="minimap">
        <canvas id="minimapCanvas" class="minimap-canvas" width="300" height="300"></canvas>
    </div>
    <div id="controls-info">
        🖱️ WASD → Laufen | Maus → Blick | 🔫 Linksklick / Touch-Feuer | 1/2 Waffe wechseln
    </div>
    <div class="touch-controls">
        <div class="touch-btn" data-action="forward">▲ W</div>
        <div class="touch-btn" data-action="back">▼ S</div>
        <div class="touch-btn" data-action="left">◀ A</div>
        <div class="touch-btn" data-action="right">▶ D</div>
        <div class="touch-btn touch-fire" data-action="fire">💥 FEUER</div>
        <div class="touch-btn weapon-btn" data-action="weapon1">1 🔫</div>
        <div class="touch-btn weapon-btn" data-action="weapon2">2 🔫🔫</div>
    </div>
    <div id="crosshair"></div>

    <!-- Three.js Bibliothek -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- GAME SETUP ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Beleuchtung
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x5533aa, 0.3);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        // Boden (Rasen)
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3c9e3c, roughness: 0.8 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Gitter für Orientierung
        const gridHelper = new THREE.GridHelper(60, 20, 0x88aa88, 0x446644);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
        
        // Map: Wände & Hindernisse (Startplatz markieren)
        function addWall(x, z, width, depth, color) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(width, 2, depth), new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 }));
            wall.position.set(x, 1, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            return wall;
        }
        // Arena Begrenzung + Gebäude
        addWall(0, -14, 30, 1, 0x8B5A2B);
        addWall(0, 14, 30, 1, 0x8B5A2B);
        addWall(-14, 0, 1, 30, 0x8B5A2B);
        addWall(14, 0, 1, 30, 0x8B5A2B);
        // Startplatz: eine Plattform mit Holzboden
        const startPlatform = new THREE.Mesh(new THREE.BoxGeometry(3, 0.3, 3), new THREE.MeshStandardMaterial({ color: 0xCDA87C, roughness: 0.7 }));
        startPlatform.position.set(0, -0.05, 5);
        startPlatform.castShadow = true;
        scene.add(startPlatform);
        // Markierung mit Bacon-Flagge
        const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 1.5, 4), new THREE.MeshStandardMaterial({ color: 0xAA8866 }));
        flagPole.position.set(0, 0.7, 5);
        scene.add(flagPole);
        
        // Dekorative Würfel / Hindernisse
        const obstacles = [
            { pos: [-4, 0, -3], size: [2,1,2], color: 0xAA8866 },
            { pos: [5, 0, -2], size: [1.5,1.5,1.5], color: 0xBC9A6C },
            { pos: [-3, 0, 6], size: [1,1.5,1], color: 0x8B5A2B },
            { pos: [6, 0, 3], size: [2,1,2], color: 0xBC9A6C },
            { pos: [-5, 0, -4], size: [1,2,1], color: 0xAA8866 },
            { pos: [2, 0, -5], size: [1.5,1,1.5], color: 0xCDA87C }
        ];
        obstacles.forEach(obs => {
            const box = new THREE.Mesh(new THREE.BoxGeometry(obs.size[0], obs.size[1], obs.size[2]), new THREE.MeshStandardMaterial({ color: obs.color, roughness: 0.5 }));
            box.position.set(obs.pos[0], obs.size[1]/2, obs.pos[2]);
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
        });
        
        // ---------- SPIELERSTATS ----------
        let health = 100;
        let coins = 0;
        let currentWeapon = 0; // 0 = Pistole, 1 = Schrotflinte
        const weapons = [
            { name: "Pistole", damage: 25, cooldown: 350, spread: 0.02, ammo: -1 }, // unendlich
            { name: "Schrotflinte", damage: 45, cooldown: 800, spread: 0.08, ammo: -1 }
        ];
        let canShoot = true;
        let moveForward = false, moveBack = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3(0, 0, 0);
        let isGrounded = true;
        const WALK_SPEED = 5.2;
        const JUMP_POWER = 5.0;
        const GRAVITY = 15;
        
        // Maussteuerung
        let mouseX = 0, mouseY = 0;
        let pitch = 0, yaw = -Math.PI/2;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                mouseX += e.movementX * 0.002;
                mouseY += e.movementY * 0.002;
                mouseY = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, mouseY));
                yaw = mouseX;
                pitch = mouseY;
                camera.rotation.order = 'YXZ';
                camera.rotation.set(pitch, yaw, 0);
            }
        });
        
        // Klick sperren für FPS
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        // Tastatur
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBack = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if(isGrounded) { velocity.y = JUMP_POWER; isGrounded = false; } break;
                case 'Digit1': currentWeapon = 0; updateWeaponUI(); break;
                case 'Digit2': currentWeapon = 1; updateWeaponUI(); break;
                case 'KeyR': break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBack = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });
        
        // Schießen (Raycast)
        function shoot() {
            if (!canShoot) return;
            const weapon = weapons[currentWeapon];
            canShoot = false;
            setTimeout(() => { canShoot = true; }, weapon.cooldown);
            
            // Mündungsflash Effekt (kurzer weißer Blitz)
            const flash = new THREE.PointLight(0xffaa66, 1, 8);
            flash.position.set(camera.position.x, camera.position.y - 0.2, camera.position.z);
            camera.add(flash);
            setTimeout(() => camera.remove(flash), 70);
            
            // Raycast von Kamera
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            // Streuung
            const spreadX = (Math.random() - 0.5) * weapon.spread;
            const spreadY = (Math.random() - 0.5) * weapon.spread;
            const direction = camera.getWorldDirection(new THREE.Vector3());
            direction.x += spreadX;
            direction.y += spreadY;
            direction.normalize();
            raycaster.set(camera.position, direction);
            
            const intersects = raycaster.intersectObjects(enemies);
            if (intersects.length > 0) {
                const enemy = intersects[0].object;
                enemy.userData.health -= weapon.damage;
                createHitEffect(enemy.position);
                if (enemy.userData.health <= 0) {
                    // Gegner stirbt
                    const idx = enemies.indexOf(enemy);
                    if (idx !== -1) enemies.splice(idx,1);
                    scene.remove(enemy);
                    // Münze droppen
                    spawnCoin(enemy.position);
                    // Spawn neuer Gegner nach kurzer Zeit
                    setTimeout(() => { spawnRandomEnemy(); }, 2000);
                }
            }
        }
        
        function createHitEffect(pos) {
            const geom = new THREE.SphereGeometry(0.15, 4, 4);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x442200 });
            const spark = new THREE.Mesh(geom, mat);
            spark.position.copy(pos);
            scene.add(spark);
            setTimeout(() => scene.remove(spark), 150);
        }
        
        // Münzen
        const coinsList = [];
        function spawnCoin(position) {
            const coinGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.08, 16);
            const coinMat = new THREE.MeshStandardMaterial({ color: 0xffcc44, metalness: 0.8, emissive: 0x442200 });
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.rotation.x = Math.PI/2;
            coin.position.copy(position);
            coin.position.y += 0.5;
            scene.add(coin);
            coinsList.push(coin);
        }
        
        function updateCoinsUI() {
            document.getElementById('coins-val').innerText = coins;
        }
        
        // Gegner System
        const enemies = [];
        function createEnemy(x, z) {
            const geo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const mat = new THREE.MeshStandardMaterial({ color: 0xcc5555, emissive: 0x331100 });
            const enemy = new THREE.Mesh(geo, mat);
            enemy.position.set(x, 0.6, z);
            enemy.castShadow = true;
            enemy.userData = { health: 50 };
            scene.add(enemy);
            enemies.push(enemy);
            return enemy;
        }
        
        function spawnRandomEnemy() {
            let x = (Math.random() - 0.5) * 20;
            let z = (Math.random() - 0.5) * 18;
            x = Math.max(-12, Math.min(12, x));
            z = Math.max(-12, Math.min(12, z));
            // nicht auf Startplatz spawnen
            if (Math.hypot(x, z-5) < 2.5) x += 3;
            createEnemy(x, z);
        }
        
        // Initial 4 Gegner
        for(let i=0; i<4; i++) spawnRandomEnemy();
        // Startmünzen
        for(let i=0;i<3;i++) spawnCoin(new THREE.Vector3((Math.random()-0.5)*8, 0, (Math.random()-0.5)*6 + 2));
        
        // Bacon Skin: Player-Symbol auf Minimap & Bacon-Modell als "Spirit" (First-Person selber nicht sichtbar)
        // Ein Bacon-Kopf schwebt über der Startplattform als Dekoration
        const baconMat = new THREE.MeshStandardMaterial({ color: 0xE89F6E, roughness: 0.3 });
        const baconHead = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), baconMat);
        baconHead.position.set(0, 0.9, 5.2);
        scene.add(baconHead);
        const baconEarL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0xC27040 }));
        baconEarL.position.set(-0.4, 0.2, 0.3);
        baconHead.add(baconEarL);
        const baconEarR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0xC27040 }));
        baconEarR.position.set(0.4, 0.2, 0.3);
        baconHead.add(baconEarR);
        
        // Minimap Zeichnung
        const minimapCanvas = document.getElementById('minimapCanvas');
        const ctx = minimapCanvas.getContext('2d');
        function updateMinimap() {
            const size = 300;
            ctx.fillStyle = "#1a2a1a";
            ctx.fillRect(0, 0, size, size);
            // Welt 30x30 auf 300px
            const scale = size / 30;
            // Hindernisse (Wände)
            ctx.fillStyle = "#8B5A2B";
            [[0,-14,30,1],[0,14,30,1],[-14,0,1,30],[14,0,1,30]].forEach(w => {
                let x = (w[0] - 15) * scale;
                let y = (w[1] + 15) * scale;
                let ww = w[2]*scale, hh = w[3]*scale;
                ctx.fillRect(x, y-hh, ww, hh);
            });
            ctx.fillStyle = "#CDA87C";
            ctx.fillRect((-1.5+15)*scale, (5+1.5-15)*scale, 3*scale, 3*scale);
            // Gegner (rot)
            enemies.forEach(e => {
                ctx.fillStyle = "#ff3333";
                let x = (e.position.x + 15) * scale;
                let y = (e.position.z + 15) * scale;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, 2*Math.PI);
                ctx.fill();
            });
            // Münzen (gelb)
            coinsList.forEach(c => {
                ctx.fillStyle = "#ffcc44";
                let x = (c.position.x + 15) * scale;
                let y = (c.position.z + 15) * scale;
                ctx.fillRect(x-2, y-2, 4, 4);
            });
            // Spieler (Bacon)
            ctx.fillStyle = "#E89F6E";
            let px = (camera.position.x + 15) * scale;
            let py = (camera.position.z + 15) * scale;
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = "#553322";
            ctx.fillRect(px-3, py-2, 6, 3);
        }
        
        // UI
        function updateWeaponUI() {
            document.getElementById('weapon-name').innerText = weapons[currentWeapon].name;
            document.getElementById('ammo-count').innerText = "∞";
        }
        function updateHealthUI() {
            document.getElementById('health-val').innerText = health;
            const percent = Math.max(0, health);
            document.getElementById('health-fill').style.width = percent + '%';
        }
        
        // Bewegungslogik & Kollision
        function updateMovement(deltaTime) {
            const actualSpeed = WALK_SPEED * deltaTime;
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3(0,0,0);
            if(moveForward) move.z -= 1;
            if(moveBack) move.z += 1;
            if(moveLeft) move.x -= 1;
            if(moveRight) move.x += 1;
            move.normalize();
            let deltaPos = new THREE.Vector3(0,0,0);
            deltaPos.addScaledVector(forward, move.z * actualSpeed);
            deltaPos.addScaledVector(right, move.x * actualSpeed);
            // einfache Kollision mit Begrenzung & Hindernissen
            let newX = camera.position.x + deltaPos.x;
            let newZ = camera.position.z + deltaPos.z;
            if(Math.abs(newX) < 13.5 && Math.abs(newZ) < 13.5) {
                camera.position.x = newX;
                camera.position.z = newZ;
            }
            // Gravitation & Sprung
            velocity.y -= GRAVITY * deltaTime;
            camera.position.y += velocity.y * deltaTime;
            if(camera.position.y <= 1.6) {
                camera.position.y = 1.6;
                velocity.y = 0;
                isGrounded = true;
            } else isGrounded = false;
        }
        
        // Münzen sammeln
        function collectCoins() {
            for(let i=0; i<coinsList.length; i++) {
                const coin = coinsList[i];
                const dist = camera.position.distanceTo(coin.position);
                if(dist < 1.2) {
                    scene.remove(coin);
                    coinsList.splice(i,1);
                    coins += 10;
                    updateCoinsUI();
                    i--;
                }
            }
        }
        
        // Gegner berührung Schaden
        function enemyDamage() {
            for(let i=0; i<enemies.length; i++) {
                const enemy = enemies[i];
                const dist = camera.position.distanceTo(enemy.position);
                if(dist < 1.4 && health > 0) {
                    health -= 15;
                    updateHealthUI();
                    if(health <= 0) {
                        alert("Du wurdest besiegt! Spiel wird neugestartet.");
                        resetGame();
                    }
                    // Rückstoß
                    const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    camera.position.x += dir.x * 1.2;
                    camera.position.z += dir.z * 1.2;
                    break;
                }
            }
        }
        
        function resetGame() {
            health = 100;
            coins = 0;
            updateHealthUI();
            updateCoinsUI();
            camera.position.set(0, 1.6, 5);
            velocity.set(0,0,0);
            // Gegner neu
            while(enemies.length) scene.remove(enemies.pop());
            for(let i=0;i<4;i++) spawnRandomEnemy();
            while(coinsList.length) scene.remove(coinsList.pop());
            for(let i=0;i<3;i++) spawnCoin(new THREE.Vector3((Math.random()-0.5)*8, 0, (Math.random()-0.5)*6 + 2));
        }
        
        // MOBILE TOUCH BUTTONS
        const touchBtns = document.querySelectorAll('.touch-btn');
        touchBtns.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const action = btn.dataset.action;
                if(action === 'forward') moveForward = true;
                if(action === 'back') moveBack = true;
                if(action === 'left') moveLeft = true;
                if(action === 'right') moveRight = true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') { currentWeapon = 0; updateWeaponUI(); }
                if(action === 'weapon2') { currentWeapon = 1; updateWeaponUI(); }
            });
            btn.addEventListener('touchend', (e) => {
                const action = btn.dataset.action;
                if(action === 'forward') moveForward = false;
                if(action === 'back') moveBack = false;
                if(action === 'left') moveLeft = false;
                if(action === 'right') moveRight = false;
            });
            // Maus-Unterstützung für Mobile Sim
            btn.addEventListener('mousedown', (e) => {
                const action = btn.dataset.action;
                if(action === 'forward') moveForward = true;
                if(action === 'back') moveBack = true;
                if(action === 'left') moveLeft = true;
                if(action === 'right') moveRight = true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') { currentWeapon = 0; updateWeaponUI(); }
                if(action === 'weapon2') { currentWeapon = 1; updateWeaponUI(); }
            });
            btn.addEventListener('mouseup', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward = false;
                    if(action === 'back') moveBack = false;
                    if(action === 'left') moveLeft = false;
                    if(action === 'right') moveRight = false;
                }
            });
        });
        
        // Schießen mit Maus / Touch
        window.addEventListener('click', (e) => {
            if(document.pointerLockElement === renderer.domElement) shoot();
        });
        
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            collectCoins();
            enemyDamage();
            updateMinimap();
            
            // einfache rotierende Münzen
            coinsList.forEach(coin => coin.rotation.z += 0.03);
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        updateWeaponUI();
        updateHealthUI();
        updateCoinsUI();
        camera.position.set(0, 1.6, 5);
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("Spiel gestartet – Rivals Style FPS mit Bacon, Münzen, Map, Mobile-Buttons!");
    </script>
</body>
</html>
