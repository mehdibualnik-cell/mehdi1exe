<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meccha Chamäleon 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#111; font-family:Arial,Helvetica,sans-serif; }
  #game { display:block; width:100%; height:100%; touch-action:none; }

  /* Bewegungs-Joystick unten links */
  #stick { position:fixed; left:20px; bottom:20px; width:120px; height:120px; border-radius:50%;
           background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.3); touch-action:none; z-index:10; }
  #knob { position:absolute; left:35px; top:35px; width:50px; height:50px; border-radius:50%;
          background:rgba(255,255,255,0.7); }

  /* Kamera-Bereich rechts */
  #look { position:fixed; right:0; top:0; width:50%; height:100%; z-index:5; touch-action:none; }

  /* Buttons rechts */
  .btns { position:fixed; right:15px; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:10; }
  .btn { padding:14px 10px; min-width:70px; text-align:center; border-radius:12px; color:#fff;
         font-weight:bold; font-size:14px; background:rgba(80,80,220,0.75); border:2px solid rgba(255,255,255,0.4); }
  .btn:active { background:rgba(120,120,255,0.9); }
  #btnPose { background:rgba(220,120,60,0.75); }
  #btnBrush.active { background:rgba(60,200,120,0.9); }

  /* Farbwähler oben */
  #palette { position:fixed; top:12px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:10;
             background:rgba(0,0,0,0.35); padding:8px 12px; border-radius:14px; }
  .swatch { width:34px; height:34px; border-radius:50%; border:2px solid #fff; }
  .swatch.sel { border:3px solid #ffea00; transform:scale(1.15); }

  #hint { position:fixed; top:60px; left:50%; transform:translateX(-50%); color:#fff; font-size:13px;
          background:rgba(0,0,0,0.4); padding:6px 12px; border-radius:10px; z-index:10; text-align:center; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="palette"></div>
<div id="hint">Bewege dich, gehe an eine Wand und klebe dich fest. Pinsel an → tippe auf deinen Körper zum Anmalen.</div>

<div id="stick"><div id="knob"></div></div>
<div id="look"></div>
<div class="btns">
  <div class="btn" id="btnStick">KLEBEN</div>
  <div class="btn" id="btnPose">POSE</div>
  <div class="btn" id="btnBrush">PINSEL</div>
</div>

<script>
// ---------- Setup ----------
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W, H;
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
resize(); window.addEventListener('resize', resize);

// ---------- Kleine 3D-Mathe (kein Framework) ----------
function rotY(p, a){ const c=Math.cos(a), s=Math.sin(a); return {x:p.x*c+p.z*s, y:p.y, z:-p.x*s+p.z*c}; }

const cam = { x:0, y:1.6, z:6, yaw:Math.PI, pitch:0, fov:520 };

// Welt: einfaches Haus (Boden + 4 Wände). Farbige Quads.
const walls = [];
function wall(x1,z1,x2,z2,color){ walls.push({x1,z1,x2,z2,color,h:3}); }
const R = 8; // Raumgröße
wall(-R,-R, R,-R, '#b7794a'); // Ziegelfarbe
wall( R,-R, R, R, '#8fb56f'); // grün
wall( R, R,-R, R, '#6f8fb5'); // blau
wall(-R, R,-R,-R, '#c9b06f'); // gelb
// Ein paar Innen-Objekte (Kisten) als extra Verstecke
const boxes = [
  {x:-4,z:-3,s:1.2,color:'#d05050'},
  {x:3,z:2,s:1.5,color:'#5050d0'},
  {x:0,z:-4,s:1,color:'#50a050'},
];

// ---------- Projektion ----------
function project(px,py,pz){
  let x=px-cam.x, y=py-cam.y, z=pz-cam.z;
  // yaw
  let cy=Math.cos(-cam.yaw), sy=Math.sin(-cam.yaw);
  let x1=x*cy - z*sy, z1=x*sy + z*cy;
  // pitch
  let cp=Math.cos(-cam.pitch), sp=Math.sin(-cam.pitch);
  let y1=y*cp - z1*sp, z2=y*sp + z1*cp;
  if(z2<=0.1) return null;
  const sx=W/2 + (x1/z2)*cam.fov;
  const sy2=H/2 - (y1/z2)*cam.fov;
  return {x:sx,y:sy2,z:z2};
}

// ---------- Spieler ----------
const player = {
  x:0, z:0, y:0, angle:0,
  stuck:false, pose:0,           // pose: 0 stehen, 1 gekugelt, 2 liegend
  body:'blob',                   // Form: rund (blob)
  color:'#ffffff',
  paint:[]                       // Farbkleckse: {u,v,c,r}
};

// ---------- Farbpalette ----------
const colors = ['#ffffff','#b7794a','#8fb56f','#6f8fb5','#c9b06f','#d05050','#222222'];
let selColor = 0;
const pal = document.getElementById('palette');
colors.forEach((c,i)=>{
  const s=document.createElement('div');
  s.className='swatch'+(i===0?' sel':'');
  s.style.background=c;
  s.onclick=()=>{ selColor=i; document.querySelectorAll('.swatch').forEach(e=>e.classList.remove('sel')); s.classList.add('sel'); };
  pal.appendChild(s);
});

// ---------- Steuerung: Joystick ----------
let move={x:0,y:0};
const stick=document.getElementById('stick'), knob=document.getElementById('knob');
let stickId=null, sc={x:80,y:innerHeight-80};
function stickStart(e){ const t=e.changedTouches?e.changedTouches[0]:e; stickId=t.identifier??'m';
  const r=stick.getBoundingClientRect(); sc={x:r.left+r.width/2, y:r.top+r.height/2}; stickMove(e); }
function stickMove(e){
  const list=e.changedTouches?[...e.changedTouches]:[e];
  const t=list.find(x=>(x.identifier??'m')===stickId); if(!t)return;
  let dx=t.clientX-sc.x, dy=t.clientY-sc.y; const d=Math.hypot(dx,dy), max=45;
  if(d>max){ dx=dx/d*max; dy=dy/d*max; }
  knob.style.left=(35+dx)+'px'; knob.style.top=(35+dy)+'px';
  move.x=dx/max; move.y=dy/max;
}
function stickEnd(){ stickId=null; move={x:0,y:0}; knob.style.left='35px'; knob.style.top='35px'; }
stick.addEventListener('touchstart',e=>{e.preventDefault();stickStart(e);},{passive:false});
stick.addEventListener('touchmove',e=>{e.preventDefault();stickMove(e);},{passive:false});
stick.addEventListener('touchend',e=>{e.preventDefault();stickEnd();},{passive:false});
stick.addEventListener('mousedown',stickStart);
window.addEventListener('mousemove',e=>{if(stickId==='m')stickMove(e);});
window.addEventListener('mouseup',()=>{if(stickId==='m')stickEnd();});

// ---------- Steuerung: Kamera-Blick ----------
const look=document.getElementById('look');
let lookId=null, lx=0, ly=0;
function lookStart(e){ const t=e.changedTouches?e.changedTouches[0]:e; lookId=t.identifier??'lm'; lx=t.clientX; ly=t.clientY; }
function lookMove(e){
  const list=e.changedTouches?[...e.changedTouches]:[e];
  const t=list.find(x=>(x.identifier??'lm')===lookId); if(!t)return;
  cam.yaw += (t.clientX-lx)*0.005;
  cam.pitch = Math.max(-1, Math.min(1, cam.pitch + (t.clientY-ly)*0.005));
  lx=t.clientX; ly=t.clientY;
}
function lookEnd(){ lookId=null; }
look.addEventListener('touchstart',e=>{e.preventDefault();lookStart(e);},{passive:false});
look.addEventListener('touchmove',e=>{e.preventDefault();lookMove(e);},{passive:false});
look.addEventListener('touchend',e=>{e.preventDefault();lookEnd();},{passive:false});
look.addEventListener('mousedown',lookStart);
window.addEventListener('mousemove',e=>{if(lookId==='lm')lookMove(e);});
window.addEventListener('mouseup',()=>{if(lookId==='lm')lookEnd();});

// ---------- Buttons ----------
document.getElementById('btnStick').onclick=()=>{ player.stuck=!player.stuck; };
document.getElementById('btnPose').onclick=()=>{ player.pose=(player.pose+1)%3; };
let brushOn=false;
const btnBrush=document.getElementById('btnBrush');
btnBrush.onclick=()=>{ brushOn=!brushOn; btnBrush.classList.toggle('active',brushOn); };

// Tastatur (Desktop)
const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;
  if(e.key===' ')player.stuck=!player.stuck;
  if(e.key.toLowerCase()==='q')player.pose=(player.pose+1)%3;
});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

// ---------- Anmalen: Tippen auf den Körper ----------
let playerScreen=null; // {x,y,r}
function tryPaint(sx,sy){
  if(!brushOn || !playerScreen) return false;
  const d=Math.hypot(sx-playerScreen.x, sy-playerScreen.y);
  if(d<=playerScreen.r){
    const u=(sx-playerScreen.x)/playerScreen.r;
    const v=(sy-playerScreen.y)/playerScreen.r;
    player.paint.push({u,v,c:colors[selColor],r:0.35+Math.random()*0.2});
    if(player.paint.length>40) player.paint.shift();
    return true;
  }
  return false;
}
cv.addEventListener('touchstart',e=>{ for(const t of e.changedTouches) tryPaint(t.clientX,t.clientY); },{passive:true});
cv.addEventListener('mousedown',e=>{ tryPaint(e.clientX,e.clientY); });

// ---------- Update ----------
function update(){
  const speed=0.12;
  let fx=0, fz=0;
  // Bewegung relativ zur Kamera
  const s=Math.sin(cam.yaw), c=Math.cos(cam.yaw);
  let mx=move.x, my=move.y;
  if(keys['w'])my-=1; if(keys['s'])my+=1; if(keys['a'])mx-=1; if(keys['d'])mx+=1;
  if(!player.stuck && (mx||my)){
    fx = (mx*c - my*s);
    fz = (mx*s + my*c);
    const nx=player.x+fx*speed, nz=player.z+fz*speed;
    if(Math.abs(nx)<R-0.6) player.x=nx;
    if(Math.abs(nz)<R-0.6) player.z=nz;
    player.angle=Math.atan2(fx,fz);
  }

  // Kamera folgt Spieler (Third-Person)
  const camDist=4.5, camHeight=2.2;
  const tx=player.x - Math.sin(cam.yaw)*camDist;
  const tz=player.z - Math.cos(cam.yaw)*camDist;
  cam.x += (tx-cam.x)*0.15;
  cam.z += (tz-cam.z)*0.15;
  cam.y += (player.y+camHeight-cam.y)*0.15;
}

// ---------- Zeichnen ----------
function fillPoly(pts,color){
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.stroke();
}

function draw(){
  // Himmel / Boden Hintergrund
  ctx.fillStyle='#3a3f4a'; ctx.fillRect(0,0,W,H/2);
  ctx.fillStyle='#2a2018'; ctx.fillRect(0,H/2,W,H/2);

  // Boden-Quad
  const g=2, fl=[];
  const corners=[[-R,-R],[R,-R],[R,R],[-R,R]];
  let ok=true;
  const fpts=corners.map(([x,z])=>{const p=project(x,0,z); if(!p)ok=false; return p;});
  if(ok) fillPoly(fpts,'#5a4a38');

  // Wände (nach Distanz sortiert)
  const drawList=[];
  walls.forEach(w=>{
    const mx=(w.x1+w.x2)/2, mz=(w.z1+w.z2)/2;
    const d=Math.hypot(mx-cam.x, mz-cam.z);
    drawList.push({type:'wall',w,d});
  });
  boxes.forEach(b=>{
    const d=Math.hypot(b.x-cam.x, b.z-cam.z);
    drawList.push({type:'box',b,d});
  });
  // Spieler in die Liste
  drawList.push({type:'player',d:Math.hypot(player.x-cam.x,player.z-cam.z)});
  drawList.sort((a,b)=>b.d-a.d);

  drawList.forEach(item=>{
    if(item.type==='wall'){
      const w=item.w;
      const p1=project(w.x1,0,w.z1), p2=project(w.x2,0,w.z2);
      const p3=project(w.x2,w.h,w.z2), p4=project(w.x1,w.h,w.z1);
      if(p1&&p2&&p3&&p4) fillPoly([p1,p2,p3,p4],w.color);
    } else if(item.type==='box'){
      const b=item.b, s=b.s;
      // einfache Box: nur Vorderseite + Oberseite grob
      const c=[
        [b.x-s,0,b.z-s],[b.x+s,0,b.z-s],[b.x+s,0,b.z+s],[b.x-s,0,b.z+s],
        [b.x-s,s*2,b.z-s],[b.x+s,s*2,b.z-s],[b.x+s,s*2,b.z+s],[b.x-s,s*2,b.z+s]
      ].map(([x,y,z])=>project(x,y,z));
      const faces=[[0,1,5,4],[1,2,6,5],[2,3,7,6],[3,0,4,7],[4,5,6,7]];
      faces.forEach(f=>{
        if(f.every(i=>c[i])) fillPoly(f.map(i=>c[i]), b.color);
      });
    } else {
      drawPlayer();
    }
  });
}

function drawPlayer(){
  // Basis-Höhe je nach Pose
  let cx=player.x, cz=player.z, cyBase=0;
  let radius=0.55, squash=1;
  if(player.pose===1){ radius=0.7; squash=0.6; }      // gekugelt
  if(player.pose===2){ radius=0.55; squash=0.35; }    // liegend

  const centerY = radius*squash + (player.pose===0?0.2:0);
  const p=project(cx, centerY, cz);
  if(!p) { playerScreen=null; return; }
  const scr = radius/p.z*cam.fov;

  // runder Körper (Ellipse für Pose)
  ctx.save();
  ctx.translate(p.x,p.y);
  const ry=scr*squash;
  ctx.beginPath();
  ctx.ellipse(0,0,scr,ry,0,0,Math.PI*2);
  // Grundfarbe
  ctx.fillStyle=player.color;
  ctx.fill();
  // Schattierung
  const grad=ctx.createRadialGradient(-scr*0.3,-ry*0.3,scr*0.2,0,0,scr);
  grad.addColorStop(0,'rgba(255,255,255,0.25)');
  grad.addColorStop(1,'rgba(0,0,0,0.25)');
  ctx.fillStyle=grad; ctx.fill();

  // Farbkleckse (Anmalen) innerhalb des Körpers
  ctx.save();
  ctx.clip();
  player.paint.forEach(pt=>{
    ctx.beginPath();
    ctx.ellipse(pt.u*scr, pt.v*ry, pt.r*scr, pt.r*ry, 0, 0, Math.PI*2);
    ctx.fillStyle=pt.c; ctx.fill();
  });
  ctx.restore();

  // kleine Augen (nur wenn nicht liegend)
  if(player.pose!==2){
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(-scr*0.25,-ry*0.15,scr*0.09,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( scr*0.25,-ry*0.15,scr*0.09,0,Math.PI*2); ctx.fill();
  }

  // Rand
  ctx.beginPath();
  ctx.ellipse(0,0,scr,ry,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=2; ctx.stroke();
  ctx.restore();

  // "geklebt an Wand" Anzeige
  if(player.stuck){
    ctx.fillStyle='rgba(60,200,120,0.9)';
    ctx.font='bold 14px Arial'; ctx.textAlign='center';
    ctx.fillText('🖐 GEKLEBT', p.x, p.y-ry-14);
  }

  playerScreen={x:p.x,y:p.y,r:Math.max(scr,ry)};
}

// ---------- Loop ----------
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
