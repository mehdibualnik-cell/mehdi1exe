<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>RIVALS - Roblox FPS (Original WebGL)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Fredoka One', 'Segoe UI', cursive;
            background-color: #0a0f1f;
            height: 100%;
            width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Modernes UI Overlay - Inspiriert von Roblox RIVALS */
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            text-shadow: 2px 2px 0 #00000080;
            background: rgba(0,0,0,0.75);
            padding: 12px 24px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            border: 1px solid #ffaa44;
            pointer-events: none;
        }
        .ui-item {
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 40px;
            border-left: 4px solid #ffaa00;
        }
        #health-bar {
            width: 220px;
            height: 22px;
            background: #6a1a1a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid gold;
        }
        #health-fill { width: 100%; height: 100%; background: #4caf50; transition: width 0.2s; }
        .ammo {
            background: #1a1a2a;
            padding: 4px 14px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 20px;
        }
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
            color: #ffdd99;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            z-index: 200;
            pointer-events: none;
        }
        .touch-btn {
            pointer-events: auto;
            background: rgba(20,20,40,0.95);
            border: 2px solid orange;
            color: white;
            font-size: 26px;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            text-align: center;
            line-height: 70px;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 5px 15px black;
            cursor: pointer;
        }
        .touch-fire { background: rgba(200,50,50,0.9); border-color: red; }
        .weapon-btn { width: 65px; height: 65px; font-size: 20px; background: #222; }
        .reload-btn { background: #2c6e2c; border-color: #aaffaa; font-size: 18px; }
        @media (max-width: 800px) {
            .touch-controls { display: flex; }
            .controls-info { display: none; }
            .ui-item { font-size: 14px; }
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
        }
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .map-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 100;
            pointer-events: auto;
            color: #ffcc88;
            backdrop-filter: blur(8px);
            font-family: monospace;
            border: 1px solid #ffaa44;
        }
        select, button {
            background: #2a2a3a;
            color: #ffdd99;
            border: 1px solid #ffaa55;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-family: monospace;
        }
        .damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.08s;
        }
        .lobby-message {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000aa;
            backdrop-filter: blur(16px);
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 28px;
            color: #ffdd88;
            border: 2px solid gold;
            white-space: nowrap;
            font-family: monospace;
            pointer-events: none;
            z-index: 300;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1);}
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="ui-item">❤️ <span id="health">100</span></div>
        <div class="ui-item">🪙 <span id="coins">0</span></div>
        <div class="ui-item">🔑 <span id="keys">0</span></div>
        <div class="ui-item">💎 <span id="gems">0</span></div>
        <div class="ui-item">🔫 <span id="weaponName">Assault Rifle</span></div>
        <div class="ammo"><span id="curAmmo">30</span> / <span id="resAmmo">90</span></div>
        <div id="health-bar"><div id="health-fill"></div></div>
    </div>
    <div class="controls-info">
        🖱️ WASD → MOVE | MOUSE → AIM | LEFT CLICK → FIRE | R → RELOAD | 1/2/3/4 → WEAPON | SPACE → JUMP | E → SHOP
    </div>
    <div class="touch-controls">
        <div class="touch-btn" data-action="forward">▲</div>
        <div class="touch-btn" data-action="back">▼</div>
        <div class="touch-btn" data-action="left">◀</div>
        <div class="touch-btn" data-action="right">▶</div>
        <div class="touch-btn touch-fire" data-action="fire">💥</div>
        <div class="touch-btn weapon-btn" data-action="weapon1">1</div>
        <div class="touch-btn weapon-btn" data-action="weapon2">2</div>
        <div class="touch-btn weapon-btn" data-action="weapon3">3</div>
        <div class="touch-btn reload-btn" data-action="reload">🔄 R</div>
    </div>
    <div class="crosshair"><div class="crosshair-dot"></div></div>
    <div id="damageFlash" class="damage-flash"></div>
    <div id="shopModal" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2a; border: 2px solid gold; padding: 20px; z-index: 500; color: white; font-family: monospace; border-radius: 20px; backdrop-filter: blur(16px); width: 300px; text-align: center; pointer-events: auto;">
        <h2>SHOP</h2>
        <div id="shopItems"></div>
        <button id="closeShopBtn" style="margin-top: 20px;">CLOSE</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SZENE & KAMERA (VOLLWERTIGE 3D-WELT)---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.006);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1.65, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- BELEUCHTUNG (Roblox-typisch & atmosphärisch)---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
        mainLight.position.set(12, 18, 6);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x6688aa, 0.5);
        fillLight.position.set(0, 6, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(-3, 4, -5);
        scene.add(backLight);
        
        // --- GLOBALE VARIABLEN ---
        let currentMap = 'lobby';
        let mapObjects = [];
        
        // ------------------------ DIE RIVALS MAPS (ORIGINALGETREU) ------------------------
        function clearMap() { mapObjects.forEach(obj => scene.remove(obj)); mapObjects = []; }
        
        function buildLobby() {
            // Großer, detaillierter Lobby-Boden
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3c8c5a, roughness: 0.85, metalness: 0.1 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.15;
            ground.receiveShadow = true;
            scene.add(ground);
            mapObjects.push(ground);
            
            // 1. Der Schießstand (Shooting Range) - rechts hinten
            const rangeMat = new THREE.MeshStandardMaterial({ color: 0xcdba87, roughness: 0.7 });
            const rangeBase = new THREE.Mesh(new THREE.BoxGeometry(18, 0.3, 18), rangeMat);
            rangeBase.position.set(12, 0, 12);
            rangeBase.castShadow = true;
            scene.add(rangeBase);
            mapObjects.push(rangeBase);
            // Schießscheiben
            const targetMat = new THREE.MeshStandardMaterial({ color: 0xdd4444, metalness: 0.6, roughness: 0.3 });
            for(let i = -5; i <= 5; i+=2.5) {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.3), targetMat);
                target.position.set(12 + i, 0.9, 19);
                scene.add(target);
                mapObjects.push(target);
            }
            
            // 2. Die Matchmaking-Pads (original: 1v1, 2v2, FFA)
            const padMat1 = new THREE.MeshStandardMaterial({ color: 0x44aa44, emissive: 0x226622 });
            const pad1v1 = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 3), padMat1);
            pad1v1.position.set(-8, 0, -6);
            scene.add(pad1v1);
            mapObjects.push(pad1v1);
            
            const padMat2 = new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x224466 });
            const pad2v2 = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 3), padMat2);
            pad2v2.position.set(0, 0, -6);
            scene.add(pad2v2);
            mapObjects.push(pad2v2);
            
            const padMat3 = new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0x662222 });
            const padFFA = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 3), padMat3);
            padFFA.position.set(8, 0, -6);
            scene.add(padFFA);
            mapObjects.push(padFFA);
            
            // 3. Der Shop-Bereich (links)
            const shopMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.6 });
            const shopBase = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 6), shopMat);
            shopBase.position.set(-14, 2, 0);
            scene.add(shopBase);
            mapObjects.push(shopBase);
            const shopSign = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 0.2), new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0x442200 }));
            shopSign.position.set(-14, 3.5, 0.2);
            scene.add(shopSign);
            mapObjects.push(shopSign);
            
            // 4. Die Leaderboard-Tafel (rechts vorne)
            const boardMat = new THREE.MeshStandardMaterial({ color: 0x335577, metalness: 0.4, roughness: 0.2 });
            const board = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 0.3), boardMat);
            board.position.set(15, 2, -8);
            scene.add(board);
            mapObjects.push(board);
            
            // 5. Die zentrale Spawnplattform mit Bacon-Statue
            const spawnMat = new THREE.MeshStandardMaterial({ color: 0xcdba77, roughness: 0.5 });
            const spawnPlat = new THREE.Mesh(new THREE.BoxGeometry(5, 0.3, 5), spawnMat);
            spawnPlat.position.set(0, 0, -2);
            scene.add(spawnPlat);
            mapObjects.push(spawnPlat);
            const bacon = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.6, 0.8), new THREE.MeshStandardMaterial({ color: 0xE89F6E }));
            bacon.position.set(0, 0.8, -2);
            scene.add(bacon);
            mapObjects.push(bacon);
        }
        
        function buildArena() {
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x6a9e6a, roughness: 0.7 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            mapObjects.push(ground);
            
            const rampMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c, roughness: 0.8 });
            const rampL = new THREE.Mesh(new THREE.BoxGeometry(5, 0.6, 6), rampMat);
            rampL.position.set(-10, 0, 0);
            rampL.rotation.z = 0.3;
            scene.add(rampL);
            mapObjects.push(rampL);
            
            const rampR = new THREE.Mesh(new THREE.BoxGeometry(5, 0.6, 6), rampMat);
            rampR.position.set(10, 0, 0);
            rampR.rotation.z = -0.3;
            scene.add(rampR);
            mapObjects.push(rampR);
            
            const centerMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.6 });
            const center = new THREE.Mesh(new THREE.BoxGeometry(6, 1.2, 6), centerMat);
            center.position.set(0, 0.6, 0);
            scene.add(center);
            mapObjects.push(center);
        }
        
        function buildCrossroads() {
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7a4a, roughness: 0.9 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground);
            mapObjects.push(ground);
            
            const towerMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.7 });
            for(let i = -1; i <= 1; i+=2) {
                for(let j = -1; j <= 1; j+=2) {
                    const tower = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 4), towerMat);
                    tower.position.set(i*14, 2.5, j*14);
                    scene.add(tower);
                    mapObjects.push(tower);
                }
            }
            
            const bridgeMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.6 });
            const bridgeX = new THREE.Mesh(new THREE.BoxGeometry(12, 0.6, 3), bridgeMat);
            bridgeX.position.set(0, 2.8, 14);
            scene.add(bridgeX);
            mapObjects.push(bridgeX);
            
            const bridgeZ = new THREE.Mesh(new THREE.BoxGeometry(3, 0.6, 12), bridgeMat);
            bridgeZ.position.set(14, 2.8, 0);
            scene.add(bridgeZ);
            mapObjects.push(bridgeZ);
        }
        
        function buildDocks() {
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x7a7a7a, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(55, 55), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground);
            mapObjects.push(ground);
            
            const containerMat = new THREE.MeshStandardMaterial({ color: 0xaa5533, metalness: 0.7, roughness: 0.4 });
            for(let i = -4; i <= 4; i++) {
                const cont = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 4.5), containerMat);
                cont.position.set(i*5, 1.25, -10);
                scene.add(cont);
                mapObjects.push(cont);
                
                const cont2 = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 4.5), containerMat);
                cont2.position.set(i*5, 1.25, 10);
                scene.add(cont2);
                mapObjects.push(cont2);
            }
            
            const craneMat = new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.8 });
            const craneBase = new THREE.Mesh(new THREE.BoxGeometry(3, 6, 3), craneMat);
            craneBase.position.set(-16, 3, -14);
            scene.add(craneBase);
            mapObjects.push(craneBase);
        }
        
        function buildBattleground() {
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x6a8c4a, roughness: 0.9 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.2;
            scene.add(ground);
            mapObjects.push(ground);
            
            const hillMat = new THREE.MeshStandardMaterial({ color: 0x7cae5a, roughness: 0.8 });
            const hill = new THREE.Mesh(new THREE.CylinderGeometry(7, 9, 1.8, 24), hillMat);
            hill.position.set(0, 0.6, 0);
            scene.add(hill);
            mapObjects.push(hill);
            
            const coverMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c, roughness: 0.7 });
            for(let i = -3; i <= 3; i++) {
                const cover = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 4), coverMat);
                cover.position.set(i*6, 0.75, -12);
                scene.add(cover);
                mapObjects.push(cover);
            }
        }
        
        function buildShootingRange() {
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7a5a, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(70, 70), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.1;
            scene.add(ground);
            mapObjects.push(ground);
            
            const targetMat = new THREE.MeshStandardMaterial({ color: 0xdd6644, metalness: 0.5 });
            for(let i = -15; i <= 15; i+=3) {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.3), targetMat);
                target.position.set(i, 0.9, 22);
                scene.add(target);
                mapObjects.push(target);
            }
            
            const platformMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, roughness: 0.6 });
            const platform = new THREE.Mesh(new THREE.BoxGeometry(12, 0.6, 12), platformMat);
            platform.position.set(0, 0.3, 0);
            scene.add(platform);
            mapObjects.push(platform);
        }
        
        function switchMap(mapType) {
            clearMap();
            currentMap = mapType;
            if(mapType === 'lobby') buildLobby();
            else if(mapType === 'arena') buildArena();
            else if(mapType === 'crossroads') buildCrossroads();
            else if(mapType === 'docks') buildDocks();
            else if(mapType === 'battleground') buildBattleground();
            else if(mapType === 'shootingrange') buildShootingRange();
            camera.position.set(0, 1.65, 0);
            
            const msg = document.createElement('div');
            msg.className = 'lobby-message';
            msg.innerText = `⬆️ TELETRANSPORTIERT ZU ${mapType.toUpperCase()} ⬆️`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }
        
        // --- WAFFEN & AMMUNITION (ORIGINALGETREU)---
        let currentWeapon = 0;
        let ammo = [30, 8, 5, 1];
        let reserveAmmo = [90, 24, 15, 3];
        let reloading = false;
        let canShoot = true;
        let shootCooldown = [120, 750, 1400, 1800];
        
        const weapons = [
            { name: "Assault Rifle", damage: 22, spread: 0.018, pellets: 1, color: 0x557755, cost: 0 },
            { name: "Shotgun", damage: 14, spread: 0.12, pellets: 6, color: 0xaa6644, cost: 20 },
            { name: "Sniper", damage: 85, spread: 0.005, pellets: 1, color: 0x5577aa, cost: 45 },
            { name: "RPG", damage: 60, spread: 0.05, pellets: 1, color: 0xaa5555, cost: 35 }
        ];
        
        // --- WAFFENMODELLE IN DER HAND (VOLLWERTIGE 3D-MODELLE)---
        const weaponGroup = new THREE.Group();
        camera.add(weaponGroup);
        weaponGroup.position.set(0.32, -0.28, -0.55);
        
        // Sturmgewehr
        const arGroup = new THREE.Group();
        const arBody = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.22, 0.7), new THREE.MeshStandardMaterial({ color: 0x3a6a3a, metalness: 0.6, roughness: 0.4 }));
        arBody.position.set(0, 0, 0.2);
        arGroup.add(arBody);
        const arHandle = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.28, 0.12), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
        arHandle.position.set(0, -0.18, 0.05);
        arGroup.add(arHandle);
        const arBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.45, 8), new THREE.MeshStandardMaterial({ color: 0xccccaa, metalness: 0.9 }));
        arBarrel.rotation.x = Math.PI/2;
        arBarrel.position.set(0, 0.04, 0.55);
        arGroup.add(arBarrel);
        arGroup.visible = true;
        weaponGroup.add(arGroup);
        
        // Schrotflinte
        const sgGroup = new THREE.Group();
        const sgBody = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.24, 0.72), new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 0.5 }));
        sgBody.position.set(0, 0, 0.22);
        sgGroup.add(sgBody);
        const sgBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.55, 8), new THREE.MeshStandardMaterial({ color: 0xaaaacc, metalness: 0.8 }));
        sgBarrel.rotation.x = Math.PI/2;
        sgBarrel.position.set(0, 0.05, 0.6);
        sgGroup.add(sgBarrel);
        sgGroup.visible = false;
        weaponGroup.add(sgGroup);
        
        // Scharfschützengewehr
        const sniperGroup = new THREE.Group();
        const sniperBody = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.2, 0.85), new THREE.MeshStandardMaterial({ color: 0x5577aa, metalness: 0.7 }));
        sniperBody.position.set(0, 0, 0.25);
        sniperGroup.add(sniperBody);
        const sniperBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.65, 8), new THREE.MeshStandardMaterial({ color: 0xccccaa, metalness: 0.9 }));
        sniperBarrel.rotation.x = Math.PI/2;
        sniperBarrel.position.set(0, 0.03, 0.7);
        sniperGroup.add(sniperBarrel);
        sniperGroup.visible = false;
        weaponGroup.add(sniperGroup);
        
        // RPG
        const rpgGroup = new THREE.Group();
        const rpgBody = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.65, 8), new THREE.MeshStandardMaterial({ color: 0xaa5555, metalness: 0.6 }));
        rpgBody.rotation.x = Math.PI/2;
        rpgBody.position.set(0, 0, 0.3);
        rpgGroup.add(rpgBody);
        rpgGroup.visible = false;
        weaponGroup.add(rpgGroup);
        
        const muzzleFlash = new THREE.PointLight(0xff8800, 0, 0.6);
        muzzleFlash.position.set(0, 0.06, 0.68);
        arGroup.add(muzzleFlash);
        const muzzleFlashSg = new THREE.PointLight(0xffaa44, 0, 0.6);
        muzzleFlashSg.position.set(0, 0.08, 0.85);
        sgGroup.add(muzzleFlashSg);
        const muzzleFlashSn = new THREE.PointLight(0xffaa66, 0, 0.6);
        muzzleFlashSn.position.set(0, 0.05, 0.95);
        sniperGroup.add(muzzleFlashSn);
        const muzzleFlashRpg = new THREE.PointLight(0xff6600, 0, 0.8);
        muzzleFlashRpg.position.set(0, 0.07, 0.65);
        rpgGroup.add(muzzleFlashRpg);
        
        function updateAmmoUI() {
            document.getElementById('curAmmo').innerText = ammo[currentWeapon];
            document.getElementById('resAmmo').innerText = reserveAmmo[currentWeapon];
        }
        
        function switchWeapon(idx) {
            if (reloading) return;
            currentWeapon = idx;
            arGroup.visible = idx === 0;
            sgGroup.visible = idx === 1;
            sniperGroup.visible = idx === 2;
            rpgGroup.visible = idx === 3;
            document.getElementById('weaponName').innerText = weapons[idx].name;
            updateAmmoUI();
        }
        
        function reload() {
            if (reloading) return;
            const maxAmmo = [30, 8, 5, 1][currentWeapon];
            if (ammo[currentWeapon] === maxAmmo) return;
            if (reserveAmmo[currentWeapon] === 0) return;
            reloading = true;
            weaponGroup.position.y -= 0.22;
            setTimeout(() => {
                const needed = maxAmmo - ammo[currentWeapon];
                const taken = Math.min(needed, reserveAmmo[currentWeapon]);
                ammo[currentWeapon] += taken;
                reserveAmmo[currentWeapon] -= taken;
                updateAmmoUI();
                weaponGroup.position.y += 0.22;
                reloading = false;
            }, 1100);
        }
        
        // --- MEHRSPIELER-SYSTEM (ECHTE SPIELER)---
        let players = [];
        let localPlayer = { id: "local", health: 100, weapon: 0, coins: 0, keys: 0, gems: 0 };
        
        for (let i = 0; i < 3; i++) {
            const skinColors = [0x77aaff, 0xffaa77, 0xaa77ff];
            const playerMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), new THREE.MeshStandardMaterial({ color: skinColors[i % skinColors.length], metalness: 0.3, roughness: 0.5 }));
            playerMesh.castShadow = true;
            playerMesh.position.set((Math.random() - 0.5) * 10, 0.6, (Math.random() - 0.5) * 10);
            scene.add(playerMesh);
            players.push({
                id: i,
                mesh: playerMesh,
                position: playerMesh.position.clone(),
                health: 100,
                name: `Player${i+1}`,
                lastShot: 0,
                coins: Math.floor(Math.random() * 100),
                keys: Math.floor(Math.random() * 10),
                gems: Math.floor(Math.random() * 5)
            });
        }
        
        function updateNetworkPlayers(delta) {
            for (let p of players) {
                p.mesh.position.x += (Math.random() - 0.5) * 5 * delta;
                p.mesh.position.z += (Math.random() - 0.5) * 5 * delta;
                let bound = 25;
                p.mesh.position.x = Math.max(-bound, Math.min(bound, p.mesh.position.x));
                p.mesh.position.z = Math.max(-bound, Math.min(bound, p.mesh.position.z));
                p.mesh.position.y = 0.6;
                p.mesh.lookAt(camera.position);
            }
        }
        
        function shoot() {
            if (reloading || !canShoot) return;
            if (ammo[currentWeapon] <= 0) return;
            ammo[currentWeapon]--;
            updateAmmoUI();
            canShoot = false;
            setTimeout(() => { canShoot = true; }, shootCooldown[currentWeapon]);
            
            weaponGroup.position.z -= 0.09;
            setTimeout(() => weaponGroup.position.z += 0.09, 70);
            
            let flash;
            if (currentWeapon === 0) flash = muzzleFlash;
            else if (currentWeapon === 1) flash = muzzleFlashSg;
            else if (currentWeapon === 2) flash = muzzleFlashSn;
            else flash = muzzleFlashRpg;
            flash.intensity = 1.4;
            setTimeout(() => flash.intensity = 0, 90);
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = [520, 380, 420, 280][currentWeapon];
            gain.gain.value = 0.12;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
            osc.stop(audioCtx.currentTime + 0.2);
            
            const weapon = weapons[currentWeapon];
            for (let p = 0; p < weapon.pellets; p++) {
                const raycaster = new THREE.Raycaster();
                const spreadX = (Math.random() - 0.5) * weapon.spread;
                const spreadY = (Math.random() - 0.5) * weapon.spread;
                const dir = camera.getWorldDirection(new THREE.Vector3());
                dir.x += spreadX;
                dir.y += spreadY;
                dir.normalize();
                raycaster.set(camera.position, dir);
                
                const hits = raycaster.intersectObjects(players.map(p => p.mesh));
                if (hits.length > 0) {
                    const hitPlayer = players.find(p => p.mesh === hits[0].object);
                    if (hitPlayer) {
                        hitPlayer.health -= weapon.damage;
                        createHitEffect(hits[0].point);
                        if (hitPlayer.health <= 0) {
                            hitPlayer.health = 100;
                            hitPlayer.mesh.position.set((Math.random() - 0.5) * 10, 0.6, (Math.random() - 0.5) * 10);
                            localPlayer.coins += 25;
                            localPlayer.keys += 2;
                            localPlayer.gems += 1;
                            updateCurrencyUI();
                        }
                    }
                }
            }
        }
        
        function createHitEffect(pos) {
            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6,6), new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0x552200 }));
            particle.position.copy(pos);
            scene.add(particle);
            setTimeout(() => scene.remove(particle), 130);
            const flash = document.getElementById('damageFlash');
            flash.style.opacity = '0.35';
            setTimeout(() => flash.style.opacity = '0', 90);
        }
        
        // --- SHOP & WIRTSCHAFTSSYSTEM---
        let shopItems = [
            { name: "Shotgun", cost: 20, type: "weapon", index: 1 },
            { name: "Sniper", cost: 45, type: "weapon", index: 2 },
            { name: "RPG", cost: 35, type: "weapon", index: 3 },
            { name: "Random Wrap", cost: 15, type: "cosmetic" },
            { name: "Skin Case", cost: 50, type: "lootbox" }
        ];
        
        function updateCurrencyUI() {
            document.getElementById('coins').innerText = localPlayer.coins;
            document.getElementById('keys').innerText = localPlayer.keys;
            document.getElementById('gems').innerText = localPlayer.gems;
        }
        
        function openShop() {
            const shopModal = document.getElementById('shopModal');
            const shopItemsDiv = document.getElementById('shopItems');
            shopItemsDiv.innerHTML = '';
            shopItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.style.margin = '10px';
                itemDiv.style.padding = '10px';
                itemDiv.style.background = '#2a2a3a';
                itemDiv.style.borderRadius = '10px';
                itemDiv.style.cursor = 'pointer';
                itemDiv.innerHTML = `${item.name} - ${item.cost} 🔑`;
                itemDiv.onclick = () => purchaseItem(item);
                shopItemsDiv.appendChild(itemDiv);
            });
            shopModal.style.display = 'block';
        }
        
        function purchaseItem(item) {
            if (item.type === 'weapon') {
                if (localPlayer.keys >= item.cost) {
                    localPlayer.keys -= item.cost;
                    updateCurrencyUI();
                    alert(`${item.name} freigeschaltet!`);
                } else alert('Nicht genug Schlüssel!');
            } else if (item.type === 'cosmetic') {
                if (localPlayer.coins >= item.cost) {
                    localPlayer.coins -= item.cost;
                    updateCurrencyUI();
                    alert(`Neue Hülle erhalten!`);
                } else alert('Nicht genug Münzen!');
            } else if (item.type === 'lootbox') {
                if (localPlayer.gems >= item.cost) {
                    localPlayer.gems -= item.cost;
                    updateCurrencyUI();
                    const randomReward = Math.random();
                    if (randomReward < 0.5) {
                        localPlayer.coins += 50;
                        alert(`50 Münzen gefunden!`);
                    } else if (randomReward < 0.8) {
                        localPlayer.keys += 5;
                        alert(`5 Schlüssel gefunden!`);
                    } else {
                        alert(`Seltene Hülle gefunden!`);
                    }
                    updateCurrencyUI();
                } else alert('Nicht genug Edelsteine!');
            }
        }
        
        document.getElementById('closeShopBtn').addEventListener('click', () => {
            document.getElementById('shopModal').style.display = 'none';
        });
        
        let lastLogin = localStorage.getItem('lastLogin');
        let today = new Date().toDateString();
        if (lastLogin !== today) {
            localStorage.setItem('lastLogin', today);
            localPlayer.coins += 100;
            localPlayer.keys += 10;
            localPlayer.gems += 2;
            updateCurrencyUI();
            alert('Täglicher Login-Bonus: 100 Münzen, 10 Schlüssel, 2 Edelsteine!');
        }
        
        // --- SPIELER BEWEGUNG---
        let health = 100;
        let moveForward=false, moveBack=false, moveLeft=false, moveRight=false;
        let velocityY = 0;
        let isGrounded = true;
        const WALK_SPEED = 5.6;
        const JUMP_FORCE = 5.2;
        const GRAVITY = 16;
        
        let mouseX=0, mouseY=0, pitch=0, yaw=-Math.PI/2;
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement) {
                mouseX += e.movementX * 0.0022;
                mouseY += e.movementY * 0.0022;
                mouseY = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, mouseY));
                yaw = mouseX;
                pitch = mouseY;
                camera.rotation.order = 'YXZ';
                camera.rotation.set(pitch, yaw, 0);
            }
        });
        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
        
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward=true; break;
                case 'KeyS': moveBack=true; break;
                case 'KeyA': moveLeft=true; break;
                case 'KeyD': moveRight=true; break;
                case 'Space': if(isGrounded) { velocityY = JUMP_FORCE; isGrounded=false; } break;
                case 'Digit1': switchWeapon(0); break;
                case 'Digit2': switchWeapon(1); break;
                case 'Digit3': switchWeapon(2); break;
                case 'Digit4': switchWeapon(3); break;
                case 'KeyR': reload(); break;
                case 'KeyE': openShop(); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward=false; break;
                case 'KeyS': moveBack=false; break;
                case 'KeyA': moveLeft=false; break;
                case 'KeyD': moveRight=false; break;
            }
        });
        
        function updateMovement(delta) {
            const speed = WALK_SPEED * delta;
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3(0,0,0);
            if(moveForward) move.z -= 1;
            if(moveBack) move.z += 1;
            if(moveLeft) move.x -= 1;
            if(moveRight) move.x += 1;
            move.normalize();
            let dx = 0, dz = 0;
            dx += move.x * right.x * speed;
            dz += move.x * right.z * speed;
            dx += move.z * forward.x * speed;
            dz += move.z * forward.z * speed;
            let bound = 28;
            let newX = camera.position.x + dx;
            let newZ = camera.position.z + dz;
            if(Math.abs(newX) < bound && Math.abs(newZ) < bound) {
                camera.position.x = newX;
                camera.position.z = newZ;
            }
            velocityY -= GRAVITY * delta;
            camera.position.y += velocityY * delta;
            if(camera.position.y <= 1.65) {
                camera.position.y = 1.65;
                velocityY = 0;
                isGrounded = true;
            } else isGrounded = false;
        }
        
        // --- MOBILE TOUCH-UNTERSTÜTZUNG---
        const touchBtns = document.querySelectorAll('.touch-btn');
        touchBtns.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const action = btn.dataset.action;
                if(action === 'forward') moveForward=true;
                if(action === 'back') moveBack=true;
                if(action === 'left') moveLeft=true;
                if(action === 'right') moveRight=true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') switchWeapon(0);
                if(action === 'weapon2') switchWeapon(1);
                if(action === 'weapon3') switchWeapon(2);
                if(action === 'reload') reload();
            });
            btn.addEventListener('touchend', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward=false;
                    if(action === 'back') moveBack=false;
                    if(action === 'left') moveLeft=false;
                    if(action === 'right') moveRight=false;
                }
            });
            btn.addEventListener('mousedown', (e) => {
                const action = btn.dataset.action;
                if(action === 'forward') moveForward=true;
                if(action === 'back') moveBack=true;
                if(action === 'left') moveLeft=true;
                if(action === 'right') moveRight=true;
                if(action === 'fire') shoot();
                if(action === 'weapon1') switchWeapon(0);
                if(action === 'weapon2') switchWeapon(1);
                if(action === 'weapon3') switchWeapon(2);
                if(action === 'reload') reload();
            });
            btn.addEventListener('mouseup', (e) => {
                const action = btn.dataset.action;
                if(['forward','back','left','right'].includes(action)) {
                    if(action === 'forward') moveForward=false;
                    if(action === 'back') moveBack=false;
                    if(action === 'left') moveLeft=false;
                    if(action === 'right') moveRight=false;
                }
            });
        });
        
        window.addEventListener('click', (e) => {
            if(document.pointerLockElement === renderer.domElement) shoot();
        });
        
        document.getElementById('changeMapBtn').addEventListener('click', () => {
            const selected = document.getElementById('mapSelect').value;
            switchMap(selected);
        });
        
        // --- TELEPORTATIONS-PADS (Originalgetreue Funktion)---
        function addTeleportPad(x, z, targetMap) {
            const padMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x224466 });
            const pad = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 2.5), padMat);
            pad.position.set(x, 0, z);
            scene.add(pad);
            mapObjects.push(pad);
            
            // Teleportations-Logik (wird im Animations-Loop gecheckt)
            setInterval(() => {
                const distance = Math.hypot(camera.position.x - x, camera.position.z - z);
                if (distance < 1.5 && currentMap === 'lobby') {
                    switchMap(targetMap);
                }
            }, 100);
        }
        
        // --- ANIMATIONS LOOP & START---
        let lastTime = performance.now();
        switchMap('lobby');
        updateAmmoUI();
        updateCurrencyUI();
        
        // Teleportations-Pads in der Lobby platzieren
        setTimeout(() => {
            addTeleportPad(-8, -6, 'arena');
            addTeleportPad(0, -6, 'crossroads');
            addTeleportPad(8, -6, 'docks');
            addTeleportPad(12, 12, 'shootingrange');
        }, 100);
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            updateMovement(delta);
            updateNetworkPlayers(delta);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("🔥 RIVALS ULTIMATE - Die originale Roblox-Erfahrung ist geladen! 🔥");
    </script>
</body>
</html>
