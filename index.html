<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Straßenfußball - Street Kick</title>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
            position: relative;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            max-width: 500px;
            height: 100vh;
            height: 100dvh;
            max-height: 850px;
            aspect-ratio: 9/16;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #2d2d2d;
            border-radius: 8px;
        }

        /* Overlay für UI */
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        #scoreBoard {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: none;
        }

        .scoreBox {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 10px 20px;
            text-align: center;
            min-width: 60px;
        }

        .scoreLabel {
            color: #aaa;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .scoreValue {
            color: #fff;
            font-size: 36px;
            font-weight: 900;
            line-height: 1;
        }

        .scoreDivider {
            color: #fff;
            font-size: 28px;
            font-weight: 900;
        }

        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            padding: 20px 35px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }
        #messageBox.show {
            transform: translate(-50%, -50%) scale(1);
        }

        #messageSub {
            font-size: 13px;
            font-weight: normal;
            color: #ccc;
            margin-top: 5px;
        }

        /* Touch Controls */
        #touchControls {
            position: absolute;
            bottom: 30px;
            bottom: calc(30px + var(--safe-bottom));
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            pointer-events: none;
            z-index: 20;
        }

        #joystickZone {
            width: 130px;
            height: 130px;
            position: relative;
            pointer-events: auto;
        }

        #joystickBase {
            position: absolute;
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        #joystickThumb {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 40% 35%, #fff, #ccc);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.1s;
            cursor: pointer;
        }
        #joystickThumb.active {
            box-shadow: 0 2px 25px rgba(255, 200, 50, 0.8);
        }

        #actionButtons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            align-items: center;
        }

        .actionBtn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.1s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        #btnShoot {
            background: radial-gradient(circle at 40% 35%, #ff4444, #b71c1c);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
            font-size: 14px;
        }
        #btnShoot:active {
            transform: scale(0.9);
            box-shadow: 0 3px 10px rgba(255, 0, 0, 0.7);
            background: radial-gradient(circle at 40% 35%, #ff6666, #d32f2f);
        }

        #btnSprint {
            background: radial-gradient(circle at 40% 35%, #ffaa00, #e65100);
            box-shadow: 0 6px 20px rgba(255, 150, 0, 0.4);
            font-size: 12px;
            width: 60px;
            height: 60px;
        }
        #btnSprint:active {
            transform: scale(0.9);
            box-shadow: 0 3px 10px rgba(255, 150, 0, 0.7);
            background: radial-gradient(circle at 40% 35%, #ffcc00, #ff6d00);
        }

        /* Responsive Anpassungen */
        @media (max-width: 380px) {
            #joystickZone {
                width: 110px;
                height: 110px;
            }
            #joystickBase {
                width: 90px;
                height: 90px;
            }
            #joystickThumb {
                width: 42px;
                height: 42px;
            }
            .actionBtn {
                width: 58px;
                height: 58px;
                font-size: 12px;
            }
            #btnSprint {
                width: 50px;
                height: 50px;
                font-size: 10px;
            }
            #touchControls {
                padding: 0 12px;
            }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- Scoreboard -->
        <div id="scoreBoard">
            <div class="scoreBox">
                <div class="scoreLabel">Du</div>
                <div class="scoreValue" id="scorePlayer">0</div>
            </div>
            <div class="scoreDivider">:</div>
            <div class="scoreBox">
                <div class="scoreLabel">Gegner</div>
                <div class="scoreValue" id="scoreEnemy">0</div>
            </div>
        </div>

        <!-- Nachrichten -->
        <div id="messageBox">
            <div id="messageText">TOR!</div>
            <div id="messageSub"></div>
        </div>

        <!-- Touch Steuerung -->
        <div id="touchControls">
            <div id="joystickZone">
                <div id="joystickBase"></div>
                <div id="joystickThumb"></div>
            </div>
            <div id="actionButtons">
                <button class="actionBtn" id="btnShoot">SCHUSS</button>
                <button class="actionBtn" id="btnSprint">SPRINT</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // CANVAS & KONTEXT
            // ──────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('gameContainer');

            let W, H;
            const scale = 2; // für schärfere Grafik

            function resizeCanvas() {
                const rect = container.getBoundingClientRect();
                W = rect.width;
                H = rect.height;
                canvas.width = W * scale;
                canvas.height = H * scale;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(scale, scale);
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateFieldDimensions();
            });
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    resizeCanvas();
                    updateFieldDimensions();
                }, 300);
            });

            // ──────────────────────────────────────
            // SPIELFELD DIMENSIONEN
            // ──────────────────────────────────────
            let fieldX, fieldY, fieldW, fieldH;
            let goalWidth, goalDepth;
            let wallThickness;

            function updateFieldDimensions() {
                fieldW = W * 0.88;
                fieldH = H * 0.78;
                fieldX = (W - fieldW) / 2;
                fieldY = (H - fieldH) / 2 + H * 0.02;
                goalWidth = fieldW * 0.28;
                goalDepth = fieldW * 0.08;
                wallThickness = W * 0.025;
            }
            updateFieldDimensions();

            // ──────────────────────────────────────
            // SPIELZUSTAND
            // ──────────────────────────────────────
            let scorePlayer = 0;
            let scoreEnemy = 0;
            let gamePaused = false;
            let pauseTimer = 0;
            let messageActive = false;
            let messageTimer = 0;
            let currentMessage = '';
            let currentSubMessage = '';

            // ──────────────────────────────────────
            // SPIELER
            // ──────────────────────────────────────
            const player = {
                x: 0,
                y: 0,
                radius: 16,
                speed: 0,
                maxSpeed: 180,
                sprintMultiplier: 1.6,
                vx: 0,
                vy: 0,
                color: '#4fc3f7',
                darkColor: '#0277bd',
                team: 'player',
                sprinting: false,
                shootCooldown: 0,
                kickPower: 500,
            };

            const enemy = {
                x: 0,
                y: 0,
                radius: 16,
                speed: 0,
                maxSpeed: 140,
                sprintMultiplier: 1.5,
                vx: 0,
                vy: 0,
                color: '#ef5350',
                darkColor: '#b71c1c',
                team: 'enemy',
                sprinting: false,
                shootCooldown: 0,
                kickPower: 460,
                aiTargetX: 0,
                aiTargetY: 0,
                aiState: 'chase', // 'chase', 'defend', 'attack'
                aiTimer: 0,
            };

            // ──────────────────────────────────────
            // BALL
            // ──────────────────────────────────────
            const ball = {
                x: 0,
                y: 0,
                radius: 10,
                vx: 0,
                vy: 0,
                friction: 0.94,
                bounceDamping: 0.65,
                color: '#ffffff',
                shadowColor: '#888888',
                trail: [],
                maxTrail: 8,
            };

            // ──────────────────────────────────────
            // TORE
            // ──────────────────────────────────────
            const goalPlayer = { x: 0, y: 0, w: 0, h: 0 }; // Spieler verteidigt dieses Tor (unten)
            const goalEnemy = { x: 0, y: 0, w: 0, h: 0 }; // Gegner verteidigt dieses Tor (oben)

            function updateGoalPositions() {
                // Spieler-Tor (unten) - Gegner schießt hier rein
                goalPlayer.x = fieldX + fieldW / 2 - goalWidth / 2;
                goalPlayer.y = fieldY + fieldH - wallThickness;
                goalPlayer.w = goalWidth;
                goalPlayer.h = goalDepth;

                // Gegner-Tor (oben) - Spieler schießt hier rein
                goalEnemy.x = fieldX + fieldW / 2 - goalWidth / 2;
                goalEnemy.y = fieldY - goalDepth + wallThickness;
                goalEnemy.w = goalWidth;
                goalEnemy.h = goalDepth;
            }
            updateGoalPositions();

            // ──────────────────────────────────────
            // PARTIKEL
            // ──────────────────────────────────────
            let particles = [];

            function spawnParticles(x, y, count, color, spread) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * spread + spread * 0.3;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.04,
                        radius: 2 + Math.random() * 4,
                        color: color,
                    });
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ──────────────────────────────────────
            // HILFSFUNKTIONEN
            // ──────────────────────────────────────
            function dist(a, b) {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function resetPositions() {
                const centerX = fieldX + fieldW / 2;
                const centerY = fieldY + fieldH / 2;

                player.x = centerX;
                player.y = centerY + fieldH * 0.25;
                player.vx = 0;
                player.vy = 0;
                player.sprinting = false;
                player.shootCooldown = 0;

                enemy.x = centerX;
                enemy.y = centerY - fieldH * 0.25;
                enemy.vx = 0;
                enemy.vy = 0;
                enemy.sprinting = false;
                enemy.shootCooldown = 0;
                enemy.aiState = 'chase';
                enemy.aiTimer = 0;

                ball.x = centerX;
                ball.y = centerY;
                ball.vx = (Math.random() - 0.5) * 100;
                ball.vy = (Math.random() - 0.5) * 100;
                ball.trail = [];

                particles = [];
            }

            function showMessage(msg, sub = '', duration = 2.0) {
                currentMessage = msg;
                currentSubMessage = sub;
                messageActive = true;
                messageTimer = duration;
                document.getElementById('messageText').textContent = msg;
                document.getElementById('messageSub').textContent = sub;
                document.getElementById('messageBox').classList.add('show');
            }

            function hideMessage() {
                messageActive = false;
                document.getElementById('messageBox').classList.remove('show');
            }

            function updateScoreDisplay() {
                document.getElementById('scorePlayer').textContent = scorePlayer;
                document.getElementById('scoreEnemy').textContent = scoreEnemy;
            }

            // ──────────────────────────────────────
            // TOR-ERKENNUNG
            // ──────────────────────────────────────
            function checkGoal() {
                // Ball im gegnerischen Tor (oben) -> Spieler punktet
                if (ball.y - ball.radius < goalEnemy.y + goalEnemy.h &&
                    ball.y + ball.radius > goalEnemy.y &&
                    ball.x > goalEnemy.x - ball.radius &&
                    ball.x < goalEnemy.x + goalEnemy.w + ball.radius &&
                    ball.y < fieldY + fieldH * 0.1) {
                    // Tor für Spieler!
                    scorePlayer++;
                    updateScoreDisplay();
                    spawnParticles(ball.x, ball.y, 35, '#4fc3f7', 250);
                    spawnParticles(ball.x, ball.y, 20, '#ffffff', 180);
                    showMessage('TOOOOR! 🎉', 'Du triffst!', 2.2);
                    resetPositions();
                    ball.y = fieldY + fieldH / 2;
                    ball.vy = -200;
                    return true;
                }

                // Ball im Spieler-Tor (unten) -> Gegner punktet
                if (ball.y + ball.radius > goalPlayer.y &&
                    ball.y - ball.radius < goalPlayer.y + goalPlayer.h &&
                    ball.x > goalPlayer.x - ball.radius &&
                    ball.x < goalPlayer.x + goalPlayer.w + ball.radius &&
                    ball.y > fieldY + fieldH * 0.9) {
                    // Tor für Gegner!
                    scoreEnemy++;
                    updateScoreDisplay();
                    spawnParticles(ball.x, ball.y, 35, '#ef5350', 250);
                    spawnParticles(ball.x, ball.y, 20, '#ffffff', 180);
                    showMessage('Gegentor... 😞', 'Der Gegner trifft', 2.2);
                    resetPositions();
                    ball.y = fieldY + fieldH / 2;
                    ball.vy = 200;
                    return true;
                }
                return false;
            }

            // ──────────────────────────────────────
            // KOLLISIONEN
            // ──────────────────────────────────────
            function handleBallWallCollision() {
                const leftWall = fieldX;
                const rightWall = fieldX + fieldW;
                const topWall = fieldY;
                const bottomWall = fieldY + fieldH;

                // Linke und rechte Wand
                if (ball.x - ball.radius < leftWall) {
                    ball.x = leftWall + ball.radius;
                    ball.vx = Math.abs(ball.vx) * ball.bounceDamping;
                    spawnParticles(ball.x, ball.y, 8, '#cccccc', 80);
                }
                if (ball.x + ball.radius > rightWall) {
                    ball.x = rightWall - ball.radius;
                    ball.vx = -Math.abs(ball.vx) * ball.bounceDamping;
                    spawnParticles(ball.x, ball.y, 8, '#cccccc', 80);
                }

                // Obere Wand (außer Torbereich)
                const inGoalEnemyX = ball.x > goalEnemy.x - ball.radius && ball.x < goalEnemy.x + goalEnemy.w +
                    ball.radius;
                if (ball.y - ball.radius < topWall && !inGoalEnemyX) {
                    ball.y = topWall + ball.radius;
                    ball.vy = Math.abs(ball.vy) * ball.bounceDamping;
                    spawnParticles(ball.x, ball.y, 8, '#cccccc', 80);
                }

                // Untere Wand (außer Torbereich)
                const inGoalPlayerX = ball.x > goalPlayer.x - ball.radius && ball.x < goalPlayer.x + goalPlayer.w +
                    ball.radius;
                if (ball.y + ball.radius > bottomWall && !inGoalPlayerX) {
                    ball.y = bottomWall - ball.radius;
                    ball.vy = -Math.abs(ball.vy) * ball.bounceDamping;
                    spawnParticles(ball.x, ball.y, 8, '#cccccc', 80);
                }

                // Tor-Rückwände
                if (inGoalEnemyX && ball.y - ball.radius < goalEnemy.y) {
                    ball.y = goalEnemy.y + ball.radius;
                    ball.vy = Math.abs(ball.vy) * ball.bounceDamping * 0.5;
                }
                if (inGoalPlayerX && ball.y + ball.radius > goalPlayer.y + goalPlayer.h) {
                    ball.y = goalPlayer.y + goalPlayer.h - ball.radius;
                    ball.vy = -Math.abs(ball.vy) * ball.bounceDamping * 0.5;
                }
            }

            function handleBallPlayerCollision(p) {
                const d = dist(ball, p);
                const minDist = ball.radius + p.radius;

                if (d < minDist && d > 0.001) {
                    // Trennen
                    const overlap = minDist - d;
                    const nx = (ball.x - p.x) / d;
                    const ny = (ball.y - p.y) / d;
                    ball.x += nx * overlap;
                    ball.y += ny * overlap;

                    // Geschwindigkeit übertragen
                    const relVx = ball.vx - p.vx;
                    const relVy = ball.vy - p.vy;
                    const relVelAlongNormal = relVx * nx + relVy * ny;

                    if (relVelAlongNormal < 0) {
                        const impulse = relVelAlongNormal * 1.5;
                        ball.vx -= impulse * nx;
                        ball.vy -= impulse * ny;

                        // Extra Kraft wenn Spieler sprintet
                        if (p.sprinting) {
                            const extraPower = p === player ? player.kickPower * 1.3 : enemy.kickPower * 1.3;
                            ball.vx += nx * extraPower * 0.3;
                            ball.vy += ny * extraPower * 0.3;
                        }

                        // Begrenze Ballgeschwindigkeit
                        const ballSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                        const maxBallSpeed = 800;
                        if (ballSpeed > maxBallSpeed) {
                            const scale = maxBallSpeed / ballSpeed;
                            ball.vx *= scale;
                            ball.vy *= scale;
                        }

                        spawnParticles(ball.x, ball.y, 5, '#ffffff', 60);
                    }
                }
            }

            function handlePlayerWallCollision(p) {
                const leftWall = fieldX + p.radius;
                const rightWall = fieldX + fieldW - p.radius;
                const topWall = fieldY + p.radius;
                const bottomWall = fieldY + fieldH - p.radius;

                // Torbereiche erlauben Durchgang nur teilweise
                if (p.x < leftWall) p.x = leftWall;
                if (p.x > rightWall) p.x = rightWall;
                if (p.y < topWall) p.y = topWall;
                if (p.y > bottomWall) p.y = bottomWall;

                // Verhindere dass Spieler komplett ins Tor läuft
                const inGoalEnemyX = p.x > goalEnemy.x && p.x < goalEnemy.x + goalEnemy.w;
                const inGoalPlayerX = p.x > goalPlayer.x && p.x < goalPlayer.x + goalPlayer.w;

                if (inGoalEnemyX && p.y < topWall + p.radius) p.y = topWall + p.radius;
                if (inGoalPlayerX && p.y > bottomWall - p.radius) p.y = bottomWall - p.radius;
            }

            // ──────────────────────────────────────
            // KI-STEUERUNG
            // ──────────────────────────────────────
            function updateAI(dt) {
                enemy.aiTimer -= dt;

                if (enemy.aiTimer <= 0) {
                    // Zustandswechsel
                    const rand = Math.random();
                    const distToBall = dist(enemy, ball);
                    const ballInEnemyHalf = ball.y < fieldY + fieldH / 2;
                    const ballNearEnemyGoal = ball.y < fieldY + fieldH * 0.35;

                    if (ballNearEnemyGoal && distToBall < 150) {
                        enemy.aiState = 'defend';
                    } else if (ballInEnemyHalf && distToBall < 200) {
                        enemy.aiState = Math.random() < 0.7 ? 'chase' : 'attack';
                    } else if (!ballInEnemyHalf && distToBall < 120) {
                        enemy.aiState = 'chase';
                    } else {
                        enemy.aiState = Math.random() < 0.5 ? 'chase' : 'defend';
                    }
                    enemy.aiTimer = 0.5 + Math.random() * 1.5;
                }

                let targetX, targetY;

                switch (enemy.aiState) {
                    case 'chase':
                        // Zum Ball bewegen, etwas hinter den Ball
                        const approachAngle = Math.atan2(ball.y - enemy.y, ball.x - enemy.x);
                        targetX = ball.x - Math.cos(approachAngle) * 25;
                        targetY = ball.y - Math.sin(approachAngle) * 25;
                        enemy.sprinting = dist(enemy, ball) > 100;
                        break;

                    case 'defend':
                        // Zwischen Ball und eigenem Tor positionieren
                        const defX = clamp(ball.x, goalEnemy.x + 30, goalEnemy.x + goalEnemy.w - 30);
                        const defY = goalEnemy.y + goalEnemy.h + 50;
                        targetX = defX;
                        targetY = defY;
                        enemy.sprinting = dist(enemy, ball) < 80;
                        break;

                    case 'attack':
                        // Aggressiv zum Ball und Richtung Spieler-Tor
                        targetX = ball.x;
                        targetY = ball.y;
                        enemy.sprinting = true;
                        break;

                    default:
                        targetX = ball.x;
                        targetY = ball.y;
                        enemy.sprinting = false;
                }

                // Bewegung zum Ziel
                const dx = targetX - enemy.x;
                const dy = targetY - enemy.y;
                const d = Math.sqrt(dx * dx + dy * dy);

                if (d > 5) {
                    const speed = enemy.maxSpeed * (enemy.sprinting ? enemy.sprintMultiplier : 1);
                    const nx = dx / d;
                    const ny = dy / d;
                    enemy.vx = nx * speed;
                    enemy.vy = ny * speed;
                } else {
                    enemy.vx *= 0.8;
                    enemy.vy *= 0.8;
                }

                // KI schießt wenn nah am Ball und Richtung Spieler-Tor
                if (dist(enemy, ball) < enemy.radius + ball.radius + 15 && enemy.shootCooldown <= 0) {
                    const toGoalX = goalPlayer.x + goalPlayer.w / 2 - ball.x;
                    const toGoalY = goalPlayer.y - ball.y;
                    const goalDist = Math.sqrt(toGoalX * toGoalX + toGoalY * toGoalY);
                    if (goalDist > 0) {
                        const power = enemy.kickPower * (enemy.sprinting ? 1.4 : 1);
                        ball.vx += (toGoalX / goalDist) * power;
                        ball.vy += (toGoalY / goalDist) * power;
                        enemy.shootCooldown = 0.6 + Math.random() * 0.8;
                        spawnParticles(ball.x, ball.y, 12, '#ff8a80', 150);
                    }
                }

                if (enemy.shootCooldown > 0) enemy.shootCooldown -= dt;
            }

            // ──────────────────────────────────────
            // TOUCH-STEUERUNG
            // ──────────────────────────────────────
            const joystickZone = document.getElementById('joystickZone');
            const joystickThumb = document.getElementById('joystickThumb');
            const joystickBase = document.getElementById('joystickBase');
            const btnShoot = document.getElementById('btnShoot');
            const btnSprint = document.getElementById('btnSprint');

            let joystickActive = false;
            let joystickId = null;
            let joystickDX = 0;
            let joystickDY = 0;
            let shootPressed = false;
            let sprintPressed = false;

            function getJoystickCenter() {
                const rect = joystickBase.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2,
                    maxR: rect.width / 2 - 25,
                };
            }

            function updateJoystickThumb(clientX, clientY) {
                const center = getJoystickCenter();
                let dx = clientX - center.x;
                let dy = clientY - center.y;
                const distFromCenter = Math.sqrt(dx * dx + dy * dy);

                if (distFromCenter > center.maxR) {
                    dx = (dx / distFromCenter) * center.maxR;
                    dy = (dy / distFromCenter) * center.maxR;
                }

                joystickDX = dx / center.maxR;
                joystickDY = dy / center.maxR;

                joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            }

            function resetJoystick() {
                joystickActive = false;
                joystickId = null;
                joystickDX = 0;
                joystickDY = 0;
                joystickThumb.style.transform = 'translate(-50%, -50%)';
                joystickThumb.classList.remove('active');
            }

            // Touch-Events für Joystick
            joystickZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!joystickActive) {
                    joystickActive = true;
                    joystickId = e.changedTouches[0].identifier;
                    joystickThumb.classList.add('active');
                    updateJoystickThumb(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                }
            }, { passive: false });

            joystickZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickId) {
                        updateJoystickThumb(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                    }
                }
            }, { passive: false });

            joystickZone.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickId) {
                        resetJoystick();
                    }
                }
            });

            joystickZone.addEventListener('touchcancel', resetJoystick);

            // Maus-Support für Desktop
            joystickZone.addEventListener('mousedown', (e) => {
                if (!joystickActive) {
                    joystickActive = true;
                    joystickId = 'mouse';
                    joystickThumb.classList.add('active');
                    updateJoystickThumb(e.clientX, e.clientY);
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (joystickActive && joystickId === 'mouse') {
                    updateJoystickThumb(e.clientX, e.clientY);
                }
            });

            window.addEventListener('mouseup', () => {
                if (joystickId === 'mouse') resetJoystick();
            });

            // Action Buttons
            btnShoot.addEventListener('touchstart', (e) => { e.preventDefault();
                shootPressed = true; }, { passive: false });
            btnShoot.addEventListener('touchend', (e) => { e.preventDefault();
                shootPressed = false; }, { passive: false });
            btnShoot.addEventListener('touchcancel', () => { shootPressed = false; });
            btnShoot.addEventListener('mousedown', () => { shootPressed = true; });
            btnShoot.addEventListener('mouseup', () => { shootPressed = false; });
            btnShoot.addEventListener('mouseleave', () => { shootPressed = false; });

            btnSprint.addEventListener('touchstart', (e) => { e.preventDefault();
                sprintPressed = true; }, { passive: false });
            btnSprint.addEventListener('touchend', (e) => { e.preventDefault();
                sprintPressed = false; }, { passive: false });
            btnSprint.addEventListener('touchcancel', () => { sprintPressed = false; });
            btnSprint.addEventListener('mousedown', () => { sprintPressed = true; });
            btnSprint.addEventListener('mouseup', () => { sprintPressed = false; });
            btnSprint.addEventListener('mouseleave', () => { sprintPressed = false; });

            // ──────────────────────────────────────
            // TASTATUR-STEUERUNG (Desktop Fallback)
            // ──────────────────────────────────────
            const keys = {};
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ' || e.key.toLowerCase() === 'j') shootPressed = true;
                if (e.key.toLowerCase() === 'k' || e.key === 'Shift') sprintPressed = true;
            });
            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
                if (e.key === ' ' || e.key.toLowerCase() === 'j') shootPressed = false;
                if (e.key.toLowerCase() === 'k' || e.key === 'Shift') sprintPressed = false;
            });

            function getKeyboardInput() {
                let dx = 0,
                    dy = 0;
                if (keys['w'] || keys['arrowup']) dy = -1;
                if (keys['s'] || keys['arrowdown']) dy = 1;
                if (keys['a'] || keys['arrowleft']) dx = -1;
                if (keys['d'] || keys['arrowright']) dx = 1;
                return { dx, dy };
            }

            // ──────────────────────────────────────
            // SPIEL-UPDATE
            // ──────────────────────────────────────
            let lastTime = performance.now();

            function update(dt) {
                // Clamp dt
                if (dt > 0.1) dt = 0.1;

                // Nachrichten-Timer
                if (messageActive) {
                    messageTimer -= dt;
                    if (messageTimer <= 0) hideMessage();
                }

                // ── SPIELER BEWEGUNG ─────────────────
                let inputDX = joystickDX;
                let inputDY = joystickDY;

                // Keyboard-Input als Fallback
                const kb = getKeyboardInput();
                if (kb.dx !== 0 || kb.dy !== 0) {
                    inputDX = kb.dx;
                    inputDY = kb.dy;
                    const mag = Math.sqrt(inputDX * inputDX + inputDY * inputDY);
                    if (mag > 1) { inputDX /= mag;
                        inputDY /= mag; }
                }

                player.sprinting = sprintPressed;
                const pSpeed = player.maxSpeed * (player.sprinting ? player.sprintMultiplier : 1);
                player.vx = inputDX * pSpeed;
                player.vy = inputDY * pSpeed;

                player.x += player.vx * dt;
                player.y += player.vy * dt;
                handlePlayerWallCollision(player);

                // Spieler Schuss
                if (shootPressed && player.shootCooldown <= 0 && dist(player, ball) < player.radius + ball.radius + 20) {
                    const toGoalX = goalEnemy.x + goalEnemy.w / 2 - ball.x;
                    const toGoalY = goalEnemy.y + goalEnemy.h / 2 - ball.y;
                    const goalDist = Math.sqrt(toGoalX * toGoalX + toGoalY * toGoalY);
                    if (goalDist > 0) {
                        const power = player.kickPower * (player.sprinting ? 1.5 : 1);
                        ball.vx += (toGoalX / goalDist) * power;
                        ball.vy += (toGoalY / goalDist) * power;
                        player.shootCooldown = 0.5;
                        spawnParticles(ball.x, ball.y, 15, '#81d4fa', 180);
                    }
                }
                if (player.shootCooldown > 0) player.shootCooldown -= dt;

                // ── GEGNER UPDATE ─────────────────
                updateAI(dt);
                enemy.x += enemy.vx * dt;
                enemy.y += enemy.vy * dt;
                handlePlayerWallCollision(enemy);

                // ── BALL UPDATE ─────────────────
                ball.vx *= ball.friction;
                ball.vy *= ball.friction;

                // Geschwindigkeits-Limit
                const ballSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                if (ballSpeed > 750) {
                    const s = 750 / ballSpeed;
                    ball.vx *= s;
                    ball.vy *= s;
                }
                if (ballSpeed < 5 && ballSpeed > 0) {
                    ball.vx *= 0.9;
                    ball.vy *= 0.9;
                }

                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;

                // Trail
                if (ballSpeed > 30) {
                    ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
                    if (ball.trail.length > ball.maxTrail) ball.trail.shift();
                }
                for (let t of ball.trail) t.life -= dt * 3;

                // Kollisionen
                handleBallWallCollision();
                handleBallPlayerCollision(player);
                handleBallPlayerCollision(enemy);

                // Tor-Check
                checkGoal();

                // Partikel
                updateParticles(dt);
            }

            // ──────────────────────────────────────
            // RENDERING
            // ──────────────────────────────────────
            function drawField() {
                // Hintergrund (Asphalt)
                const asphaltGrad = ctx.createLinearGradient(fieldX, fieldY, fieldX, fieldY + fieldH);
                asphaltGrad.addColorStop(0, '#4a4a4a');
                asphaltGrad.addColorStop(0.5, '#555555');
                asphaltGrad.addColorStop(1, '#3d3d3d');
                ctx.fillStyle = asphaltGrad;
                ctx.fillRect(fieldX, fieldY, fieldW, fieldH);

                // Asphalt-Textur (kleine Punkte)
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                const dotSpacing = 15;
                for (let x = fieldX; x < fieldX + fieldW; x += dotSpacing) {
                    for (let y = fieldY; y < fieldY + fieldH; y += dotSpacing) {
                        if (Math.random() < 0.3) {
                            ctx.beginPath();
                            ctx.arc(x + Math.random() * 8, y + Math.random() * 8, 0.8, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }

                // Mittellinie
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([12, 18]);
                ctx.beginPath();
                ctx.moveTo(fieldX + 10, fieldY + fieldH / 2);
                ctx.lineTo(fieldX + fieldW - 10, fieldY + fieldH / 2);
                ctx.stroke();
                ctx.setLineDash([]);

                // Mittelkreis
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(fieldX + fieldW / 2, fieldY + fieldH / 2, fieldW * 0.18, 0, Math.PI * 2);
                ctx.stroke();

                // Anstoßpunkt
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(fieldX + fieldW / 2, fieldY + fieldH / 2, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawWalls() {
                // Außenwände (Zäune/Mauern mit Graffiti-Look)
                const wallColor = '#6d6d6d';
                const wallTop = '#888888';

                // Oben
                const topGrad = ctx.createLinearGradient(0, fieldY - wallThickness, 0, fieldY);
                topGrad.addColorStop(0, '#5c5c5c');
                topGrad.addColorStop(1, '#787878');
                ctx.fillStyle = topGrad;
                ctx.fillRect(fieldX - 5, fieldY - wallThickness, fieldW + 10, wallThickness);

                // Unten
                const botGrad = ctx.createLinearGradient(0, fieldY + fieldH, 0, fieldY + fieldH + wallThickness);
                botGrad.addColorStop(0, '#787878');
                botGrad.addColorStop(1, '#5c5c5c');
                ctx.fillStyle = botGrad;
                ctx.fillRect(fieldX - 5, fieldY + fieldH, fieldW + 10, wallThickness);

                // Links
                const leftGrad = ctx.createLinearGradient(fieldX - wallThickness, 0, fieldX, 0);
                leftGrad.addColorStop(0, '#5c5c5c');
                leftGrad.addColorStop(1, '#787878');
                ctx.fillStyle = leftGrad;
                ctx.fillRect(fieldX - wallThickness, fieldY - 5, wallThickness, fieldH + 10);

                // Rechts
                const rightGrad = ctx.createLinearGradient(fieldX + fieldW, 0, fieldX + fieldW + wallThickness, 0);
                rightGrad.addColorStop(0, '#787878');
                rightGrad.addColorStop(1, '#5c5c5c');
                ctx.fillStyle = rightGrad;
                ctx.fillRect(fieldX + fieldW, fieldY - 5, wallThickness, fieldH + 10);

                // Ecken abrunden (kleine Quadrate)
                const corners = [
                    { x: fieldX - wallThickness, y: fieldY - wallThickness },
                    { x: fieldX + fieldW, y: fieldY - wallThickness },
                    { x: fieldX - wallThickness, y: fieldY + fieldH },
                    { x: fieldX + fieldW, y: fieldY + fieldH },
                ];
                ctx.fillStyle = '#4a4a4a';
                for (const c of corners) {
                    ctx.fillRect(c.x, c.y, wallThickness, wallThickness);
                }

                // Graffiti-Effekte an den Wänden
                const graffitiColors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b', '#cc5de8'];
                ctx.save();
                for (let i = 0; i < 8; i++) {
                    const gx = fieldX + Math.random() * fieldW;
                    const gy = fieldY - wallThickness + Math.random() * wallThickness * 0.8;
                    ctx.fillStyle = graffitiColors[Math.floor(Math.random() * graffitiColors.length)];
                    ctx.globalAlpha = 0.4 + Math.random() * 0.3;
                    ctx.beginPath();
                    ctx.arc(gx, gy, 6 + Math.random() * 10, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // Zaun-Pfosten oben und unten
                ctx.fillStyle = '#3a3a3a';
                const postSpacing = 35;
                for (let x = fieldX; x <= fieldX + fieldW; x += postSpacing) {
                    ctx.fillRect(x - 2, fieldY - wallThickness, 4, wallThickness);
                    ctx.fillRect(x - 2, fieldY + fieldH, 4, wallThickness);
                }
            }

            function drawGoals() {
                // Gegner-Tor (oben)
                const gex = goalEnemy.x;
                const gey = goalEnemy.y;
                const gew = goalEnemy.w;
                const geh = goalEnemy.h;

                // Tornetz
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(gex, gey, gew, geh);

                // Netz-Linien
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 0.8;
                const netSpacing = 10;
                for (let nx = gex; nx <= gex + gew; nx += netSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(nx, gey);
                    ctx.lineTo(nx, gey + geh);
                    ctx.stroke();
                }
                for (let ny = gey; ny <= gey + geh; ny += netSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(gex, ny);
                    ctx.lineTo(gex + gew, ny);
                    ctx.stroke();
                }

                // Torrahmen
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3.5;
                ctx.shadowColor = 'rgba(255,255,255,0.6)';
                ctx.shadowBlur = 10;
                ctx.strokeRect(gex, gey, gew, geh);
                ctx.shadowBlur = 0;

                // Pfosten
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(gex - 4, gey - 2, 8, geh + 4);
                ctx.fillRect(gex + gew - 4, gey - 2, 8, geh + 4);
                ctx.fillRect(gex - 2, gey - 4, gew + 4, 8);

                // Spieler-Tor (unten)
                const gpx = goalPlayer.x;
                const gpy = goalPlayer.y;
                const gpw = goalPlayer.w;
                const gph = goalPlayer.h;

                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(gpx, gpy, gpw, gph);

                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 0.8;
                for (let nx = gpx; nx <= gpx + gpw; nx += netSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(nx, gpy);
                    ctx.lineTo(nx, gpy + gph);
                    ctx.stroke();
                }
                for (let ny = gpy; ny <= gpy + gph; ny += netSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(gpx, ny);
                    ctx.lineTo(gpx + gpw, ny);
                    ctx.stroke();
                }

                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3.5;
                ctx.shadowColor = 'rgba(255,255,255,0.6)';
                ctx.shadowBlur = 10;
                ctx.strokeRect(gpx, gpy, gpw, gph);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(gpx - 4, gpy - 2, 8, gph + 4);
                ctx.fillRect(gpx + gpw - 4, gpy - 2, 8, gph + 4);
                ctx.fillRect(gpx - 2, gpy + gph - 4, gpw + 4, 8);
            }

            function drawPlayer(p) {
                ctx.save();

                // Schatten
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(p.x, p.y + p.radius * 0.7, p.radius * 0.9, p.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                // Körper
                const bodyGrad = ctx.createRadialGradient(p.x - 2, p.y - 3, p.radius * 0.1, p.x, p.y, p.radius);
                bodyGrad.addColorStop(0, p.color);
                bodyGrad.addColorStop(0.7, p.darkColor);
                bodyGrad.addColorStop(1, '#1a1a1a');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                // Outline
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Sprint-Effekt
                if (p.sprinting) {
                    ctx.strokeStyle = 'rgba(255,200,50,0.8)';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = 'rgba(255,200,50,0.7)';
                    ctx.shadowBlur = 15;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Trikotnummer
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${p.radius*0.9}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.team === 'player' ? '10' : '9', p.x, p.y);

                // Richtungspfeil (klein)
                const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                if (speed > 10) {
                    const ax = p.vx / speed;
                    const ay = p.vy / speed;
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.beginPath();
                    ctx.moveTo(p.x + ax * p.radius, p.y + ay * p.radius);
                    ctx.lineTo(p.x + ax * (p.radius + 8) - ay * 4, p.y + ay * (p.radius + 8) + ax * 4);
                    ctx.lineTo(p.x + ax * (p.radius + 8) + ay * 4, p.y + ay * (p.radius + 8) - ax * 4);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            }

            function drawBall() {
                ctx.save();

                // Trail
                for (let i = 0; i < ball.trail.length; i++) {
                    const t = ball.trail[i];
                    if (t.life > 0) {
                        ctx.globalAlpha = t.life * 0.5;
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, ball.radius * (0.4 + t.life * 0.6), 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;

                // Schatten
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.ellipse(ball.x + 2, ball.y + 2, ball.radius, ball.radius * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();

                // Ball
                const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 3, ball.radius * 0.15, ball.x, ball.y,
                    ball.radius);
                ballGrad.addColorStop(0, '#ffffff');
                ballGrad.addColorStop(0.5, '#e8e8e8');
                ballGrad.addColorStop(1, '#999999');
                ctx.fillStyle = ballGrad;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();

                // Fünfecksmuster
                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 0.7;
                const pentR = ball.radius * 0.55;
                for (let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI * 2 + ball.x * 0.1;
                    const px = ball.x + Math.cos(angle) * pentR;
                    const py = ball.y + Math.sin(angle) * pentR;
                    ctx.beginPath();
                    ctx.arc(px, py, ball.radius * 0.2, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Glanzlicht
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.35, ball.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            function drawBackground() {
                // Straßenumgebung außerhalb des Feldes
                const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
                bgGrad.addColorStop(0, '#2c2c2c');
                bgGrad.addColorStop(0.5, '#333333');
                bgGrad.addColorStop(1, '#262626');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Gebäude-Silhouetten im Hintergrund
                ctx.fillStyle = '#1a1a1a';
                const buildings = [
                    { x: W * 0.05, w: W * 0.15, h: H * 0.2 },
                    { x: W * 0.22, w: W * 0.1, h: H * 0.28 },
                    { x: W * 0.35, w: W * 0.18, h: H * 0.18 },
                    { x: W * 0.55, w: W * 0.12, h: H * 0.25 },
                    { x: W * 0.7, w: W * 0.16, h: H * 0.22 },
                    { x: W * 0.88, w: W * 0.1, h: H * 0.3 },
                ];
                for (const b of buildings) {
                    ctx.fillRect(b.x, H * 0.04, b.w, b.h);
                    // Fenster
                    ctx.fillStyle = 'rgba(255,200,100,0.3)';
                    for (let fy = H * 0.06; fy < H * 0.04 + b.h; fy += 18) {
                        for (let fx = b.x + 8; fx < b.x + b.w - 6; fx += 16) {
                            if (Math.random() < 0.6) {
                                ctx.fillRect(fx, fy, 8, 10);
                            }
                        }
                    }
                    ctx.fillStyle = '#1a1a1a';
                }

                // Straßenlaterne
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(W * 0.15, H * 0.02, 4, H * 0.1);
                ctx.fillStyle = '#ffdd57';
                ctx.beginPath();
                ctx.arc(W * 0.15 + 2, H * 0.02, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,220,100,0.15)';
                ctx.beginPath();
                ctx.arc(W * 0.15 + 2, H * 0.02, 35, 0, Math.PI * 2);
                ctx.fill();
            }

            function render() {
                ctx.clearRect(0, 0, W, H);

                drawBackground();
                drawField();
                drawWalls();
                drawGoals();
                drawBall();
                drawPlayer(enemy);
                drawPlayer(player);
                drawParticles(ctx);

                // Feld-Markierungen
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                [
                    { x: fieldX + 15, y: fieldY + fieldH / 2 },
                    { x: fieldX + fieldW - 15, y: fieldY + fieldH / 2 },
                ].forEach(corner => {
                    ctx.beginPath();
                    ctx.arc(corner.x, corner.y, 18, -Math.PI / 2, 0);
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }

            // ──────────────────────────────────────
            // GAME LOOP
            // ──────────────────────────────────────
            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // ──────────────────────────────────────
            // INIT
            // ──────────────────────────────────────
            function init() {
                resizeCanvas();
                updateFieldDimensions();
                updateGoalPositions();
                resetPositions();
                updateScoreDisplay();
                hideMessage();
                lastTime = performance.now();
            }

            init();
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateFieldDimensions();
                updateGoalPositions();
            });

            // Start
            showMessage('⚽ Straßenfußball ⚽', 'Zieh den Joystick & schieß!', 3.0);
            requestAnimationFrame(gameLoop);

            console.log('🔥 Straßenfußball bereit!');
            console.log('📱 Mobile: Joystick links + SCHUSS/SPRINT rechts');
            console.log('⌨️  Desktop: WASD + Leertaste (Schuss) + Shift (Sprint)');
            console.log('⚽ Schieße den Ball ins obere Tor!');
        })();
    </script>
</body>
</html>
