<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivals - Web FPS Arena</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --hud-bg: rgba(0, 0, 0, 0.7);
            --accent: #ff4444;
            --accent2: #ffaa00;
            --text: #ffffff;
            --health: #44ff44;
            --health-mid: #ffaa00;
            --health-low: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            cursor: default;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            transition: opacity 0.3s;
        }
        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #overlay h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.3em;
            text-shadow: 0 0 40px rgba(255, 68, 68, 0.8), 0 0 80px rgba(255, 100, 50, 0.5);
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%,
            100% {
                text-shadow: 0 0 40px rgba(255, 68, 68, 0.8), 0 0 80px rgba(255, 100, 50, 0.5);
            }
            50% {
                text-shadow: 0 0 60px rgba(255, 68, 68, 1), 0 0 120px rgba(255, 150, 50, 0.8);
            }
        }
        #overlay .subtitle {
            color: #ccc;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            margin-bottom: 2em;
        }
        #overlay .btn {
            padding: 16px 50px;
            font-size: 1.3rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.08em;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(255, 68, 68, 0.9);
            }
        }
        #overlay .btn:hover {
            background: #ff5555;
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(255, 68, 68, 1);
        }
        #overlay .controls {
            margin-top: 1.5em;
            color: #999;
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }
        #overlay .controls span {
            color: #ddd;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
        }

        /* HUD */
        #hud {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 5;
            pointer-events: none;
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        #hud-bottom {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            gap: 20px;
        }
        #health-bar-container {
            flex: 1;
            max-width: 300px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 6px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            position: relative;
        }
        #health-bar {
            height: 100%;
            background: var(--health);
            transition: width 0.3s, background 0.3s;
            border-radius: 3px;
        }
        #health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0.05em;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
            z-index: 1;
        }
        #ammo-display {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 10px 20px;
            text-align: right;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 120px;
        }
        #ammo-current {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 0.03em;
            line-height: 1;
        }
        #ammo-reserve {
            font-size: 0.9rem;
            color: #aaa;
            letter-spacing: 0.05em;
        }
        #score-display {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 10px 18px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 80px;
        }
        #score-label {
            font-size: 0.7rem;
            color: #aaa;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #score-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent2);
            letter-spacing: 0.03em;
        }
        #wave-display {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 8px 14px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        #wave-label {
            font-size: 0.65rem;
            color: #aaa;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #wave-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }
        #weapon-slots {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 8px 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .weapon-slot {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.75rem;
            color: #666;
            border: 2px solid transparent;
            transition: all 0.2s;
            letter-spacing: 0.04em;
            position: relative;
        }
        .weapon-slot.active {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }
        .weapon-slot .key-hint {
            position: absolute;
            top: -18px;
            font-size: 0.6rem;
            color: #888;
            letter-spacing: 0;
        }

        /* Crosshair */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            width: 24px;
            height: 24px;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
        }
        #crosshair::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 1px;
        }
        #crosshair::after {
            height: 2px;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 1px;
        }
        #crosshair .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Hitmarker */
        #hitmarker {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 6;
            pointer-events: none;
            width: 30px;
            height: 30px;
            opacity: 0;
            transition: none;
        }
        #hitmarker.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: hitPop 0.25s ease-out forwards;
        }
        #hitmarker.kill {
            animation: killPop 0.35s ease-out forwards;
        }
        @keyframes hitPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0;
            }
        }
        @keyframes killPop {
            0% {
                transform: translate(-50%, -50%) scale(0.3);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.8);
                opacity: 0;
            }
        }
        #hitmarker svg {
            width: 100%;
            height: 100%;
        }

        /* Damage vignette */
        #damage-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            border-radius: 0;
            box-shadow: inset 0 0 0px rgba(255, 0, 0, 0);
            transition: box-shadow 0.15s;
        }

        /* Kill feed */
        #kill-feed {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 6;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
        }
        .kill-msg {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            animation: fadeInRight 0.3s ease-out, fadeOut 2s 3s forwards;
            border-left: 3px solid var(--accent2);
        }
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            #hud-bottom {
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
            }
            #health-bar-container {
                max-width: 100%;
                flex: 1 1 100%;
            }
            #ammo-current {
                font-size: 1.5rem;
            }
            .weapon-slot {
                width: 34px;
                height: 34px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

    <!-- Overlay -->
    <div id="overlay">
        <h1>RIVALS</h1>
        <p class="subtitle">Web Arena Shooter</p>
        <button class="btn" id="play-btn">▶ SPIELEN</button>
        <p class="controls">
            <span>W A S D</span> Bewegen &nbsp;|&nbsp;
            <span>Maus</span> Zielen &nbsp;|&nbsp;
            <span>Klick</span> Schießen<br>
            <span>1-4</span> Waffen &nbsp;|&nbsp;
            <span>R</span> Nachladen &nbsp;|&nbsp;
            <span>ESC</span> Pause
        </p>
    </div>

    <!-- HUD -->
    <div id="hud" style="display:none;">
        <div id="hud-bottom">
            <div id="health-bar-container">
                <div id="health-bar" style="width:100%;"></div>
                <div id="health-text">100</div>
            </div>
            <div id="weapon-slots">
                <div class="weapon-slot active" data-slot="0"><span class="key-hint">1</span>AR</div>
                <div class="weapon-slot" data-slot="1"><span class="key-hint">2</span>SG</div>
                <div class="weapon-slot" data-slot="2"><span class="key-hint">3</span>SN</div>
                <div class="weapon-slot" data-slot="3"><span class="key-hint">4</span>PI</div>
            </div>
            <div id="ammo-display">
                <div id="ammo-current">30</div>
                <div id="ammo-reserve">/ 90</div>
            </div>
            <div id="wave-display">
                <div id="wave-label">Welle</div>
                <div id="wave-value">1</div>
            </div>
            <div id="score-display">
                <div id="score-label">Kills</div>
                <div id="score-value">0</div>
            </div>
        </div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair" style="display:none;"><div class="dot"></div></div>
    <div id="hitmarker">
        <svg viewBox="0 0 30 30">
            <line x1="4" y1="4" x2="14" y2="14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="26" y1="4" x2="16" y2="14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="4" y1="26" x2="14" y2="16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="26" y1="26" x2="16" y2="16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
    </div>
    <div id="damage-vignette"></div>
    <div id="kill-feed"></div>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js">
    </script>

    <script>
        (function() {
            // ──────────────────────────────────────
            // DOM ELEMENTS
            // ──────────────────────────────────────
            const overlay = document.getElementById('overlay');
            const playBtn = document.getElementById('play-btn');
            const hud = document.getElementById('hud');
            const crosshairEl = document.getElementById('crosshair');
            const hitmarkerEl = document.getElementById('hitmarker');
            const damageVignette = document.getElementById('damage-vignette');
            const killFeed = document.getElementById('kill-feed');
            const healthBar = document.getElementById('health-bar');
            const healthText = document.getElementById('health-text');
            const ammoCurrent = document.getElementById('ammo-current');
            const ammoReserve = document.getElementById('ammo-reserve');
            const scoreValue = document.getElementById('score-value');
            const waveValue = document.getElementById('wave-value');
            const weaponSlots = document.querySelectorAll('.weapon-slot');

            // ──────────────────────────────────────
            // AUDIO SYSTEM
            // ──────────────────────────────────────
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playTone(freq, duration, type = 'square', vol = 0.08) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) { /* silent */ }
            }

            function playNoise(duration, vol = 0.06) {
                if (!audioCtx) return;
                try {
                    const bufferSize = Math.floor(audioCtx.sampleRate * duration);
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
                    }
                    const source = audioCtx.createBufferSource();
                    const gain = audioCtx.createGain();
                    source.buffer = buffer;
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                    source.connect(gain);
                    gain.connect(audioCtx.destination);
                    source.start();
                } catch (e) { /* silent */ }
            }

            function sfxShoot() { playNoise(0.12, 0.07);
                playTone(150, 0.06, 'sawtooth', 0.04); }

            function sfxShotgun() { playNoise(0.25, 0.10);
                playTone(60, 0.10, 'sawtooth', 0.06); }

            function sfxSniper() { playNoise(0.30, 0.12);
                playTone(40, 0.15, 'sawtooth', 0.08); }

            function sfxPistol() { playNoise(0.08, 0.04);
                playTone(300, 0.04, 'square', 0.03); }

            function sfxHit() { playTone(800, 0.06, 'square', 0.04); }

            function sfxKill() { playTone(600, 0.10, 'square', 0.05);
                playTone(900, 0.08, 'square', 0.03); }

            function sfxReload() {
                playTone(200, 0.04, 'square', 0.03);
                setTimeout(() => playTone(250, 0.04, 'square', 0.03), 150);
                setTimeout(() => playTone(300, 0.06, 'square', 0.04), 300);
            }

            function sfxEnemyShoot() { playNoise(0.10, 0.03);
                playTone(200, 0.04, 'sawtooth', 0.02); }

            function sfxDamage() { playTone(100, 0.12, 'sawtooth', 0.05); }

            // ──────────────────────────────────────
            // THREE.JS SETUP
            // ──────────────────────────────────────
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            scene.background = new THREE.Color('#1a2a3a');
            scene.fog = new THREE.Fog('#1a2a3a', 40, 120);

            const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.3, 200);
            camera.position.set(0, 1.7, 0);

            // ──────────────────────────────────────
            // LIGHTING
            // ──────────────────────────────────────
            const ambientLight = new THREE.AmbientLight('#8899bb', 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight('#ffeedd', 1.8);
            sunLight.position.set(30, 50, 20);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 150;
            sunLight.shadow.camera.left = -50;
            sunLight.shadow.camera.right = 50;
            sunLight.shadow.camera.top = 50;
            sunLight.shadow.camera.bottom = -50;
            sunLight.shadow.bias = -0.0003;
            scene.add(sunLight);

            const hemisphereLight = new THREE.HemisphereLight('#8899cc', '#443322', 0.4);
            scene.add(hemisphereLight);

            // ──────────────────────────────────────
            // MAP - ARENA
            // ──────────────────────────────────────
            const MAP_SIZE = 55;
            const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE);
            const groundMat = new THREE.MeshStandardMaterial({
                color: '#3a3a3e',
                roughness: 0.85,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid lines on ground
            const gridHelper = new THREE.PolarGridHelper(MAP_SIZE / 2, 40, 20, 64, '#555555', '#444444');
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            // Boundary walls
            const wallMaterial = new THREE.MeshStandardMaterial({ color: '#5a5a60', roughness: 0.6, metalness: 0.3 });
            const wallHeight = 4;
            const wallThickness = 0.5;

            function createWall(x, z, w, d) {
                const geo = new THREE.BoxGeometry(w, wallHeight, d);
                const wall = new THREE.Mesh(geo, wallMaterial);
                wall.position.set(x, wallHeight / 2, z);
                wall.castShadow = true;
                wall.receiveShadow = true;
                scene.add(wall);
                return { mesh: wall, x, z, w, d, h: wallHeight };
            }

            const boundaryWalls = [
                createWall(0, -MAP_SIZE / 2, MAP_SIZE, wallThickness),
                createWall(0, MAP_SIZE / 2, MAP_SIZE, wallThickness),
                createWall(-MAP_SIZE / 2, 0, wallThickness, MAP_SIZE),
                createWall(MAP_SIZE / 2, 0, wallThickness, MAP_SIZE),
            ];

            // Buildings & cover
            const buildings = [];
            const buildingColors = ['#7a7a80', '#6b6b72', '#8a8a8e', '#9e9e9e', '#b0a89',
                '#7d7d75', '#6e6e6a', '#858580'
            ];

            function createBuilding(x, z, w, d, h, color) {
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({
                    color: color || buildingColors[Math.floor(Math.random() * buildingColors.length)],
                    roughness: 0.5,
                    metalness: 0.2
                });
                const building = new THREE.Mesh(geo, mat);
                building.position.set(x, h / 2, z);
                building.castShadow = true;
                building.receiveShadow = true;
                scene.add(building);
                const bData = { mesh: building, x, z, w, d, h };
                buildings.push(bData);
                return bData;
            }

            // Central structure
            createBuilding(0, 0, 6, 6, 5, '#9e8e7e');
            createBuilding(0, 0, 4, 4, 7, '#b0a090');

            // Surrounding buildings
            const buildingLayout = [
                { x: -12, z: -10, w: 4, d: 3, h: 3.5 },
                { x: 10, z: -8, w: 5, d: 2, h: 4 },
                { x: -8, z: 12, w: 3, d: 5, h: 3 },
                { x: 14, z: 10, w: 4, d: 4, h: 4.5 },
                { x: -16, z: -4, w: 3, d: 3, h: 5 },
                { x: 16, z: -2, w: 2, d: 5, h: 3.5 },
                { x: -5, z: -16, w: 5, d: 2, h: 4 },
                { x: 6, z: 15, w: 6, d: 2, h: 3 },
                { x: -14, z: 6, w: 2, d: 4, h: 6 },
                { x: 12, z: -15, w: 4, d: 3, h: 3.5 },
                { x: -18, z: -14, w: 3, d: 3, h: 4 },
                { x: 18, z: 14, w: 3, d: 3, h: 5 },
                { x: 0, z: -10, w: 2, d: 2, h: 3 },
                { x: -3, z: 10, w: 2, d: 2, h: 3.5 },
                { x: 8, z: -4, w: 3, d: 2, h: 4 },
                { x: -10, z: 3, w: 2, d: 3, h: 3 },
            ];

            buildingLayout.forEach(b => {
                createBuilding(b.x, b.z, b.w, b.d, b.h);
            });

            // Small crates
            for (let i = 0; i < 15; i++) {
                const cx = (Math.random() - 0.5) * (MAP_SIZE - 10);
                const cz = (Math.random() - 0.5) * (MAP_SIZE - 10);
                // Don't place too close to center
                if (Math.abs(cx) < 4 && Math.abs(cz) < 4) continue;
                const cw = 1 + Math.random() * 1.5;
                const cd = 1 + Math.random() * 1.5;

                });

                crate.castShadow = true;

                scene.add(crate);
                buildings.push({ mesh: crate, x: cx, z: cz, w: cw, d: cd, h: ch, isCrate: true });
            }

            // ──────────────────────────────────────
            // WEAPON SYSTEM
            // ──────────────────────────────────────
            const weapons = [{
                name: 'AR',
                magSize: 30,

                reloadTime: 2.0,

            let currentWeaponIndex = 0;
            let weaponStates = weapons.map((w, i) => ({
                ammo: w.magSize,

            function getCurrentWeapon() { return weapons[currentWeaponIndex]; }

            function getCurrentWeaponState() { return weaponStates[currentWeaponIndex]; }

            // ──────────────────────────────────────
            // WEAPON MODEL (First Person)
            // ──────────────────────────────────────
            const weaponGroup = new THREE.Group();
            camera.add(weaponGroup);
            scene.add(camera);
            weaponGroup.position.set(0.35, -0.35, -0.7);

            let weaponModelGroup = new THREE.Group();
            weaponGroup.add(weaponModelGroup);

            function buildWeaponModel(weaponDef) {
                // Clear old model
                while (weaponModelGroup.children.length > 0) {
                    weaponModelGroup.remove(weaponModelGroup.children[0]);
                }
                const matDark = new THREE.MeshStandardMaterial({ color: '#2a2a2a', roughness: 0.4, metalness: 0.7 });
                const matAccent = new THREE.MeshStandardMaterial({ color: weaponDef.color, roughness: 0.35,
                    metalness: 0.6 });
                const matBarrel = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.3, metalness: 0.8 });

                // Body
                const bodyGeo = new THREE.BoxGeometry(0.08, 0.14, 0.5);
                const body = new THREE.Mesh(bodyGeo, matDark);
                body.position.set(0, 0, -0.1);
                weaponModelGroup.add(body);

                // Barrel
                const barrelGeo = new THREE.CylinderGeometry(0.02, 0.025, weaponDef.barrelLen, 8);
                const barrel = new THREE.Mesh(barrelGeo, matBarrel);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0.03, -0.1 - weaponDef.barrelLen / 2);
                weaponModelGroup.add(barrel);

                // Grip
                const gripGeo = new THREE.BoxGeometry(0.06, 0.16, 0.08);
                const grip = new THREE.Mesh(gripGeo, matAccent);
                grip.position.set(0, -0.13, -0.05);
                grip.rotation.x = 0.3;
                weaponModelGroup.add(grip);

                // Magazine
                const magGeo = new THREE.BoxGeometry(0.05, 0.18, 0.06);
                const mag = new THREE.Mesh(magGeo, matDark);
                mag.position.set(0, -0.08, 0.05);
                weaponModelGroup.add(mag);

                // Scope for sniper
                if (weaponDef.name === 'Sniper') {
                    const scopeGeo = new THREE.CylinderGeometry(0.03, 0.035, 0.2, 8);
                    const scope = new THREE.Mesh(scopeGeo, matAccent);
                    scope.position.set(0, 0.1, -0.05);
                    weaponModelGroup.add(scope);
                }

                // Muzzle flash point
                const muzzleGeo = new THREE.SphereGeometry(0.015, 4, 4);
                const muzzle = new THREE.Mesh(muzzleGeo, new THREE.MeshBasicMaterial({ color: '#000000',
                    transparent: true, opacity: 0 }));
                muzzle.position.set(0, 0.03, -0.1 - weaponDef.barrelLen);
                muzzle.name = 'muzzleFlash';
                weaponModelGroup.add(muzzle);
            }
            buildWeaponModel(getCurrentWeapon());

            // Muzzle flash light
            const muzzleLight = new THREE.PointLight('#ffaa44', 0, 8);
            muzzleLight.position.set(0, 0.03, -1.5);
            weaponModelGroup.add(muzzleLight);

            function triggerMuzzleFlash() {
                const muzzle = weaponModelGroup.getObjectByName('muzzleFlash');
                if (muzzle) {
                    muzzle.material.color.set('#ffcc66');
                    muzzle.material.opacity = 1;
                    muzzle.scale.set(3, 3, 3);
                }
                muzzleLight.intensity = 5;
                setTimeout(() => {
                    if (muzzle) {
                        muzzle.material.opacity = 0;
                        muzzle.scale.set(1, 1, 1);
                    }
                    muzzleLight.intensity = 0;
                }, 60);
            }

            // ──────────────────────────────────────
            // PLAYER STATE
            // ──────────────────────────────────────
            const player = {
                position: new THREE.Vector3(0, 1.7, 18),
                velocity: new THREE.Vector3(),
                health: 100,
                maxHealth: 100,
                alive: true,
                yaw: 0,
                pitch: 0,
                speed: 8,
                isMoving: false,
            };

            const keys = {};
            let mouseDown = false;
            let isPointerLocked = false;
            let gameRunning = false;

            // ──────────────────────────────────────
            // ENEMY SYSTEM
            // ──────────────────────────────────────
            const enemies = [];
            const enemyBullets = [];
            let wave = 1;
            let enemiesRemaining = 0;
            let enemiesToSpawn = 0;
            let waveDelay = 0;
            const ENEMY_SPAWN_DELAY = 2.5;
            let score = 0;

            const enemyMaterial = new THREE.MeshStandardMaterial({ color: '#cc3333', roughness: 0.5, metalness: 0.2 });
            const enemyHeadMaterial = new THREE.MeshStandardMaterial({ color: '#aa2222', roughness: 0.4, metalness: 0.1 });
            const enemyBodyGeo = new THREE.BoxGeometry(0.7, 1.2, 0.5);
            const enemyHeadGeo = new THREE.SphereGeometry(0.25, 8, 8);
            const enemyArmGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);

            function createEnemyMesh() {
                const group = new THREE.Group();
                const body = new THREE.Mesh(enemyBodyGeo, enemyMaterial);
                body.position.y = 1.0;
                body.castShadow = true;
                group.add(body);

                const head = new THREE.Mesh(enemyHeadGeo, enemyHeadMaterial);
                head.position.y = 1.85;
                head.castShadow = true;
                group.add(head);

                const armL = new THREE.Mesh(enemyArmGeo, enemyMaterial);
                armL.position.set(-0.45, 1.1, 0);
                armL.castShadow = true;
                group.add(armL);

                const armR = new THREE.Mesh(enemyArmGeo, enemyMaterial);
                armR.position.set(0.45, 1.1, 0);
                armR.castShadow = true;
                group.add(armR);

                // Gun indicator
                const gunGeo = new THREE.BoxGeometry(0.08, 0.08, 0.4);
                const gunMat = new THREE.MeshStandardMaterial({ color: '#222' });
                const gun = new THREE.Mesh(gunGeo, gunMat);
                gun.position.set(0.5, 1.15, 0.3);
                group.add(gun);

                group.userData = {
                    bodyMesh: body,
                    headMesh: head,
                    gunMesh: gun,
                };
                return group;
            }

            function spawnEnemy() {
                // Spawn at edges of map
                let sx, sz;
                const edge = Math.floor(Math.random() * 4);
                const margin = 3;
                const halfMap = MAP_SIZE / 2 - margin;
                switch (edge) {
                    case 0:
                        sx = (Math.random() - 0.5) * 2 * halfMap;
                        sz = -halfMap;
                        break;
                    case 1:
                        sx = (Math.random() - 0.5) * 2 * halfMap;
                        sz = halfMap;
                        break;
                    case 2:
                        sx = -halfMap;
                        sz = (Math.random() - 0.5) * 2 * halfMap;
                        break;
                    case 3:
                        sx = halfMap;
                        sz = (Math.random() - 0.5) * 2 * halfMap;
                        break;
                }

                const mesh = createEnemyMesh();
                mesh.position.set(sx, 0, sz);
                scene.add(mesh);

                const enemy = {
                    mesh,
                    position: new THREE.Vector3(sx, 0, sz),
                    health: 60 + wave * 15,
                    maxHealth: 60 + wave * 15,
                    speed: 3.5 + wave * 0.6,
                    alive: true,
                    lastFireTime: 0,
                    fireCooldown: 0.6 + Math.random() * 0.8,
                    accuracy: 0.06 + Math.random() * 0.06,
                    strafeDir: Math.random() > 0.5 ? 1 : -1,
                    strafeTimer: 0,
                    state: 'chase', // chase, strafe, retreat
                    stateTimer: 0,
                };
                enemies.push(enemy);
                enemiesRemaining++;
                return enemy;
            }

            function startWave() {
                enemiesToSpawn = 2 + wave * 2;
                enemiesRemaining = 0;
                waveDelay = 0.5;
                // Clear dead enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (!enemies[i].alive) {
                        scene.remove(enemies[i].mesh);
                        enemies.splice(i, 1);
                    }
                }
            }

            // ──────────────────────────────────────
            // PARTICLES
            // ──────────────────────────────────────
            const particles = [];

            function spawnParticles(position, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    const geo = new THREE.SphereGeometry(0.06, 4, 4);
                    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
                    const particle = new THREE.Mesh(geo, mat);
                    particle.position.copy(position);
                    particle.position.x += (Math.random() - 0.5) * 0.5;
                    particle.position.y += (Math.random() - 0.5) * 1.5;
                    particle.position.z += (Math.random() - 0.5) * 0.5;
                    particle.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 6,
                            Math.random() * 5 + 2,
                            (Math.random() - 0.5) * 6
                        ),
                        life: 0.5 + Math.random() * 0.7,
                        age: 0,
                    };
                    scene.add(particle);
                    particles.push(particle);
                }
            }

            // ──────────────────────────────────────
            // COLLISION HELPERS
            // ──────────────────────────────────────
            function isPositionBlocked(x, z, radius = 0.4) {
                // Check map boundaries
                const halfMap = MAP_SIZE / 2 - 0.6;
                if (Math.abs(x) > halfMap || Math.abs(z) > halfMap) return true;
                // Check buildings
                for (const b of buildings) {
                    const halfW = b.w / 2 + radius;
                    const halfD = b.d / 2 + radius;
                    if (Math.abs(x - b.x) < halfW && Math.abs(z - b.z) < halfD) return true;
                }
                // Check boundary walls
                for (const bw of boundaryWalls) {
                    const halfW = bw.w / 2 + radius;
                    const halfD = bw.d / 2 + radius;
                    if (Math.abs(x - bw.x) < halfW && Math.abs(z - bw.z) < halfD) return true;
                }
                return false;
            }

            function hasLineOfSight(from, to) {
                const dir = new THREE.Vector3().subVectors(to, from).normalize();
                const dist = from.distanceTo(to);
                const raycaster = new THREE.Raycaster(from, dir, 0, dist);
                const intersects = raycaster.intersectObjects(buildings.map(b => b.mesh), true);
                // Also check boundary walls
                const wallIntersects = raycaster.intersectObjects(boundaryWalls.map(b => b.mesh), true);
                return intersects.length === 0 && wallIntersects.length === 0;
            }

            // ──────────────────────────────────────
            // SHOOTING
            // ──────────────────────────────────────
            function shoot() {
                const weapon = getCurrentWeapon();
                const wState = getCurrentWeaponState();
                const now = performance.now() / 1000;

                if (wState.reloading) return;
                if (wState.ammo <= 0) {
                    reload();
                    return;
                }
                if (now - wState.lastFireTime < weapon.fireRate / 1000) return;

                wState.lastFireTime = now;
                wState.ammo--;

                // Screen shake
                const shakeAmount = weapon.name === 'Sniper' ? 0.06 : weapon.name === 'Shotgun' ? 0.04 : 0.015;
                camera.position.x += (Math.random() - 0.5) * shakeAmount;
                camera.position.y += (Math.random() - 0.5) * shakeAmount * 0.5;

                triggerMuzzleFlash();

                // Play sound
                if (weapon.name === 'AR') sfxShoot();
                else if (weapon.name === 'Shotgun') sfxShotgun();
                else if (weapon.name === 'Sniper') sfxSniper();
                else sfxPistol();

                // Cast rays
                for (let p = 0; p < weapon.pellets; p++) {
                    const spreadX = (Math.random() - 0.5) * weapon.spread * 2;
                    const spreadY = (Math.random() - 0.5) * weapon.spread * 2;
                    const direction = new THREE.Vector3(0, 0, -1);
                    direction.applyQuaternion(camera.quaternion);
                    direction.x += spreadX;
                    direction.y += spreadY;
                    direction.normalize();

                    const rayOrigin = new THREE.Vector3().copy(camera.position);
                    const raycaster = new THREE.Raycaster(rayOrigin, direction, 0, 100);
                    const allTargets = [];
                    enemies.forEach(e => {
                        if (e.alive && e.mesh) {
                            allTargets.push(e.mesh);
                            // Also add children for more precise hits
                            e.mesh.children.forEach(c => allTargets.push(c));
                        }
                    });
                    const intersects = raycaster.intersectObjects(allTargets, true);

                    if (intersects.length > 0) {
                        const hit = intersects[0];
                        let hitEnemy = null;
                        // Find which enemy was hit
                        for (const enemy of enemies) {
                            if (!enemy.alive) continue;
                            if (enemy.mesh === hit.object || enemy.mesh.children.includes(hit.object) || enemy
                                .mesh.userData.bodyMesh === hit.object || enemy.mesh.userData.headMesh === hit
                                .object) {
                                hitEnemy = enemy;
                                break;
                            }
                            // Also check if the hit object is a child of the enemy mesh
                            let parent = hit.object;
                            while (parent) {
                                if (parent === enemy.mesh) {
                                    hitEnemy = enemy;
                                    break;
                                }
                                parent = parent.parent;
                            }
                            if (hitEnemy) break;
                        }

                        if (hitEnemy && hitEnemy.alive) {
                            const isHeadshot = hit.object === hitEnemy.mesh.userData.headMesh ||
                                (hit.object.parent && hit.object.parent === hitEnemy.mesh && hit.object === hitEnemy
                                    .mesh.userData.headMesh);
                            const dmg = isHeadshot ? weapon.damage * 2 : weapon.damage;
                            hitEnemy.health -= dmg;
                            spawnParticles(hit.point, '#ff6666', isHeadshot ? 18 : 8);
                            sfxHit();

                            if (hitEnemy.health <= 0) {
                                hitEnemy.alive = false;
                                hitEnemy.health = 0;
                                enemiesRemaining--;
                                score++;
                                sfxKill();
                                spawnParticles(hitEnemy.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0)),
                                    '#ffaa00', 25);
                                // Show hitmarker kill
                                showHitmarker(true);
                                // Kill feed
                                addKillMessage();
                                // Hide enemy
                                hitEnemy.mesh.visible = false;
                                setTimeout(() => {
                                    if (!hitEnemy.alive && hitEnemy.mesh) {
                                        scene.remove(hitEnemy.mesh);
                                        const idx = enemies.indexOf(hitEnemy);
                                        if (idx >= 0 && !hitEnemy.alive) enemies.splice(idx, 1);
                                    }
                                }, 1500);
                            } else {
                                showHitmarker(false);
                            }
                        } else {
                            // Hit environment
                            spawnParticles(hit.point, '#cccccc', 4);
                        }
                    }
                }

                updateAmmoDisplay();
                if (wState.ammo <= 0 && wState.reserve > 0) {
                    setTimeout(() => reload(), 200);
                }
            }

            function reload() {
                const weapon = getCurrentWeapon();
                const wState = getCurrentWeaponState();
                if (wState.reloading) return;
                if (wState.ammo >= weapon.magSize) return;
                if (wState.reserve <= 0) return;
                wState.reloading = true;
                wState.reloadStart = performance.now() / 1000;
                sfxReload();
                // Animate weapon down
                weaponGroup.position.y = -0.6;
                setTimeout(() => {
                    weaponGroup.position.y = -0.35;
                }, weapon.reloadTime * 800);
                setTimeout(() => {
                    const needed = weapon.magSize - wState.ammo;
                    const available = Math.min(needed, wState.reserve);
                    wState.ammo += available;
                    wState.reserve -= available;
                    wState.reloading = false;
                    updateAmmoDisplay();
                }, weapon.reloadTime * 1000);
            }

            function switchWeapon(index) {
                if (index === currentWeaponIndex) return;
                if (getCurrentWeaponState().reloading) return;
                currentWeaponIndex = index;
                buildWeaponModel(getCurrentWeapon());
                updateAmmoDisplay();
                updateWeaponSlots();
                // Animate
                weaponGroup.position.y = -0.55;
                setTimeout(() => { weaponGroup.position.y = -0.35; }, 200);
            }

            function showHitmarker(isKill) {
                hitmarkerEl.classList.remove('show', 'kill');
                void hitmarkerEl.offsetWidth;
                hitmarkerEl.classList.add(isKill ? 'kill' : 'show');
                if (isKill) {
                    const svgLines = hitmarkerEl.querySelectorAll('line');
                    svgLines.forEach(l => l.setAttribute('stroke', '#ffaa00'));
                    setTimeout(() => {
                        svgLines.forEach(l => l.setAttribute('stroke', '#fff'));

            function addKillMessage() {
                const msg = document.createElement('div');
                msg.className = 'kill-msg';
                msg.textContent = '💀 Gegner eliminiert! +100';
                killFeed.appendChild(msg);
                setTimeout(() => msg.remove(), 5000);
                // Limit kill feed
                while (killFeed.children.length > 5) {
                    killFeed.firstChild.remove();
                }

            function updateAmmoDisplay() {
                const weapon = getCurrentWeapon();
                const wState = getCurrentWeaponState();
                ammoCurrent.textContent = wState.reloading ? '...' : wState.ammo;
                ammoReserve.textContent = '/ ' + wState.reserve;
                if (wState.ammo <= 0 && !wState.reloading) {
                    ammoCurrent.style.color = '#ff4444';
                } else if (wState.reloading) {
                    ammoCurrent.style.color = '#ffaa00';
                } else if (wState.ammo <= weapon.magSize * 0.25) {
                    ammoCurrent.style.color = '#ffaa00';
                } else {
                    ammoCurrent.style.color = '#fff';
                }
            }

            function updateWeaponSlots() {
                weaponSlots.forEach((slot, i) => {
                    slot.classList.toggle('active', i === currentWeaponIndex);
                });
            }

            function updateHealthDisplay() {
                const pct = Math.max(0, player.health / player.maxHealth * 100);
                healthBar.style.width = pct + '%';
                healthText.textContent = Math.ceil(player.health);
                if (pct > 60) healthBar.style.background = 'var(--health)';
                else if (pct > 30) healthBar.style.background = 'var(--health-mid)';
                else healthBar.style.background = 'var(--health-low)';
            }

            // ──────────────────────────────────────
            // ENEMY AI
            // ──────────────────────────────────────
            function updateEnemyAI(enemy, deltaTime) {
                if (!enemy.alive) return;
                const toPlayer = new THREE.Vector3().subVectors(
                    new THREE.Vector3(player.position.x, 1.2, player.position.z),
                    new THREE.Vector3(enemy.position.x, 1.2, enemy.position.z)
                );
                const dist = toPlayer.length();
                const dirToPlayer = toPlayer.normalize();
                const los = hasLineOfSight(
                    new THREE.Vector3(enemy.position.x, 1.5, enemy.position.z),
                    new THREE.Vector3(player.position.x, 1.5, player.position.z)
                );

                // State management
                enemy.stateTimer -= deltaTime;
                if (enemy.stateTimer <= 0) {
                    enemy.stateTimer = 1.5 + Math.random() * 3;
                    if (dist < 8) enemy.state = Math.random() < 0.5 ? 'strafe' : 'retreat';
                    else if (dist < 25) enemy.state = Math.random() < 0.7 ? 'chase' : 'strafe';
                    else enemy.state = 'chase';
                    enemy.strafeDir = Math.random() > 0.5 ? 1 : -1;
                }

                let moveDir = new THREE.Vector3();
                const moveSpeed = enemy.speed * deltaTime;

                switch (enemy.state) {
                    case 'chase':
                        moveDir.copy(dirToPlayer);
                        break;
                    case 'strafe':
                        // Move perpendicular to player direction
                        moveDir.set(-dirToPlayer.z, 0, dirToPlayer.x).multiplyScalar(enemy.strafeDir);
                        moveDir.add(dirToPlayer.clone().multiplyScalar(0.3));
                        moveDir.normalize();
                        break;
                    case 'retreat':
                        moveDir.copy(dirToPlayer).multiplyScalar(-1);
                        moveDir.x += (Math.random() - 0.5) * 1.5;
                        moveDir.z += (Math.random() - 0.5) * 1.5;
                        moveDir.normalize();
                        break;
                }

                // Try to move
                const newX = enemy.position.x + moveDir.x * moveSpeed;
                const newZ = enemy.position.z + moveDir.z * moveSpeed;
                if (!isPositionBlocked(newX, enemy.position.z, 0.4)) enemy.position.x = newX;
                if (!isPositionBlocked(enemy.position.x, newZ, 0.4)) enemy.position.z = newZ;

                // Update mesh
                enemy.mesh.position.x = enemy.position.x;
                enemy.mesh.position.z = enemy.position.z;
                // Face player
                const angle = Math.atan2(dirToPlayer.x, dirToPlayer.z);
                enemy.mesh.rotation.y = angle;

                // Shooting
                const now = performance.now() / 1000;
                if (los && dist < 35 && now - enemy.lastFireTime > enemy.fireCooldown) {
                    enemy.lastFireTime = now;
                    enemy.fireCooldown = 0.5 + Math.random() * 0.7;
                    enemyShoot(enemy);
                }
            }

            function enemyShoot(enemy) {
                if (!player.alive) return;
                sfxEnemyShoot();
                const toPlayer = new THREE.Vector3().subVectors(
                    new THREE.Vector3(player.position.x, 1.5, player.position.z),
                    new THREE.Vector3(enemy.position.x, 1.5, enemy.position.z)
                ).normalize();
                // Add inaccuracy
                toPlayer.x += (Math.random() - 0.5) * enemy.accuracy;
                toPlayer.y += (Math.random() - 0.5) * enemy.accuracy;
                toPlayer.z += (Math.random() - 0.5) * enemy.accuracy;
                toPlayer.normalize();

                const rayOrigin = new THREE.Vector3(enemy.position.x, 1.5, enemy.position.z);
                const raycaster = new THREE.Raycaster(rayOrigin, toPlayer, 0, 50);
                const intersects = raycaster.intersectObjects([camera], true);

                // Also check if player is visible
                if (hasLineOfSight(rayOrigin, new THREE.Vector3(player.position.x, 1.5, player.position.z))) {
                    const dist = rayOrigin.distanceTo(new THREE.Vector3(player.position.x, 1.5, player.position.z));
                    const hitChance = Math.max(0.15, 1 - dist / 40);
                    if (Math.random() < hitChance) {
                        damagePlayer(8 + Math.random() * 12);
                    }
                }

                // Muzzle flash at enemy position
                const flashGeo = new THREE.SphereGeometry(0.1, 4, 4);
                const flashMat = new THREE.MeshBasicMaterial({ color: '#ffaa44', transparent: true, opacity: 1 });
                const flash = new THREE.Mesh(flashGeo, flashMat);
                flash.position.copy(rayOrigin).add(toPlayer.clone().multiplyScalar(0.8));
                scene.add(flash);
                setTimeout(() => {
                    scene.remove(flash);
                    flash.geometry.dispose();
                    flash.material.dispose();
                }, 80);
            }

            function damagePlayer(amount) {
                if (!player.alive) return;
                player.health -= amount;
                sfxDamage();
                updateHealthDisplay();
                // Damage vignette
                damageVignette.style.boxShadow = 'inset 0 0 80px rgba(255,0,0,0.7)';
                setTimeout(() => {
                    damageVignette.style.boxShadow = 'inset 0 0 0px rgba(255,0,0,0)';
                }, 200);
                // Camera shake
                camera.position.x += (Math.random() - 0.5) * 0.08;
                camera.position.y += (Math.random() - 0.5) * 0.05;

                if (player.health <= 0) {
                    player.health = 0;
                    player.alive = false;
                    updateHealthDisplay();
                    handlePlayerDeath();
                }
            }

            function handlePlayerDeath() {
                // Show death screen
                overlay.classList.remove('hidden');
                overlay.querySelector('h1').textContent = 'TOT';
                overlay.querySelector('.subtitle').textContent = 'Score: ' + score + ' | Welle: ' + wave;
                playBtn.textContent = '↻ NEU STARTEN';
                playBtn.style.display = 'block';
                overlay.querySelector('.controls').style.display = 'none';
                hud.style.display = 'none';
                crosshairEl.style.display = 'none';
                document.exitPointerLock();
                isPointerLocked = false;
                gameRunning = false;
                // Clear enemies
                enemies.forEach(e => {
                    if (e.mesh) scene.remove(e.mesh);
                });
                enemies.length = 0;
                enemiesRemaining = 0;
                enemiesToSpawn = 0;
            }

            function respawnPlayer() {
                player.health = player.maxHealth;
                player.alive = true;
                player.position.set(0, 1.7, 18);
                camera.position.copy(player.position);
                camera.rotation.set(0, 0, 0);
                player.yaw = 0;
                player.pitch = 0;
                score = 0;
                wave = 1;
                weaponStates = weapons.map((w, i) => ({
                    ammo: w.magSize,
                    reserve: w.reserve,
                    reloading: false,
                    reloadStart: 0,
                    lastFireTime: 0,
                }));
                currentWeaponIndex = 0;
                buildWeaponModel(getCurrentWeapon());
                updateAmmoDisplay();
                updateWeaponSlots();
                updateHealthDisplay();
                scoreValue.textContent = '0';
                waveValue.textContent = '1';
                damageVignette.style.boxShadow = 'inset 0 0 0px rgba(255,0,0,0)';
                weaponGroup.position.set(0.35, -0.35, -0.7);
                startWave();
            }

            // ──────────────────────────────────────
            // GAME LOOP
            // ──────────────────────────────────────
            let lastTime = performance.now();

            function animate(timestamp) {
                requestAnimationFrame(animate);

                const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.2);
                lastTime = timestamp;

                if (gameRunning && player.alive) {
                    updatePlayer(deltaTime);
                    updateEnemies(deltaTime);
                    updateParticles(deltaTime);
                    updateWaveSystem(deltaTime);
                    // Recoil recovery
                    weaponGroup.position.x += (0.35 - weaponGroup.position.x) * 10 * deltaTime;
                    weaponGroup.position.y += (-0.35 - weaponGroup.position.y) * 10 * deltaTime;
                }

                // Weapon bob
                if (player.alive && player.isMoving && gameRunning) {
                    const bobFreq = 8;
                    const bobAmp = 0.015;
                    const bobY = Math.sin(timestamp * 0.001 * bobFreq) * bobAmp;
                    weaponGroup.position.y += bobY;
                    weaponGroup.position.x += Math.cos(timestamp * 0.001 * bobFreq * 0.7) * bobAmp * 0.6;
                }

                // Update enemy bullet visuals (not used currently, but clean up)
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const eb = enemyBullets[i];
                    eb.life -= deltaTime;
                    if (eb.life <= 0) {
                        scene.remove(eb.mesh);
                        eb.mesh.geometry.dispose();
                        eb.mesh.material.dispose();
                        enemyBullets.splice(i, 1);
                    }
                }

                renderer.render(scene, camera);
            }

            function updatePlayer(deltaTime) {
                // Get input direction
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

                const inputDir = new THREE.Vector3();
                if (keys['w'] || keys['arrowup']) inputDir.add(forward);
                if (keys['s'] || keys['arrowdown']) inputDir.sub(forward);
                if (keys['a'] || keys['arrowleft']) inputDir.sub(right);
                if (keys['d'] || keys['arrowright']) inputDir.add(right);

                player.isMoving = inputDir.length() > 0.1;
                if (player.isMoving) {
                    inputDir.normalize();
                    const speed = player.speed * deltaTime;
                    const newX = player.position.x + inputDir.x * speed;
                    const newZ = player.position.z + inputDir.z * speed;
                    if (!isPositionBlocked(newX, player.position.z, 0.4)) player.position.x = newX;
                    if (!isPositionBlocked(player.position.x, newZ, 0.4)) player.position.z = newZ;
                }

                camera.position.set(player.position.x, player.position.y, player.position.z);

                // Auto-fire for automatic weapons
                if (mouseDown && player.alive && getCurrentWeapon().automatic && isPointerLocked) {
                    shoot();
                }
            }

            function updateEnemies(deltaTime) {
                for (const enemy of enemies) {
                    if (enemy.alive) updateEnemyAI(enemy, deltaTime);
                }
            }

            function updateParticles(deltaTime) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.userData.age += deltaTime;
                    if (p.userData.age >= p.userData.life) {
                        scene.remove(p);
                        p.geometry.dispose();
                        p.material.dispose();
                        particles.splice(i, 1);
                    } else {
                        const progress = p.userData.age / p.userData.life;
                        p.material.opacity = 1 - progress;
                        p.position.x += p.userData.velocity.x * deltaTime;
                        p.position.y += p.userData.velocity.y * deltaTime;
                        p.position.z += p.userData.velocity.z * deltaTime;
                        p.userData.velocity.y -= 9.8 * deltaTime;
                        p.scale.setScalar(1 - progress * 0.7);
                    }
                }
            }

            function updateWaveSystem(deltaTime) {
                if (waveDelay > 0) {
                    waveDelay -= deltaTime;
                    return;
                }
                if (enemiesToSpawn > 0 && enemiesRemaining < 8) {
                    spawnEnemy();
                    enemiesToSpawn--;
                    waveDelay = ENEMY_SPAWN_DELAY / (1 + wave * 0.3);
                }
                if (enemiesToSpawn <= 0 && enemiesRemaining <= 0 && enemies.length === 0) {
                    // Wave complete
                    wave++;
                    waveValue.textContent = wave;
                    // Heal player a bit
                    player.health = Math.min(player.maxHealth, player.health + 25);
                    updateHealthDisplay();
                    startWave();
                }
            }

            // ──────────────────────────────────────
            // INPUT HANDLING
            // ──────────────────────────────────────
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key.toLowerCase() === 'r' && player.alive && gameRunning) {
                    reload();
                }
                if (e.key >= '1' && e.key <= '4' && player.alive && gameRunning) {
                    switchWeapon(parseInt(e.key) - 1);
                }
                if (e.key === 'Escape' && isPointerLocked) {
                    document.exitPointerLock();
                }
                e.preventDefault();
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
                e.preventDefault();
            });

            window.addEventListener('mousedown', (e) => {
                if (e.button === 0 && isPointerLocked && player.alive && gameRunning) {
                    mouseDown = true;
                    const weapon = getCurrentWeapon();
                    if (!weapon.automatic) {
                        shoot();
                    }
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) {
                    mouseDown = false;
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isPointerLocked || !gameRunning || !player.alive) return;
                const sensitivity = 0.002;
                player.yaw -= e.movementX * sensitivity;
                player.pitch -= e.movementY * sensitivity;
                player.pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, player.pitch));
                camera.rotation.order = 'YXZ';
                camera.rotation.y = player.yaw;
                camera.rotation.x = player.pitch;
            });

            document.addEventListener('pointerlockchange', () => {
                isPointerLocked = document.pointerLockElement === renderer.domElement;
                if (isPointerLocked) {
                    overlay.classList.add('hidden');
                    hud.style.display = 'flex';
                    crosshairEl.style.display = 'block';
                    if (!gameRunning) {
                        gameRunning = true;
                        if (!player.alive) respawnPlayer();
                        else if (enemies.length === 0 && enemiesToSpawn === 0) startWave();
                    }
                } else if (gameRunning && player.alive) {
                    overlay.classList.remove('hidden');
                    overlay.querySelector('h1').textContent = 'PAUSE';
                    overlay.querySelector('.subtitle').textContent = 'Score: ' + score + ' | Welle: ' + wave;
                    playBtn.textContent = '▶ WEITER';
                    playBtn.style.display = 'block';
                    overlay.querySelector('.controls').style.display = 'none';
                    hud.style.display = 'none';
                    crosshairEl.style.display = 'none';
                    gameRunning = false;
                }
            });

            window.addEventListener('wheel', (e) => {
                if (!isPointerLocked || !player.alive || !gameRunning) return;
                if (e.deltaY > 0) {
                    switchWeapon((currentWeaponIndex + 1) % weapons.length);
                } else {
                    switchWeapon((currentWeaponIndex - 1 + weapons.length) % weapons.length);
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ──────────────────────────────────────
            // PLAY BUTTON
            // ──────────────────────────────────────
            playBtn.addEventListener('click', () => {
                initAudio();
                if (!player.alive) {
                    respawnPlayer();
                }
                overlay.querySelector('h1').textContent = 'RIVALS';
                overlay.querySelector('.subtitle').textContent = 'Web Arena Shooter';
                playBtn.textContent = '▶ SPIELEN';
                playBtn.style.display = 'block';
                overlay.querySelector('.controls').style.display = 'block';
                renderer.domElement.requestPointerLock();
            });

            // ──────────────────────────────────────
            // INITIALIZATION
            // ──────────────────────────────────────
            updateAmmoDisplay();
            updateWeaponSlots();
            updateHealthDisplay();
            scoreValue.textContent = '0';
            waveValue.textContent = '1';
            camera.position.copy(player.position);
            startWave();
            // Don't auto-start game - wait for click
            gameRunning = false;
            overlay.classList.remove('hidden');
            hud.style.display = 'none';
            crosshairEl.style.display = 'none';

            // Start render loop
            requestAnimationFrame(animate);

            console.log('🎮 RIVALS - Web Arena Shooter bereit!');
            console.log('   Klicke auf "SPIELEN" um zu starten.');
            console.log('   Waffen: 1=AR  2=Shotgun  3=Sniper  4=Pistol');
            console.log('   R=Nachladen  ESC=Pause  Mausrad=Waffe wechseln');
            console.log('   Besiege alle Gegner in jeder Welle!');
        })();
    </script>
</body>
</html>
